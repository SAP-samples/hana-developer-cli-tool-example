name: Release hana-cli

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 4.202604.0). Leave empty for auto-calculation from current date.'
        required: false
        type: string
      changelog_entries:
        description: 'Changelog entries as JSON array: [{"category":"Changed","text":"Description"}]'
        required: false
        type: string
        default: '[]'

permissions:
  contents: write
  id-token: write
  pull-requests: write

concurrency:
  group: release-hana-cli
  cancel-in-progress: false

jobs:
  test:
    name: Test Suite
    # Run for the release paths only: a version tag push, or a manual dispatch.
    # A plain push to main (e.g. a merged release PR) is handled by auto-tag.
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint
        continue-on-error: true

      - name: Validate i18n
        run: npm run validate:i18n

      - name: Run tests
        run: npm run test:ci

  prepare:
    name: Prepare Release PR
    needs: test
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Calculate version and update files
        id: calc
        run: |
          RESULT=$(node scripts/prepare-release.js \
            --package hana-cli \
            --version "${{ inputs.version }}" \
            --changelog-entries '${{ inputs.changelog_entries }}')
          VERSION=$(echo "$RESULT" | jq -r '.version')
          TAG=$(echo "$RESULT" | jq -r '.tag')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Prepared release: $TAG"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create release branch, commit, and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.calc.outputs.version }}"
          BRANCH="release/v${VERSION}"
          git add package.json npm-shrinkwrap.json server.json mcp-server/package.json mcp-server/npm-shrinkwrap.json CHANGELOG.json CHANGELOG.md
          if git diff --cached --quiet; then
            echo "::error::No version bump changes to commit (version may already be $VERSION)"
            exit 1
          fi
          git checkout -b "$BRANCH"
          git commit -m "chore: release v${VERSION}"
          # Push the release branch (allowed — branch protection only blocks main).
          git push origin "$BRANCH"
          # Open a PR into main. Merging it triggers auto-tag -> publish.
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: release v${VERSION}" \
            --body "Automated release version bump for **v${VERSION}**, opened by the Release workflow (workflow_dispatch).

          Merging this PR pushes to \`main\`, which triggers the \`auto-tag\` job to create tag \`v${VERSION}\`, which in turn runs the tag-triggered publish path (npm + GitHub release + MCP registry, gated by the \`npm-publish\` environment approval).

          Review the version bump and changelog, then merge to release."


  auto-tag:
    name: Auto-tag merged release
    # When a release PR is merged (push to main), tag the new version. Pushing
    # the tag triggers this same workflow via the 'v*' tag path -> publish.
    # Idempotent: only tags when package.json's version has no tag yet, so
    # ordinary pushes to main are a no-op.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag new version if not already tagged
        run: |
          VERSION=$(jq -r '.version' package.json)
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists — nothing to release."
            exit 0
          fi
          echo "Tagging new release v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin "v${VERSION}"

  resolve-version:
    name: Resolve Version from Tag
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      tag: ${{ github.ref_name }}
    steps:
      - name: Extract version from tag
        id: extract
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Resolved version: $VERSION from tag: $TAG"

  publish:
    name: Publish to npm
    needs: [test, resolve-version]
    if: needs.test.result == 'success' && needs.resolve-version.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: npm-publish
      url: https://www.npmjs.com/package/hana-cli/v/${{ steps.ver.outputs.version }}
    steps:
      - name: Determine version
        id: ver
        run: |
          echo "version=${{ needs.resolve-version.outputs.version }}" >> $GITHUB_OUTPUT
          echo "tag=${{ needs.resolve-version.outputs.tag }}" >> $GITHUB_OUTPUT

      - name: Checkout code at tag
        uses: actions/checkout@v7
        with:
          ref: "v${{ steps.ver.outputs.version }}"

      - name: Setup Node.js with npm registry
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build VS Code extension .vsix
        run: |
          # Install sub-project deps (root npm ci does not cover these) and
          # build a fresh, self-contained .vsix that ships inside the npm
          # package for `hana-cli vscode install`. Installing app/vue deps here
          # also satisfies the root prepack step (build:vue) run by npm publish.
          rm -f vscode-extension/*.vsix
          npm ci --prefix app/vue
          npm ci --prefix vscode-extension
          npm run build:vscode
          cd vscode-extension && npx vsce package

      - name: Verify package version matches tag
        run: |
          PKG_VERSION=$(node -e "import fs from 'fs'; console.log(JSON.parse(fs.readFileSync('package.json','utf8')).version)")
          if [ "$PKG_VERSION" != "${{ steps.ver.outputs.version }}" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag version (${{ steps.ver.outputs.version }})"
            exit 1
          fi

      - name: Publish hana-cli to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Extract release notes
        id: notes
        run: |
          NOTES=$(node scripts/extract-release-notes.js --version "${{ steps.ver.outputs.version }}")
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "body<<$EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.ver.outputs.version }}"
          name: "v${{ steps.ver.outputs.version }}"
          body: ${{ steps.notes.outputs.body }}
          draft: false
          prerelease: ${{ contains(steps.ver.outputs.version, '-') }}

  publish-mcp-registry:
    name: Publish to MCP Registry
    needs: [publish, resolve-version]
    if: needs.publish.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Determine version
        id: ver
        run: |
          echo "version=${{ needs.resolve-version.outputs.version }}" >> $GITHUB_OUTPUT

      - name: Checkout code at tag
        uses: actions/checkout@v7
        with:
          ref: "v${{ steps.ver.outputs.version }}"

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish server to MCP Registry
        run: ./mcp-publisher publish
