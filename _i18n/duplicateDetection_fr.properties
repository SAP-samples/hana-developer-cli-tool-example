title=Détection des doublons
duplicateDetection=Trouver des enregistrements en double dans une table
duplicateDetectionTable=Nom de la table à vérifier
duplicateDetectionSchema=Schéma de la table
duplicateDetectionKeyColumns=Colonnes clés pour l’appariement (séparées par des virgules)
duplicateDetectionCheckColumns=Colonnes à vérifier pour les doublons (séparées par des virgules, facultatif)
duplicateDetectionExcludeColumns=Colonnes à exclure du contrôle (séparées par des virgules, facultatif)
duplicateDetectionMode=Mode de détection (exact, fuzzy, partial)
duplicateDetectionThreshold=Seuil de similarité pour l’appariement flou (0-1)
duplicateDetectionOutput=Chemin du fichier de rapport de sortie
duplicateDetectionFormat=Format du rapport (json, csv, summary)
duplicateDetectionLimit=Nombre maximal de lignes à vérifier
duplicateDetectionTimeout=Délai d’expiration de l’opération en secondes
duplicateDetectionExample=Exemple : hana-cli duplicateDetection --table MY_TABLE --mode exact --threshold 0.95
help.duplicateDetectionTable=Nom de la table à vérifier pour les doublons. Exemple : CUSTOMERS
help.duplicateDetectionSchema=Schéma contenant la table. Si non fourni, utilise le schéma courant.
help.duplicateDetectionKeyColumns=Liste de colonnes séparées par des virgules utilisées pour l’appariement. Exemple : FIRST_NAME, LAST_NAME
help.duplicateDetectionCheckColumns=Colonnes spécifiques à comparer pour les doublons. Si omis, toutes sauf les colonnes clés sont vérifiées.
help.duplicateDetectionExcludeColumns=Colonnes à ignorer lors de la détection des doublons.
help.duplicateDetectionMode=Mode de détection : exact (correspondance exacte), fuzzy (basé sur la similarité), partial (partiel). Valeur par défaut : exact
help.duplicateDetectionThreshold=Seuil de similarité pour l’appariement flou (0-1). Valeur par défaut : 0.95
help.duplicateDetectionOutput=Chemin du fichier pour le rapport de doublons. Si non fourni, les résultats s’affichent dans la console.
help.duplicateDetectionFormat=Format du rapport : json (structuré), csv (tabulaire), summary (aperçu). Valeur par défaut : summary
help.duplicateDetectionLimit=Nombre maximal de lignes à vérifier. Valeur par défaut : 10000
help.duplicateDetectionTimeout=Temps maximal en secondes pour l’opération. Valeur par défaut : 3600 (1 heure)
info.startingDuplicateDetection=Démarrage de la détection des doublons pour la table {0}
success.duplicateDetectionComplete=Détection des doublons terminée. Total : {0}, Uniques : {1}, Groupes de doublons : {2}, Total des doublons : {3}
error.duplicateDetection=Erreur de détection des doublons : {0}
error.noColumns=Aucune colonne trouvée dans la table
error.noColumnsDetailed=Aucune colonne trouvée dans la table {0}. Schéma : {1}
warning.duplicateDetectionCheckColumnsMissing=Colonnes demandées introuvables : {0}. Colonnes disponibles : {1}
warning.duplicateDetectionCheckColumnsNone=Aucune des colonnes demandées n’a été trouvée : {0}. Colonnes disponibles : {1}
