title=データ差分
dataDiff=詳細な変更追跡による2つのデータセット間の相違を表示
dataDiffTable1=最初のテーブル名
dataDiffTable2=2番目のテーブル名
dataDiffSchema1=最初のテーブルのスキーマ
dataDiffSchema2=2番目のテーブルのスキーマ
dataDiffKeyColumns=照合用キー列（カンマ区切り）
dataDiffCompareColumns=比較する列（カンマ区切り、オプション）
dataDiffOutput=出力レポートファイルパス
dataDiffFormat=レポート形式（json、csv、summary）
dataDiffLimit=比較する最大行数
dataDiffShowValues=レポートに実際の値を表示
dataDiffTimeout=操作タイムアウト（秒）
help.dataDiffTable1=比較する最初のテーブル名。例：EMPLOYEES
help.dataDiffTable2=比較する2番目のテーブル名。例：EMPLOYEES_NEW
help.dataDiffSchema1=最初のテーブルを含むスキーマ。指定しない場合は現在のスキーマを使用します。
help.dataDiffSchema2=2番目のテーブルを含むスキーマ。指定しない場合は最初のスキーマを使用します。
help.dataDiffKeyColumns=行を一意に識別する列のカンマ区切りリスト。例：EMP_ID または DEPT_ID, EMP_ID
help.dataDiffCompareColumns=比較する特定の列のカンマ区切りリスト。指定しない場合は共通列がすべて比較されます。
help.dataDiffOutput=差分レポートのファイルパス。指定しない場合は結果がコンソールに表示されます。
help.dataDiffFormat=レポート形式：json（構造化）、csv（表形式）、summary（概要）。デフォルト：summary
help.dataDiffLimit=各テーブルから処理する最大行数。デフォルト：10000
help.dataDiffShowValues=レポートに実際の列の値を含めます。デフォルト：false
help.dataDiffTimeout=操作の最大時間（秒）。デフォルト：3600（1時間）
info.startingDataDiff={0} と {1} 間のデータ差分比較を開始しています
success.dataDiffComplete=データ差分完了。同一：{0}、相違：{1}、テーブル1のみ：{2}、テーブル2のみ：{3}
error.dataDiff=データ差分エラー：{0}
error.noKeyColumns=行照合のためのキー列が指定されていません
