help.dataValidatorTable = सत्यापित करने के लिए तालिका का नाम। उदाहरण: EMPLOYEES
help.dataValidatorSchema = तालिका युक्त स्कीमा। यदि प्रदान नहीं किया गया, वर्तमान स्कीमा का उपयोग करता है।
help.dataValidatorRules = सत्यापन नियम प्रारूप में: column1:required,email;column2:numeric,range:0:100
help.dataValidatorRulesFile = सत्यापन नियमों युक्त फाइल का पथ
help.dataValidatorColumns = सत्यापित करने के लिए विशिष्ट स्तंभों की अल्पविराम से अलग की गई सूची। यदि छोड़ा गया, सभी को सत्यापित किया जाता है।
help.dataValidatorOutput = सत्यापन रिपोर्ट के लिए फाइल पथ। यदि प्रदान नहीं किया गया, परिणाम कंसोल में प्रदर्शित होते हैं।
help.dataValidatorFormat = रिपोर्ट प्रारूप: json (संरचित), csv (सारणीबद्ध), summary (अवलोकन), detailed (पूर्ण परिणाम)। डिफ़ॉल्ट: summary
help.dataValidatorLimit = सत्यापित करने के लिए अधिकतम पंक्तियां। डिफ़ॉल्ट: 10000
help.dataValidatorStopOnFirstError = पहली त्रुटि का सामना करने के बाद सत्यापन बंद करें। डिफ़ॉल्ट: false
help.dataValidatorTimeout = ऑपरेशन के लिए अधिकतम समय सेकंड में। डिफ़ॉल्ट: 3600 (1 घंटा)
info.startingDataValidation = तालिका {0} के लिए डेटा सत्यापन शुरू कर रहे हैं
success.dataValidationComplete = डेटा सत्यापन पूर्ण। कुल: {0}, मान्य: {1}, अमान्य: {2}, त्रुटियां: {3}
error.dataValidator = डेटा सत्यापन त्रुटि: {0}
error.noValidationRules = कोई सत्यापन नियम निर्दिष्ट या नहीं मिले
