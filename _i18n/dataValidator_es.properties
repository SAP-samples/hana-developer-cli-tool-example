title=Validador de datos
dataValidator=Validar datos contra reglas de negocio y restricciones
dataValidatorTable=Nombre de la tabla a validar
dataValidatorSchema=Esquema de la tabla
dataValidatorRules=Reglas de validación (formato columna:regla)
dataValidatorRulesFile=Ruta al archivo de reglas de validación
dataValidatorColumns=Columnas a validar (separadas por comas, opcional)
dataValidatorOutput=Ruta del archivo de informe de salida
dataValidatorFormat=Formato del informe (json, csv, summary, detailed)
dataValidatorLimit=Número máximo de filas a validar
dataValidatorStopOnFirstError=Detener el procesamiento después del primer error
dataValidatorTimeout=Tiempo de espera de la operación en segundos
help.dataValidatorTable=Nombre de la tabla a validar. Ejemplo: EMPLOYEES
help.dataValidatorSchema=Esquema que contiene la tabla. Si no se proporciona, se usa el esquema actual.
help.dataValidatorRules=Reglas de validación en formato: columna1:required,email;columna2:numeric,range:0:100
help.dataValidatorRulesFile=Ruta al archivo que contiene las reglas de validación
help.dataValidatorColumns=Lista separada por comas de columnas específicas a validar. Si se omite, se validan todas.
help.dataValidatorOutput=Ruta del archivo para el informe de validación. Si no se proporciona, los resultados se muestran en la consola.
help.dataValidatorFormat=Formato del informe: json (estructurado), csv (tabular), summary (resumen), detailed (resultados completos). Predeterminado: summary
help.dataValidatorLimit=Número máximo de filas a validar. Predeterminado: 10000
help.dataValidatorStopOnFirstError=Detener la validación después de encontrar el primer error. Predeterminado: false
help.dataValidatorTimeout=Tiempo máximo en segundos para la operación. Predeterminado: 3600 (1 hora)
info.startingDataValidation=Iniciando validación de datos para la tabla {0}
success.dataValidationComplete=Validación de datos completa. Total: {0}, Válidas: {1}, Inválidas: {2}, Errores: {3}
error.dataValidator=Error de validación de datos: {0}
error.noValidationRules=No se especificaron ni encontraron reglas de validación
