title=Referential Check
referentialCheck=Verify referential integrity and foreign key constraints
referentialCheckTable=Table Name to Check
referentialCheckSchema=Schema for Table
referentialCheckConstraints=Specific Constraints to Check (comma-separated, optional)
referentialCheckMode=Check Mode (check, report, repair, detailed)
referentialCheckOutput=Output Report File Path
referentialCheckFormat=Report Format (json, csv, summary)
referentialCheckLimit=Maximum Rows to Check
referentialCheckTimeout=Operation Timeout in Seconds
help.referentialCheckTable=Name of the table to check for referential integrity. Example: ORDERS
help.referentialCheckSchema=Schema containing the table. If not provided, uses current schema.
help.referentialCheckConstraints=Comma-separated list of specific constraint names to check. If omitted, all are checked.
help.referentialCheckMode=Check mode: check (identify violations), report (generate report), repair (attempt to fix), detailed (full analysis). Default: check
help.referentialCheckOutput=File path for integrity report. If not provided, results display in console.
help.referentialCheckFormat=Report format: json (structured), csv (tabular), summary (overview). Default: summary
help.referentialCheckLimit=Maximum rows to check for orphaned records. Default: 10000
help.referentialCheckTimeout=Maximum time in seconds for operation. Default: 3600 (1 hour)
info.startingReferentialCheck=Starting referential integrity check for table {0}
info.noForeignKeys=No foreign keys found for table {0}
success.referentialCheckComplete=Referential check complete. Total FK: {0}, Valid: {1}, Violated: {2}, Orphaned Records: {3}
error.referentialCheck=Referential check error: {0}
