title=Wykrywanie duplikatów
duplicateDetection=Znajdź duplikaty rekordów w tabeli
duplicateDetectionTable=Nazwa tabeli do sprawdzenia
duplicateDetectionSchema=Schemat dla tabeli
duplicateDetectionKeyColumns=Kolumny kluczowe do dopasowania (oddzielone przecinkami)
duplicateDetectionCheckColumns=Kolumny do sprawdzenia pod kątem duplikatów (oddzielone przecinkami, opcjonalnie)
duplicateDetectionExcludeColumns=Kolumny do wykluczenia ze sprawdzenia (oddzielone przecinkami, opcjonalnie)
duplicateDetectionMode=Tryb wykrywania (exact, fuzzy, partial)
duplicateDetectionThreshold=Próg podobieństwa dla dopasowania rozmytego (0-1)
duplicateDetectionOutput=Ścieżka pliku raportu wyjściowego
duplicateDetectionFormat=Format raportu (json, csv, summary)
duplicateDetectionLimit=Maksymalna liczba wierszy do sprawdzenia
duplicateDetectionTimeout=Limit czasu operacji w sekundach
duplicateDetectionExample=Przykład: hana-cli duplicateDetection --table MY_TABLE --mode exact --threshold 0.95
help.duplicateDetectionTable=Nazwa tabeli do sprawdzenia pod kątem duplikatów. Przykład: CUSTOMERS
help.duplicateDetectionSchema=Schemat zawierający tabelę. Jeśli nie podano, używa bieżącego schematu.
help.duplicateDetectionKeyColumns=Lista kolumn używanych do dopasowania oddzielonych przecinkami. Przykład: FIRST_NAME, LAST_NAME
help.duplicateDetectionCheckColumns=Określone kolumny do porównania pod kątem duplikatów. Jeśli pominięto, sprawdzane są wszystkie z wyjątkiem kolumn kluczowych.
help.duplicateDetectionExcludeColumns=Kolumny do pominięcia podczas wykrywania duplikatów.
help.duplicateDetectionMode=Tryb wykrywania: exact (dokładne dopasowanie), fuzzy (oparte na podobieństwie), partial (częściowe dopasowanie). Domyślnie: exact
help.duplicateDetectionThreshold=Próg podobieństwa dla dopasowania rozmytego (0-1). Domyślnie: 0.95
help.duplicateDetectionOutput=Ścieżka pliku dla raportu duplikatów. Jeśli nie podano, wyniki są wyświetlane w konsoli.
help.duplicateDetectionFormat=Format raportu: json (strukturalny), csv (tabelaryczny), summary (przegląd). Domyślnie: summary
help.duplicateDetectionLimit=Maksymalna liczba wierszy do sprawdzenia. Domyślnie: 10000
help.duplicateDetectionTimeout=Maksymalny czas w sekundach dla operacji. Domyślnie: 3600 (1 godzina)
info.startingDuplicateDetection=Rozpoczynanie wykrywania duplikatów dla tabeli {0}
success.duplicateDetectionComplete=Wykrywanie duplikatów zakończone. Łącznie: {0}, Unikalne: {1}, Grupy duplikatów: {2}, Łączna liczba duplikatów: {3}
error.duplicateDetection=Błąd wykrywania duplikatów: {0}
error.noColumns=Nie znaleziono kolumn w tabeli
error.noColumnsDetailed=Nie znaleziono kolumn w tabeli {0}. Schemat: {1}
warning.duplicateDetectionCheckColumnsMissing=Żądane kolumny sprawdzenia nie zostały znalezione: {0}. Dostępne kolumny: {1}
warning.duplicateDetectionCheckColumnsNone=Żadna z żądanych kolumn sprawdzenia nie została znaleziona: {0}. Dostępne kolumny: {1}
