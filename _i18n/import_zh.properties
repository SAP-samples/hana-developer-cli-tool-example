help.filename=源文件的完整路径(CSV 或 Excel)。示例:/home/user/data.csv 或 C:\\data\\sales.xlsx
help.table=目标 HANA 表的名称。表必须已存在于数据库中。示例:EMPLOYEES 或 SCHEMA.TABLE_NAME
help.outputFormat=输出格式:CSV 表示逗号分隔值,Excel 表示 .xlsx 文件
help.matchMode=自动:先尝试按名称匹配,然后按位置。名称:仅按列名匹配。顺序:按列位置匹配。
help.truncate=选中以在导入新数据之前删除目标表中的所有现有数据。注意:这将永久删除所有数据!
help.batchSize=每批处理的行数。较大的批次更快(1000+)。较小的批次使用更少内存(100-500)。
help.worksheet=对于 Excel 文件,要导入的工作表(从1开始:1 = 第一个工作表,2 = 第二个工作表,等等)。对于 CSV 文件忽略此项。
help.startRow=从哪一行开始读取(从1开始)。使用 2 跳过标题行,使用 5 跳过前 4 行。
help.skipEmptyRows=选中以跳过任何列中都没有数据的行。建议保持数据质量。
help.excelCacheMode=缓存:将整个文件加载到内存中(对小文件更快)。发送:流式传输文件内容(对大于 100MB 的大文件更好)。
help.dryRun=选中以预览导入而不实际修改数据库。显示将要导入的内容和将会发生的任何错误。
help.maxFileSizeMB=接受的最大文件大小(MB)。大于此值的文件将被拒绝。默认 500MB 可防止消耗过多资源。
help.timeoutSeconds=导入过程允许的最大时间(秒)。如果导入超过此时间,它将被终止。默认 3600 = 1小时。
help.nullValues=要视为 NULL 的值的逗号分隔列表。示例:"null,NULL,#N/A,,N/A" 将这些字符串转换为数据库 NULL 值。
help.skipWithErrors=选中以在某些行遇到错误时继续导入。跳过的行将被记录。与"允许的最大错误数"结合使用以设置限制。
help.maxErrorsAllowed=停止导入前允许的最大错误数(-1 = 无限制)。设置为 0 表示不容忍错误。设置为 10 表示在 10 个错误后停止。
error.processingMessage=处理 WebSocket 消息时出错
error.timeoutExceeded=导入超时超出限制
error.maxErrorsReached=达到最大错误数
success.importComplete=导入成功完成
success.dryRunComplete=试运行完成 - 未导入数据
info.rowsProcessed=已处理行数:{0}
info.rowsInserted=已插入行数:{0}
info.rowsSkipped=已跳过行数:{0}
info.errorsEncountered=遇到的错误:{0}
info.fileSize=文件大小:{0} MB
info.duration=持续时间:{0} 秒
info.truncating=导入前截断表...
info.analyzing=分析文件结构...
info.validating=验证数据...
info.importing=导入数据...
