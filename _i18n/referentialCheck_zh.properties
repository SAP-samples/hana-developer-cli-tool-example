title=参考完整性检查
referentialCheck=验证参考完整性和外键约束
referentialCheckTable=要检查的表名称
referentialCheckSchema=表的模式
referentialCheckConstraints=要检查的特定约束（逗号分隔，可选）
referentialCheckMode=检查模式（检查、报告、修复、详细）
referentialCheckOutput=输出报告文件路径
referentialCheckFormat=报告格式（json、csv、摘要）
referentialCheckLimit=最大检查行数
referentialCheckTimeout=操作超时（秒）
help.referentialCheckTable=要检查参考完整性的表的名称。示例：ORDERS
help.referentialCheckSchema=包含该表的模式。如果未提供，则使用当前模式。
help.referentialCheckConstraints=要检查的特定约束名称的逗号分隔列表。如果省略，则检查所有约束。
help.referentialCheckMode=检查模式：check（识别违规）、report（生成报告）、repair（尝试修复）、detailed（完整分析）。默认值：check
help.referentialCheckOutput=完整性报告的文件路径。如果未提供，结果将显示在控制台中。
help.referentialCheckFormat=报告格式：json（结构化）、csv（表格式）、summary（概览）。默认值：summary
help.referentialCheckLimit=要检查孤立记录的最大行数。默认值：10000
help.referentialCheckTimeout=操作的最大时间（秒）。默认值：3600（1小时）
info.startingReferentialCheck=开始对表 {0} 进行参考完整性检查
info.noForeignKeys=未为表 {0} 找到外键
success.referentialCheckComplete=参考完整性检查完成。总外键：{0}，有效：{1}，违规：{2}，孤立记录：{3}
error.referentialCheck=参考完整性检查错误：{0}
