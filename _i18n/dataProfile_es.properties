title=Perfil de datos
dataProfile=Generar métricas de calidad de datos y análisis estadístico para tablas
dataProfileTable=Nombre de la tabla de destino
dataProfileSchema=Nombre del esquema de destino
dataProfileColumns=Columnas para perfilar (separadas por comas, opcional)
dataProfileOutput=Ruta del archivo de informe de salida
dataProfileFormat=Formato del informe (json, csv, summary)
dataProfileNullAnalysis=Incluir análisis de valores NULL
dataProfileCardinalityAnalysis=Incluir análisis de cardinalidad
dataProfileStatisticalAnalysis=Incluir análisis estadístico (min, max, avg)
dataProfilePatternAnalysis=Incluir análisis de patrones (estadísticas de longitud)
dataProfileSampleSize=Número máximo de filas a analizar
dataProfileTimeout=Tiempo de espera de la operación en segundos
help.dataProfileTable=Nombre de la tabla a perfilar. Ejemplo: EMPLOYEES o SCHEMA.TABLE_NAME
help.dataProfileSchema=Esquema que contiene la tabla. Si no se proporciona, se usa el esquema actual.
help.dataProfileColumns=Lista separada por comas de columnas específicas a perfilar. Si no se proporciona, se perfilan todas las columnas.
help.dataProfileOutput=Ruta del archivo para el informe de perfilado. Si no se proporciona, los resultados se muestran en la consola.
help.dataProfileFormat=Formato del informe: json (estructurado), csv (tabular), summary (resumen). Predeterminado: summary
help.dataProfileNullAnalysis=Calcular el recuento y porcentaje de NULL. Predeterminado: true
help.dataProfileCardinalityAnalysis=Calcular el número de valores distintos. Predeterminado: true
help.dataProfileStatisticalAnalysis=Calcular valores mínimos, máximos y promedios. Predeterminado: true
help.dataProfilePatternAnalysis=Calcular estadísticas de longitud de cadenas. Predeterminado: false (más lento)
help.dataProfileSampleSize=Número máximo de filas a analizar (limita tablas grandes). Predeterminado: 10000
help.dataProfileTimeout=Tiempo máximo en segundos para el perfilado. Predeterminado: 3600 (1 hora)
info.startingDataProfile=Iniciando análisis de perfil de datos para la tabla: {0}
success.dataProfileComplete=Perfil de datos completado para la tabla {0}. Filas: {1}, Columnas: {2}
error.dataProfile=Error de perfil de datos: {0}
error.tableNotFound=Tabla no encontrada: {0}
