help.filename=원본 파일의 전체 경로 (CSV 또는 Excel). 예: /home/user/data.csv 또는 C:\\data\\sales.xlsx
help.table=대상 HANA 테이블 이름. 테이블이 데이터베이스에 이미 존재해야 합니다. 예: EMPLOYEES 또는 SCHEMA.TABLE_NAME
help.outputFormat=출력 형식: CSV는 쉼표로 구분된 값, Excel은 .xlsx 파일
help.matchMode=자동: 먼저 이름별 매칭을 시도한 다음 위치별 시도. 이름: 컬럼 이름만 사용하여 매칭. 순서: 컬럼 위치로 매칭.
help.truncate=새 데이터를 가져오기 전에 대상 테이블에서 기존 데이터를 모두 삭제하려면 선택합니다. 주의: 모든 데이터가 영구적으로 삭제됩니다!
help.batchSize=각 배치에서 처리할 행 수. 큰 배치가 더 빠릅니다 (1000+). 작은 배치는 메모리를 적게 사용합니다 (100-500).
help.worksheet=Excel 파일의 경우 가져올 워크시트 (1부터 시작: 1 = 첫 번째 시트, 2 = 두 번째 시트 등). CSV 파일에서는 무시됩니다.
help.startRow=읽기를 시작할 행 (1부터 시작). 헤더 행을 건너뛰려면 2를 사용하고, 처음 4행을 건너뛰려면 5를 사용합니다.
help.skipEmptyRows=어떤 컬럼에도 데이터가 없는 행을 건너뛰려면 선택합니다. 데이터 품질 유지를 위해 권장됩니다.
help.excelCacheMode=캐시: 전체 파일을 메모리에 로드합니다 (작은 파일에 더 빠름). 방출: 파일 내용을 스트리밍합니다 (큰 파일 >100MB에 더 좋음).
help.dryRun=실제로 데이터베이스를 수정하지 않고 가져오기를 미리 보려면 선택합니다. 가져올 내용과 발생할 오류를 보여줍니다.
help.maxFileSizeMB=허용할 최대 파일 크기 (MB). 이보다 큰 파일은 거부됩니다. 기본값 500MB는 너무 많은 리소스 소비를 방지합니다.
help.timeoutSeconds=가져오기 프로세스에 허용되는 최대 시간(초). 가져오기가 이 시간을 초과하면 종료됩니다. 기본값 3600 = 1시간.
help.nullValues=NULL로 처리할 값의 쉼표로 구분된 목록. 예: "null,NULL,#N/A,,N/A"는 이러한 문자열을 데이터베이스 NULL 값으로 변환합니다.
help.skipWithErrors=일부 행에서 오류가 발생하더라도 가져오기를 계속하려면 선택합니다. 건너뛴 행은 로그에 기록됩니다. 허용되는 최대 오류 수와 결합하여 제한을 설정합니다.
help.maxErrorsAllowed=가져오기를 중지하기 전 허용되는 최대 오류 수 (-1 = 무제한). 허용 안 함은 0으로 설정. 10개 오류 후 중지하려면 10으로 설정.
error.processingMessage=WebSocket 메시지 처리 오류
error.timeoutExceeded=가져오기 타임아웃 초과
error.maxErrorsReached=최대 오류 수에 도달했습니다
success.importComplete=가져오기가 성공적으로 완료되었습니다
success.dryRunComplete=드라이 런 완료 - 데이터가 가져오지 않았습니다
info.rowsProcessed=처리된 행: {0}
info.rowsInserted=삽입된 행: {0}
info.rowsSkipped=건너뛴 행: {0}
info.errorsEncountered=발생한 오류: {0}
info.fileSize=파일 크기: {0} MB
info.duration=소요 시간: {0}초
info.truncating=가져오기 전에 테이블을 자릅니다...
info.analyzing=파일 구조를 분석합니다...
info.validating=데이터를 검증합니다...
info.importing=데이터를 가져옵니다...
