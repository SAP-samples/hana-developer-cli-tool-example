title=Różnice danych
dataDiff=Pokaż różnice między dwoma zestawami danych ze szczegółowym śledzeniem zmian
dataDiffTable1=Nazwa pierwszej tabeli
dataDiffTable2=Nazwa drugiej tabeli
dataDiffSchema1=Schemat dla pierwszej tabeli
dataDiffSchema2=Schemat dla drugiej tabeli
dataDiffKeyColumns=Kolumny kluczowe do dopasowania (oddzielone przecinkami)
dataDiffCompareColumns=Kolumny do porównania (oddzielone przecinkami, opcjonalnie)
dataDiffOutput=Ścieżka pliku raportu wyjściowego
dataDiffFormat=Format raportu (json, csv, summary)
dataDiffLimit=Maksymalna liczba wierszy do porównania
dataDiffShowValues=Pokaż rzeczywiste wartości w raporcie
dataDiffTimeout=Limit czasu operacji w sekundach
help.dataDiffTable1=Nazwa pierwszej tabeli do porównania. Przykład: EMPLOYEES
help.dataDiffTable2=Nazwa drugiej tabeli do porównania. Przykład: EMPLOYEES_NEW
help.dataDiffSchema1=Schemat zawierający pierwszą tabelę. Jeśli nie podano, używa bieżącego schematu.
help.dataDiffSchema2=Schemat zawierający drugą tabelę. Jeśli nie podano, używa pierwszego schematu.
help.dataDiffKeyColumns=Lista kolumn oddzielonych przecinkami, które jednoznacznie identyfikują wiersze. Przykład: EMP_ID lub DEPT_ID, EMP_ID
help.dataDiffCompareColumns=Lista określonych kolumn do porównania oddzielonych przecinkami. Jeśli nie podano, porównywane są wszystkie wspólne kolumny.
help.dataDiffOutput=Ścieżka pliku dla raportu różnic. Jeśli nie podano, wyniki są wyświetlane w konsoli.
help.dataDiffFormat=Format raportu: json (strukturalny), csv (tabelaryczny), summary (przegląd). Domyślnie: summary
help.dataDiffLimit=Maksymalna liczba wierszy z każdej tabeli do przetworzenia. Domyślnie: 10000
help.dataDiffShowValues=Dołącz rzeczywiste wartości kolumn w raporcie. Domyślnie: false
help.dataDiffTimeout=Maksymalny czas w sekundach dla operacji. Domyślnie: 3600 (1 godzina)
info.startingDataDiff=Rozpoczynanie porównania różnic danych między {0} a {1}
success.dataDiffComplete=Różnice danych zakończone. Identyczne: {0}, Różne: {1}, TylkoWTabeli1: {2}, TylkoWTabeli2: {3}
error.dataDiff=Błąd różnic danych: {0}
error.noKeyColumns=Nie określono kolumn kluczowych do dopasowania wierszy
