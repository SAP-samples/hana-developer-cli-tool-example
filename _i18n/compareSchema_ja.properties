title=スキーマ比較
compareSchema=環境間でデータベーススキーマ構造を比較
compareSchemaSourceSchema=ソーススキーマ名
compareSchemaTargetSchema=ターゲットスキーマ名
compareSchemaTableFilter=テーブル名フィルタ（カンマ区切り、オプション）
compareSchemaCompareIndexes=インデックスを比較
compareSchemaCompareTriggers=トリガーを比較
compareSchemaCompareConstraints=制約を比較
compareSchemaOutput=出力レポートファイルパス
compareSchemaTimeout=操作タイムアウト（秒）
help.compareSchemaSourceSchema=比較する最初のスキーマ名。例：SCHEMA1
help.compareSchemaTargetSchema=比較する2番目のスキーマ名。例：SCHEMA2
help.compareSchemaTableFilter=比較する特定のテーブルのカンマ区切りリスト（オプション）。指定しない場合はすべてのテーブルが比較されます。
help.compareSchemaCompareIndexes=スキーマ比較にインデックス定義を含めます。デフォルト：true
help.compareSchemaCompareTriggers=スキーマ比較にトリガー定義を含めます。デフォルト：true
help.compareSchemaCompareConstraints=スキーマ比較に制約定義を含めます。デフォルト：true
help.compareSchemaOutput=比較レポートのファイルパス。指定しない場合は結果がコンソールに表示されます。
help.compareSchemaTimeout=比較の最大時間（秒）。デフォルト：3600（1時間）
info.startingSchemaComparison={0} と {1} 間のスキーマ比較を開始しています
success.schemaComparisonComplete=スキーマ比較完了。テーブル一致：{0}、テーブル相違：{1}、ソースのみ：{2}、ターゲットのみ：{3}
error.compareSchema=スキーマ比較エラー：{0}
errSchemaRequired=ソースとターゲットのスキーマ名が必要です
compareSchemaExample=2つのデータベーススキーマを比較
