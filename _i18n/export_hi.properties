help.exportWhere = निर्यात की गई पंक्तियों को फ़िल्टर करने के लिए वैकल्पिक WHERE खंड। उदाहरण: SALARY > 50000
help.exportLimit = निर्यात करने के लिए अधिकतम पंक्तियों की संख्या। डिफ़ॉल्ट: 1000000
