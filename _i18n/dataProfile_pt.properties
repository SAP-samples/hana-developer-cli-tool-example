título=Perfil de Dados
dataProfile=Gerar métricas de qualidade de dados e análise estatística para tabelas
dataProfileTable=Nome da Tabela Alvo
dataProfileSchema=Nome do Esquema Alvo
dataProfileColumns=Colunas a Perfilar (separadas por vírgula, opcional)
dataProfileOutput=Caminho do Ficheiro do Relatório de Saída
dataProfileFormat=Formato do Relatório (json, csv, resumo)
dataProfileNullAnalysis=Incluir Análise de Valores NULL
dataProfileCardinalityAnalysis=Incluir Análise de Cardinalidade
dataProfileStatisticalAnalysis=Incluir Análise Estatística (mín, máx, média)
dataProfilePatternAnalysis=Incluir Análise de Padrões (estatísticas de comprimento)
dataProfileSampleSize=Número Máximo de Linhas a Analisar
dataProfileTimeout=Tempo Limite da Operação em Segundos
help.dataProfileTable=Nome da tabela a perfilar. Exemplo: EMPLOYEES ou SCHEMA.TABLE_NAME
help.dataProfileSchema=Esquema contendo a tabela. Se não fornecido, usa o esquema atual.
help.dataProfileColumns=Lista separada por vírgula de colunas específicas a perfilar. Se não fornecido, todas as colunas são perfiladas.
help.dataProfileOutput=Caminho do ficheiro para o relatório de perfilação. Se não fornecido, os resultados aparecem na consola.
help.dataProfileFormat=Formato do relatório: json (estruturado), csv (tabular), resumo (visão geral). Padrão: resumo
help.dataProfileNullAnalysis=Calcular contagem e percentagem de NULLs. Padrão: true
help.dataProfileCardinalityAnalysis=Calcular contagem de valores distintos. Padrão: true
help.dataProfileStatisticalAnalysis=Calcular valores mínimo, máximo e médio. Padrão: true
help.dataProfilePatternAnalysis=Calcular estatísticas de comprimento de sequências. Padrão: false (mais lento)
help.dataProfileSampleSize=Número máximo de linhas a analisar (limita tabelas grandes). Padrão: 10000
help.dataProfileTimeout=Tempo máximo em segundos para perfilação. Padrão: 3600 (1 hora)
info.startingDataProfile=Iniciando análise de perfil de dados para tabela: {0}
success.dataProfileComplete=Perfil de dados completo para tabela {0}. Linhas: {1}, Colunas: {2}
error.dataProfile=Erro no perfil de dados: {0}
error.tableNotFound=Tabela não encontrada: {0}

