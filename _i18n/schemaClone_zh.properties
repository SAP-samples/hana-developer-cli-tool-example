title=模式克隆
schemaClone=克隆整个模式(带或不带数据)
schemaCloneSourceSchema=源模式名称
schemaCloneTargetSchema=目标模式名称
schemaCloneIncludeData=在克隆中包含表数据
schemaCloneIncludeGrants=包含授权和权限
schemaCloneParallel=并行操作数
schemaCloneExcludeTables=要排除的表(逗号分隔)
schemaCloneTimeout=操作超时时间(秒)
help.schemaCloneSourceSchema=要克隆的源模式名称。示例:PROD_SCHEMA
help.schemaCloneTargetSchema=要克隆到的目标模式名称。如果不存在将被创建。示例:DEV_SCHEMA
help.schemaCloneIncludeData=克隆表数据以及结构。如果为 false,则仅克隆结构。默认值:false
help.schemaCloneIncludeGrants=将授权和权限从源模式复制到目标模式。默认值:false
help.schemaCloneParallel=并行克隆操作数。较高的值可能会提高性能。默认值:1
help.schemaCloneExcludeTables=要从克隆中排除的表的逗号分隔列表。示例:TEMP_TABLE,LOG_TABLE
help.schemaCloneTimeout=模式克隆操作的最大时间(秒)。默认值:7200(2小时)
info.startingSchemaClone=开始从 {0} 克隆模式到 {1}
info.targetSchemaExists=目标模式 {0} 已存在
info.creatingTargetSchema=正在创建目标模式 {0}
info.foundTables=找到 {0} 个要克隆的表
info.cloningTable=正在克隆表:{0}
info.copiedRows=已将 {0} 行复制到表 {1}
info.foundViews=找到 {0} 个要克隆的视图
info.cloningView=正在克隆视图:{0}
info.viewCloneSkipped=视图 {0} 已跳过(需要手动 DDL 转换)
info.cloningGrants=正在克隆授权和权限
info.foundGrants=找到 {0} 个要克隆的授权
success.schemaCloneComplete=模式克隆完成。源:{0}、目标:{1}、表:{2}、行:{3}
error.schemaClone=模式克隆错误:{0}
error.sourceSchemaNotFound=未找到源模式 {0}
error.tableCloneFailed=克隆表 {0} 失败:{1}
error.viewCloneFailed=克隆视图 {0} 失败:{1}
