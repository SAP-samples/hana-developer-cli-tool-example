title=Data Synchronization
dataSync=Sincronizar dados entre sistemas ou tabelas
dataSyncSourceConnection=Perfil de Conexão Origem ou String de Conexão
dataSyncTargetConnection=Perfil de Conexão Destino ou String de Conexão
dataSyncSchema=Nome do Esquema
dataSyncTable=Nome da Tabela a Sincronizar
dataSyncMode=Modo de Sincronização (completo ou incremental)
dataSyncBatchSize=Tamanho de Lote para Processamento
dataSyncConflictResolution=Estratégia de Resolução de Conflitos (origem, destino ou ignorar)
dataSyncKeyColumns=Colunas-Chave para Correspondência de Linhas (separadas por vírgula)
dataSyncTimeout=Tempo Limite da Operação em Segundos
help.dataSyncSourceConnection=Perfil de conexão de base de dados origem ou string de conexão. Exemplo: DEV_DB
help.dataSyncTargetConnection=Perfil de conexão de base de dados destino ou string de conexão. Exemplo: PROD_DB
help.dataSyncSchema=Esquema contendo a tabela a sincronizar. Padrão: esquema atual
help.dataSyncTable=Nome da tabela a sincronizar. Exemplo: CUSTOMERS
help.dataSyncMode=Modo de sincronização: 'completo' (sincronização completa) ou 'incremental' (apenas alterações). Padrão: completo
help.dataSyncBatchSize=Número de linhas a processar em cada lote. Padrão: 1000
help.dataSyncConflictResolution=Como resolver conflitos: 'origem' (origem vence), 'destino' (destino vence), 'ignorar' (ignorar conflito). Padrão: origem
help.dataSyncKeyColumns=Lista separada por vírgula de colunas-chave para correspondência de linhas. Exemplo: ID ou CUSTOMER_ID, REGION
help.dataSyncTimeout=Tempo máximo em segundos para sincronização. Padrão: 3600 (1 hora)
info.startingSynchronization=Iniciando sincronização de dados para {0}.{1}
info.rowsRead=Lidas {0} linhas da tabela origem
info.fullSyncMode=Utilizando modo de sincronização completa
info.incrementalSyncMode=Utilizando modo de sincronização incremental
success.syncComplete=Sincronização completa. {0} linhas sincronizadas para tabela {1}
error.dataSync=Erro na sincronização de dados: {0}

