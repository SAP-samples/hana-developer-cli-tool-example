title=Daten vergleichen
compareData=Daten zwischen zwei Tabellen oder Schemas auf Unterschiede vergleichen
compareDataSourceTable=Name der Quelltabelle
compareDataSourceSchema=Name des Quellschemas
compareDataTargetTable=Name der Zieltabelle
compareDataTargetSchema=Name des Zielschemas
compareDataKeyColumns=Schlüsselspalten zum Abgleich (kommagetrennt)
compareDataOutput=Pfad der Ausgabebericht-Datei
compareDataColumns=Zu vergleichende Spalten (kommagetrennt, optional)
compareDataShowMatches=Übereinstimmungsdetails anzeigen
compareDataLimit=Maximale Anzahl der zu vergleichenden Zeilen
compareDataTimeout=Zeitüberschreitung für Betrieb (Sekunden)
help.compareDataSourceTable=Name der ersten zu vergleichenden Tabelle. Beispiel: MITARBEITER oder SCHEMA.TABELLENNAME
help.compareDataSourceSchema=Schema, das die Quelltabelle enthält. Wenn nicht angegeben, wird das aktuelle Schema verwendet.
help.compareDataTargetTable=Name der zweiten zu vergleichenden Tabelle. Beispiel: MITARBEITER_NEU
help.compareDataTargetSchema=Schema, das die Zieltabelle enthält. Wenn nicht angegeben, wird das Quellschema verwendet.
help.compareDataKeyColumns=Kommagetrennte Liste von Schlüsselspalten zum Abgleich von Zeilen zwischen Tabellen. Beispiel: EMP_ID oder ID, DEPT_ID
help.compareDataOutput=Dateipfad für Vergleichsbericht. Wenn nicht angegeben, werden die Ergebnisse in der Konsole angezeigt.
help.compareDataColumns=Kommagetrennte Liste von Spalten zum Vergleich. Wenn nicht angegeben, werden alle gemeinsamen Spalten verglichen.
help.compareDataShowMatches=Details der übereinstimmenden Zeilen im Bericht anzeigen. Standard: false
help.compareDataLimit=Maximale Anzahl der Zeilen zum Vergleich aus jeder Tabelle. Standard: 1000
help.compareDataTimeout=Maximale Zeit in Sekunden für den Vergleich. Standard: 3600 (1 Stunde)
info.startingDataComparison=Starte Datenvergleich zwischen {0} und {1}
success.comparisonComplete=Vergleich abgeschlossen. Quelle: {0} Zeilen, Ziel: {1} Zeilen, Übereinstimmungen: {2}, Unterschiede: {3}, Nur in Quelle: {4}, Nur in Ziel: {5}
error.compareData=Datenvergleichsfehler: {0}
error.noKeyColumns=Keine Schlüsselspalten für Zeilenabgleich angegeben
error.schemaRequired=Quell- und Zielschemas sind erforderlich
