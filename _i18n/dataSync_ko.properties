title=데이터 동기화
dataSync=시스템 또는 테이블 간 데이터 동기화
dataSyncSourceConnection=원본 연결 프로파일 또는 연결 문자열
dataSyncTargetConnection=대상 연결 프로파일 또는 연결 문자열
dataSyncSchema=스키마 이름
dataSyncTable=동기화할 테이블 이름
dataSyncMode=동기화 모드 (full 또는 incremental)
dataSyncBatchSize=처리를 위한 배치 크기
dataSyncConflictResolution=충돌 해결 전략 (source, target, 또는 skip)
dataSyncKeyColumns=행 매칭을 위한 키 컬럼 (쉼표로 구분)
dataSyncTimeout=작업 타임아웃 (초)
help.dataSyncSourceConnection=원본 데이터베이스 연결 프로파일 또는 연결 문자열. 예: DEV_DB
help.dataSyncTargetConnection=대상 데이터베이스 연결 프로파일 또는 연결 문자열. 예: PROD_DB
help.dataSyncSchema=동기화할 테이블이 포함된 스키마. 기본값: 현재 스키마
help.dataSyncTable=동기화할 테이블 이름. 예: CUSTOMERS
help.dataSyncMode=동기화 모드: 'full' (완전 동기화) 또는 'incremental' (변경사항만). 기본값: full
help.dataSyncBatchSize=각 배치에서 처리할 행 수. 기본값: 1000
help.dataSyncConflictResolution=충돌 해결 방법: 'source' (원본 우선), 'target' (대상 우선), 'skip' (충돌 건너뜀). 기본값: source
help.dataSyncKeyColumns=행 매칭을 위한 키 컬럼의 쉼표로 구분된 목록. 예: ID 또는 CUSTOMER_ID, REGION
help.dataSyncTimeout=동기화의 최대 시간(초). 기본값: 3600 (1시간)
info.startingSynchronization={0}.{1}에 대한 데이터 동기화를 시작합니다
info.rowsRead=원본 테이블에서 {0}행을 읽었습니다
info.fullSyncMode=전체 동기화 모드 사용
info.incrementalSyncMode=증분 동기화 모드 사용
success.syncComplete=동기화 완료. 테이블 {1}에 {0}행이 동기화되었습니다
error.dataSync=데이터 동기화 오류: {0}
