help.filename=ソースファイルへのフルパス（CSVまたはExcel）。例：/home/user/data.csv または C:\\data\\sales.xlsx
help.table=ターゲットHANAテーブル名。テーブルはデータベースに既に存在している必要があります。例：EMPLOYEES または SCHEMA.TABLE_NAME
help.outputFormat=出力形式：CSV（カンマ区切り値）、Excel（.xlsxファイル）
help.matchMode=自動：最初に名前で一致を試行し、次に位置で試行。名前：列名のみで一致。順序：列位置で一致。
help.truncate=新しいデータをインポートする前にターゲットテーブルから既存のすべてのデータを削除する場合はチェック。注意：すべてのデータが完全に削除されます！
help.batchSize=各バッチで処理する行数。大きいバッチは高速（1000+）。小さいバッチはメモリ使用量が少ない（100-500）。
help.worksheet=Excelファイルの場合、インポートするワークシート（1ベース：1 = 最初のシート、2 = 2番目のシートなど）。CSVファイルでは無視されます。
help.startRow=読み取りを開始する行（1ベース）。2を使用するとヘッダー行をスキップ、5を使用すると最初の4行をスキップします。
help.skipEmptyRows=いずれの列にもデータがない行をスキップする場合はチェック。データ品質を維持するために推奨されます。
help.excelCacheMode=キャッシュ：ファイル全体をメモリにロード（小さいファイルで高速）。Emit：ファイル内容をストリーミング（大きいファイル>100MBに適しています）。
help.dryRun=実際にデータベースを変更せずにインポートをプレビューする場合はチェック。インポートされる内容と発生するエラーを表示します。
help.maxFileSizeMB=受け入れる最大ファイルサイズ（MB単位）。これより大きいファイルは拒否されます。デフォルト500MBはリソースの過度な消費を防ぎます。
help.timeoutSeconds=インポートプロセスに許可する最大時間（秒）。インポートがこの時間を超えると終了します。デフォルト3600 = 1時間。
help.nullValues=NULLとして扱う値のカンマ区切りリスト。例："null,NULL,#N/A,,N/A" はこれらの文字列をデータベースNULL値に変換します。
help.skipWithErrors=一部の行でエラーが発生してもインポートを続行する場合はチェック。スキップされた行はログに記録されます。許可される最大エラー数と組み合わせて制限を設定します。
help.maxErrorsAllowed=停止する前に許可される最大エラー数（-1 = 無制限）。0に設定すると許容なし。10に設定すると10個のエラー後に停止します。
error.processingMessage=WebSocketメッセージの処理エラー
error.timeoutExceeded=インポートタイムアウトを超過しました
error.maxErrorsReached=最大エラー数に達しました
success.importComplete=インポートが正常に完了しました
success.dryRunComplete=ドライラン完了 - データはインポートされませんでした
info.rowsProcessed=処理された行：{0}
info.rowsInserted=挿入された行：{0}
info.rowsSkipped=スキップされた行：{0}
info.errorsEncountered=発生したエラー：{0}
info.fileSize=ファイルサイズ：{0} MB
info.duration=所要時間：{0}秒
info.truncating=インポート前にテーブルをトランケートしています...
info.analyzing=ファイル構造を分析しています...
info.validating=データを検証しています...
info.importing=データをインポートしています...
