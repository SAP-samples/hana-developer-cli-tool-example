title=Schema Clone
schemaClone=Clone entire schema with or without data
schemaCloneSourceSchema=Source Schema Name
schemaCloneTargetSchema=Target Schema Name
schemaCloneIncludeData=Include Table Data in Clone
schemaCloneIncludeGrants=Include Grants and Privileges
schemaCloneParallel=Number of Parallel Operations
schemaCloneExcludeTables=Tables to Exclude (comma-separated)
schemaCloneTimeout=Operation Timeout in Seconds
help.schemaCloneSourceSchema=Name of the source schema to clone from. Example: PROD_SCHEMA
help.schemaCloneTargetSchema=Name of the target schema to clone to. Will be created if it doesn't exist. Example: DEV_SCHEMA
help.schemaCloneIncludeData=Clone table data along with structure. If false, only structure is cloned. Default: false
help.schemaCloneIncludeGrants=Copy grants and privileges from source to target schema. Default: false
help.schemaCloneParallel=Number of parallel cloning operations. Higher values may improve performance. Default: 1
help.schemaCloneExcludeTables=Comma-separated list of tables to exclude from cloning. Example: TEMP_TABLE,LOG_TABLE
help.schemaCloneTimeout=Maximum time in seconds for the schema clone operation. Default: 7200 (2 hours)
info.startingSchemaClone=Starting schema clone from {0} to {1}
info.targetSchemaExists=Target schema {0} already exists
info.creatingTargetSchema=Creating target schema {0}
info.foundTables=Found {0} table(s) to clone
info.cloningTable=Cloning table: {0}
info.copiedRows=Copied {0} row(s) to table {1}
info.foundViews=Found {0} view(s) to clone
info.cloningView=Cloning view: {0}
info.viewCloneSkipped=View {0} skipped (requires manual DDL conversion)
info.cloningGrants=Cloning grants and privileges
info.foundGrants=Found {0} grant(s) to clone
success.schemaCloneComplete=Schema clone complete. Source: {0}, Target: {1}, Tables: {2}, Rows: {3}
error.schemaClone=Schema clone error: {0}
error.sourceSchemaNotFound=Source schema {0} not found
error.tableCloneFailed=Failed to clone table {0}: {1}
error.viewCloneFailed=Failed to clone view {0}: {1}
