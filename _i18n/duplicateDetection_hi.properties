title = डुप्लिकेट संपहार
duplicateDetection = तालिका में डुप्लिकेट रिकॉर्ड खोजें
duplicateDetectionTable = जांचने के लिए तालिका का नाम
duplicateDetectionSchema = तालिका के लिए स्कीमा
duplicateDetectionKeyColumns = मिलान के लिए मुख्य स्तंभ (अल्पविराम से अलग)
duplicateDetectionCheckColumns = डुप्लिकेट के लिए जांचने के लिए स्तंभ (अल्पविराम से अलग, वैकल्पिक)
duplicateDetectionExcludeColumns = जांच से बाहर करने के लिए स्तंभ (अल्पविराम से अलग, वैकल्पिक)
duplicateDetectionMode = संपहार मोड (exact, fuzzy, partial)
duplicateDetectionThreshold = फजी मिलान के लिए समानता दहलीज (0-1)
duplicateDetectionOutput = आउटपुट रिपोर्ट फाइल पथ
duplicateDetectionFormat = रिपोर्ट प्रारूप (json, csv, summary)
duplicateDetectionLimit = जांचने के लिए अधिकतम पंक्तियां
duplicateDetectionTimeout = ऑपरेशन टाइमआउट सेकंड में
duplicateDetectionExample = उदाहरण: hana-cli duplicateDetection --table MY_TABLE --mode exact --threshold 0.95
help.duplicateDetectionTable = डुप्लिकेट के लिए जांचने के लिए तालिका का नाम। उदाहरण: CUSTOMERS
help.duplicateDetectionSchema = तालिका युक्त स्कीमा। यदि प्रदान नहीं किया गया, वर्तमान स्कीमा का उपयोग करता है।
help.duplicateDetectionKeyColumns = मिलान के लिए उपयोग किए जाने वाले स्तंभों की अल्पविराम से अलग की गई सूची। उदाहरण: FIRST_NAME, LAST_NAME
help.duplicateDetectionCheckColumns = डुप्लिकेट के लिए तुलना करने के लिए विशिष्ट स्तंभ। यदि छोड़े जाएं, मुख्य स्तंभों को छोड़कर सभी की तुलना की जाती है।
help.duplicateDetectionExcludeColumns = डुप्लिकेट संपहार के दौरान छोड़ने के लिए स्तंभ।
help.duplicateDetectionMode = संपहार मोड: exact (सटीक मेल), fuzzy (समानता-आधारित), partial (आंशिक मेल)। डिफ़ॉल्ट: exact
help.duplicateDetectionThreshold = फजी मिलान के लिए समानता दहलीज (0-1)। डिफ़ॉल्ट: 0.95
help.duplicateDetectionOutput = डुप्लिकेट रिपोर्ट के लिए फाइल पथ। यदि प्रदान नहीं किया गया, परिणाम कंसोल में प्रदर्शित होते हैं।
help.duplicateDetectionFormat = रिपोर्ट प्रारूप: json (संरचित), csv (सारणीबद्ध), summary (अवलोकन)। डिफ़ॉल्ट: summary
help.duplicateDetectionLimit = जांचने के लिए अधिकतम पंक्तियां। डिफ़ॉल्ट: 10000
help.duplicateDetectionTimeout = ऑपरेशन के लिए अधिकतम समय सेकंड में। डिफ़ॉल्ट: 3600 (1 घंटा)
info.startingDuplicateDetection = तालिका {0} के लिए डुप्लिकेट संपहार शुरू कर रहे हैं
success.duplicateDetectionComplete = डुप्लिकेट संपहार पूर्ण। कुल: {0}, अद्वितीय: {1}, डुप्लिकेट समूह: {2}, कुल डुप्लिकेट: {3}
error.duplicateDetection = डुप्लिकेट संपहार त्रुटि: {0}
error.noColumns = तालिका में कोई स्तंभ नहीं मिले
error.noColumnsDetailed = तालिका {0} में कोई स्तंभ नहीं मिले। स्कीमा: {1}
warning.duplicateDetectionCheckColumnsMissing = अनुरोधित जांच स्तंभ नहीं मिले: {0}। उपलब्ध स्तंभ: {1}
warning.duplicateDetectionCheckColumnsNone = अनुरोधित जांच स्तंभों में से कोई नहीं मिले: {0}। उपलब्ध स्तंभ: {1}
