help.dataLineageTable=Nazwa tabeli do śledzenia pochodzenia. Przykład: SALES_ORDERS
help.dataLineageSchema=Schemat zawierający tabelę. Jeśli nie podano, używa bieżącego schematu.
help.dataLineageDirection=Kierunek pochodzenia: upstream (tabele źródłowe), downstream (tabele zależne), bidirectional (oba). Domyślnie: upstream
help.dataLineageDepth=Maksymalna głębokość pochodzenia do śledzenia. Domyślnie: 5
help.dataLineageIncludeTransformations=Dołącz widoki, procedury i transformacje w pochodzeniu. Domyślnie: true
help.dataLineageOutput=Ścieżka pliku dla raportu pochodzenia. Jeśli nie podano, wyniki są wyświetlane w konsoli.
help.dataLineageFormat=Format raportu: json (strukturalny), csv (tabelaryczny), graphml (graf XML), summary (przegląd). Domyślnie: summary
help.dataLineageTimeout=Maksymalny czas w sekundach dla operacji. Domyślnie: 3600 (1 godzina)
info.startingLineageTrace=Rozpoczynanie śledzenia pochodzenia dla tabeli {0} w kierunku {1}
success.lineageTraceComplete=Śledzenie pochodzenia zakończone. Tabele źródłowe: {0}, Transformacje: {1}, Tabele docelowe: {2}
error.dataLineage=Błąd pochodzenia danych: {0}
