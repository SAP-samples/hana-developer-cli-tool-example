title=Diff des données
dataDiff=Afficher les différences entre deux jeux de données avec un suivi détaillé des changements
dataDiffTable1=Nom de la première table
dataDiffTable2=Nom de la seconde table
dataDiffSchema1=Schéma de la première table
dataDiffSchema2=Schéma de la seconde table
dataDiffKeyColumns=Colonnes clés pour l’appariement (séparées par des virgules)
dataDiffCompareColumns=Colonnes à comparer (séparées par des virgules, facultatif)
dataDiffOutput=Chemin du fichier de rapport de sortie
dataDiffFormat=Format du rapport (json, csv, summary)
dataDiffLimit=Nombre maximal de lignes à comparer
dataDiffShowValues=Afficher les valeurs réelles dans le rapport
dataDiffTimeout=Délai d’expiration de l’opération en secondes
help.dataDiffTable1=Nom de la première table à comparer. Exemple : EMPLOYEES
help.dataDiffTable2=Nom de la seconde table à comparer. Exemple : EMPLOYEES_NEW
help.dataDiffSchema1=Schéma contenant la première table. Si non fourni, utilise le schéma courant.
help.dataDiffSchema2=Schéma contenant la seconde table. Si non fourni, utilise le premier schéma.
help.dataDiffKeyColumns=Liste de colonnes séparées par des virgules qui identifient de façon unique les lignes. Exemple : EMP_ID ou DEPT_ID, EMP_ID
help.dataDiffCompareColumns=Liste de colonnes spécifiques à comparer séparées par des virgules. Si non fourni, toutes les colonnes communes sont comparées.
help.dataDiffOutput=Chemin du fichier pour le rapport de différences. Si non fourni, les résultats s’affichent dans la console.
help.dataDiffFormat=Format du rapport : json (structuré), csv (tabulaire), summary (aperçu). Valeur par défaut : summary
help.dataDiffLimit=Nombre maximal de lignes de chaque table à traiter. Valeur par défaut : 10000
help.dataDiffShowValues=Inclure les valeurs réelles des colonnes dans le rapport. Valeur par défaut : false
help.dataDiffTimeout=Temps maximal en secondes pour l’opération. Valeur par défaut : 3600 (1 heure)
info.startingDataDiff=Démarrage de la comparaison data diff entre {0} et {1}
success.dataDiffComplete=Data diff terminé. Identiques : {0}, Différentes : {1}, UniquementDansTable1 : {2}, UniquementDansTable2 : {3}
error.dataDiff=Erreur data diff : {0}
error.noKeyColumns=Aucune colonne clé spécifiée pour l’appariement des lignes
