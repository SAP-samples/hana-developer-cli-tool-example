help.filename=Pełna ścieżka do pliku źródłowego (CSV lub Excel). Przykłady: /home/user/data.csv lub C:\\data\\sales.xlsx
help.table=Nazwa tabeli docelowej HANA. Tabela musi już istnieć w bazie danych. Przykład: EMPLOYEES lub SCHEMA.TABLE_NAME
help.outputFormat=Format wyjściowy: CSV dla wartości oddzielonych przecinkami, Excel dla plików .xlsx
help.matchMode=Auto: najpierw spróbuj dopasować według nazwy, potem według pozycji. Nazwa: dopasuj tylko według nazw kolumn. Kolejność: dopasuj według pozycji kolumn.
help.truncate=Zaznacz, aby usunąć wszystkie istniejące dane z tabeli docelowej przed importem nowych danych. UWAGA: To trwale usunie wszystkie dane!
help.batchSize=Liczba wierszy do przetworzenia w każdej partii. Większe partie są szybsze (1000+). Mniejsze partie używają mniej pamięci (100-500).
help.worksheet=Dla plików Excel, który arkusz importować (numeracja od 1: 1 = pierwszy arkusz, 2 = drugi arkusz, itp.). Ignorowane dla plików CSV.
help.startRow=Od którego wiersza rozpocząć czytanie (numeracja od 1). Użyj 2, aby pominąć wiersz nagłówka, użyj 5, aby pominąć pierwsze 4 wiersze.
help.skipEmptyRows=Zaznacz, aby pominąć wiersze bez danych w żadnej kolumnie. Zalecane dla utrzymania jakości danych.
help.excelCacheMode=Pamięć podręczna: ładuje cały plik do pamięci (szybsze dla małych plików). Emit: strumieniuje zawartość pliku (lepsze dla dużych plików >100MB).
help.dryRun=Zaznacz, aby podejrzeć import bez faktycznej modyfikacji bazy danych. Pokazuje co zostałoby zaimportowane i wszelkie błędy, które by wystąpiły.
help.maxFileSizeMB=Maksymalny rozmiar pliku do zaakceptowania (w MB). Pliki większe niż ten zostaną odrzucone. Domyślnie 500MB chroni przed zużyciem zbyt wielu zasobów.
help.timeoutSeconds=Maksymalny czas dozwolony dla procesu importu (w sekundach). Jeśli import przekroczy ten czas, zostanie zakończony. Domyślnie 3600 = 1 godzina.
help.nullValues=Lista wartości oddzielonych przecinkami do traktowania jako NULL. Przykład: "null,NULL,#N/A,,N/A" konwertuje te ciągi na wartości NULL bazy danych.
help.skipWithErrors=Zaznacz, aby kontynuować import nawet jeśli niektóre wiersze napotkają błędy. Pominięte wiersze zostaną zalogowane. Połącz z Maksymalną liczbą dozwolonych błędów, aby ustawić limity.
help.maxErrorsAllowed=Maksymalna liczba dozwolonych błędów przed zatrzymaniem importu (-1 = nieograniczona). Ustaw na 0 dla braku tolerancji. Ustaw na 10, aby zatrzymać po 10 błędach.
error.processingMessage=Błąd przetwarzania komunikatu WebSocket
error.timeoutExceeded=Przekroczono limit czasu importu
error.maxErrorsReached=Osiągnięto maksymalną liczbę błędów
success.importComplete=Import zakończony pomyślnie
success.dryRunComplete=Uruchomienie próbne zakończone - nie zaimportowano danych
