title=重複検出
duplicateDetection=テーブル内の重複レコードを検索
duplicateDetectionTable=チェックするテーブル名
duplicateDetectionSchema=テーブルのスキーマ
duplicateDetectionKeyColumns=照合用キー列（カンマ区切り）
duplicateDetectionCheckColumns=重複をチェックする列（カンマ区切り、オプション）
duplicateDetectionExcludeColumns=チェックから除外する列（カンマ区切り、オプション）
duplicateDetectionMode=検出モード（exact、fuzzy、partial）
duplicateDetectionThreshold=ファジーマッチングの類似閾値（0-1）
duplicateDetectionOutput=出力レポートファイルパス
duplicateDetectionFormat=レポート形式（json、csv、summary）
duplicateDetectionLimit=チェックする最大行数
duplicateDetectionTimeout=操作タイムアウト（秒）
duplicateDetectionExample=例：hana-cli duplicateDetection --table MY_TABLE --mode exact --threshold 0.95
help.duplicateDetectionTable=重複をチェックするテーブル名。例：CUSTOMERS
help.duplicateDetectionSchema=テーブルを含むスキーマ。指定しない場合は現在のスキーマを使用します。
help.duplicateDetectionKeyColumns=照合に使用される列のカンマ区切りリスト。例：FIRST_NAME, LAST_NAME
help.duplicateDetectionCheckColumns=重複を比較する特定の列。省略した場合はキー列以外のすべてがチェックされます。
help.duplicateDetectionExcludeColumns=重複検出中にスキップする列。
help.duplicateDetectionMode=検出モード：exact（完全一致）、fuzzy（類似度ベース）、partial（部分一致）。デフォルト：exact
help.duplicateDetectionThreshold=ファジーマッチングの類似度閾値（0-1）。デフォルト：0.95
help.duplicateDetectionOutput=重複レポートのファイルパス。指定しない場合は結果がコンソールに表示されます。
help.duplicateDetectionFormat=レポート形式：json（構造化）、csv（表形式）、summary（概要）。デフォルト：summary
help.duplicateDetectionLimit=チェックする最大行数。デフォルト：10000
help.duplicateDetectionTimeout=操作の最大時間（秒）。デフォルト：3600（1時間）
info.startingDuplicateDetection=テーブル {0} の重複検出を開始しています
success.duplicateDetectionComplete=重複検出完了。合計：{0}、ユニーク：{1}、重複グループ：{2}、重複合計：{3}
error.duplicateDetection=重複検出エラー：{0}
error.noColumns=テーブルに列が見つかりません
error.noColumnsDetailed=テーブル {0} に列が見つかりません。スキーマ：{1}
warning.duplicateDetectionCheckColumnsMissing=要求されたチェック列が見つかりません：{0}。利用可能な列：{1}
warning.duplicateDetectionCheckColumnsNone=要求されたチェック列が見つかりませんでした：{0}。利用可能な列：{1}
