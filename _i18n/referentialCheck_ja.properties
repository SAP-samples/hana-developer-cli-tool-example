title=参照整合性チェック
referentialCheck=参照整合性と外部キー制約を検証
referentialCheckTable=チェックするテーブル名
referentialCheckSchema=テーブルのスキーマ
referentialCheckConstraints=チェックする特定の制約（カンマ区切り、オプション）
referentialCheckMode=チェックモード（check、report、repair、detailed）
referentialCheckOutput=出力レポートファイルパス
referentialCheckFormat=レポート形式（json、csv、summary）
referentialCheckLimit=チェックする最大行数
referentialCheckTimeout=操作タイムアウト（秒）
help.referentialCheckTable=参照整合性をチェックするテーブル名。例：ORDERS
help.referentialCheckSchema=テーブルを含むスキーマ。指定しない場合は現在のスキーマを使用します。
help.referentialCheckConstraints=チェックする特定の制約名のカンマ区切りリスト。省略した場合はすべてがチェックされます。
help.referentialCheckMode=チェックモード：check（違反を識別）、report（レポートを生成）、repair（修正を試行）、detailed（完全な分析）。デフォルト：check
help.referentialCheckOutput=整合性レポートのファイルパス。指定しない場合は結果がコンソールに表示されます。
help.referentialCheckFormat=レポート形式：json（構造化）、csv（表形式）、summary（概要）。デフォルト：summary
help.referentialCheckLimit=孤立レコードをチェックする最大行数。デフォルト：10000
help.referentialCheckTimeout=操作の最大時間（秒）。デフォルト：3600（1時間）
info.startingReferentialCheck=テーブル {0} の参照整合性チェックを開始しています
info.noForeignKeys=テーブル {0} に外部キーが見つかりません
success.referentialCheckComplete=参照チェック完了。合計FK：{0}、有効：{1}、違反：{2}、孤立レコード：{3}
error.referentialCheck=参照チェックエラー：{0}
