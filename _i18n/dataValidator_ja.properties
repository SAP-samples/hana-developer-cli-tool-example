title=データ検証
dataValidator=ビジネスルールと制約に対してデータを検証
dataValidatorTable=検証するテーブル名
dataValidatorSchema=テーブルのスキーマ
dataValidatorRules=検証ルール（column:rule形式）
dataValidatorRulesFile=検証ルールファイルへのパス
dataValidatorColumns=検証する列（カンマ区切り、オプション）
dataValidatorOutput=出力レポートファイルパス
dataValidatorFormat=レポート形式（json、csv、summary、detailed）
dataValidatorLimit=検証する最大行数
dataValidatorStopOnFirstError=最初のエラー後に処理を停止
dataValidatorTimeout=操作タイムアウト（秒）
help.dataValidatorTable=検証するテーブル名。例：EMPLOYEES
help.dataValidatorSchema=テーブルを含むスキーマ。指定しない場合は現在のスキーマを使用します。
help.dataValidatorRules=検証ルールの形式：column1:required,email;column2:numeric,range:0:100
help.dataValidatorRulesFile=検証ルールを含むファイルへのパス
help.dataValidatorColumns=検証する特定の列のカンマ区切りリスト。省略した場合はすべてが検証されます。
help.dataValidatorOutput=検証レポートのファイルパス。指定しない場合は結果がコンソールに表示されます。
help.dataValidatorFormat=レポート形式：json（構造化）、csv（表形式）、summary（概要）、detailed（完全結果）。デフォルト：summary
help.dataValidatorLimit=検証する最大行数。デフォルト：10000
help.dataValidatorStopOnFirstError=最初のエラー発生後に検証を停止します。デフォルト：false
help.dataValidatorTimeout=操作の最大時間（秒）。デフォルト：3600（1時間）
info.startingDataValidation=テーブル {0} のデータ検証を開始しています
success.dataValidationComplete=データ検証完了。合計：{0}、有効：{1}、無効：{2}、エラー：{3}
error.dataValidator=データ検証エラー：{0}
error.noValidationRules=検証ルールが指定されていないか見つかりません
