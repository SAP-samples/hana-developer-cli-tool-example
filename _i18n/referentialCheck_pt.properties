título=Verificação Referencial
referentialCheck=Verificar integridade referencial e restrições de chave estrangeira
referentialCheckTable=Nome da Tabela a Verificar
referentialCheckSchema=Esquema da Tabela
referentialCheckConstraints=Restrições Específicas a Verificar (separadas por vírgula, opcional)
referentialCheckMode=Modo de Verificação (verificar, relatório, reparar, detalhado)
referentialCheckOutput=Caminho do Ficheiro do Relatório de Saída
referentialCheckFormat=Formato do Relatório (json, csv, resumo)
referentialCheckLimit=Número Máximo de Linhas a Verificar
referentialCheckTimeout=Tempo Limite da Operação em Segundos
help.referentialCheckTable=Nome da tabela a verificar para integridade referencial. Exemplo: ORDERS
help.referentialCheckSchema=Esquema contendo a tabela. Se não fornecido, usa o esquema atual.
help.referentialCheckConstraints=Lista separada por vírgula de nomes de restrição específicos a verificar. Se omitido, todos são verificados.
help.referentialCheckMode=Modo de verificação: verificar (identificar violações), relatório (gerar relatório), reparar (tentar corrigir), detalhado (análise completa). Padrão: verificar
help.referentialCheckOutput=Caminho do ficheiro para relatório de integridade. Se não fornecido, os resultados aparecem na consola.
help.referentialCheckFormat=Formato do relatório: json (estruturado), csv (tabular), resumo (visão geral). Padrão: resumo
help.referentialCheckLimit=Número máximo de linhas a verificar para registos órfãos. Padrão: 10000
help.referentialCheckTimeout=Tempo máximo em segundos para operação. Padrão: 3600 (1 hora)
info.startingReferentialCheck=Iniciando verificação de integridade referencial para tabela {0}
info.noForeignKeys=Nenhuma chave estrangeira encontrada para tabela {0}
success.referentialCheckComplete=Verificação referencial completa. Total FK: {0}, Válidas: {1}, Violadas: {2}, Registos Órfãos: {3}
error.referentialCheck=Erro na verificação referencial: {0}

