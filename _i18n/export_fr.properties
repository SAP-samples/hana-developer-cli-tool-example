title=Exporter des données
export=Exporter les données d’une table/vue vers des fichiers CSV, Excel ou JSON
exportTable=Nom de la table source
exportSchema=Nom du schéma source
exportOutput=Chemin du fichier de sortie
exportFormat=Format d’export (csv, excel, json)
exportWhere=Clause WHERE pour filtrer (facultatif)
exportLimit=Nombre maximal de lignes à exporter
exportOrderBy=Clause ORDER BY (facultatif)
exportColumns=Liste de colonnes séparées par des virgules (facultatif, par défaut : *)
exportDelimiter=Caractère séparateur CSV
exportIncludeHeaders=Inclure la ligne d’en-tête dans l’export CSV
exportNullValue=Valeur à utiliser pour les cellules NULL
exportMaxRows=Nombre maximal de lignes autorisées
exportTimeout=Délai d’expiration de l’opération en secondes
help.exportTable=Nom de la table ou vue HANA source à exporter. Exemple : EMPLOYEES ou SCHEMA.TABLE_NAME
help.exportSchema=Schéma contenant la table. Si non fourni, utilise le schéma courant.
help.exportOutput=Chemin complet du fichier de sortie. Si non fourni, génère un nom basé sur la table et l’horodatage.
help.exportFormat=Format d’export : csv pour valeurs séparées par des virgules, excel pour fichiers .xlsx, json pour tableau JSON
help.exportWhere=Clause WHERE facultative pour filtrer les lignes exportées. Exemple : SALARY > 50000
help.exportLimit=Nombre maximal de lignes à exporter. Valeur par défaut : 1000000
help.exportOrderBy=Clause ORDER BY facultative pour trier les données exportées. Exemple : NAME ASC, SALARY DESC
help.exportColumns=Liste de colonnes séparées par des virgules à exporter. Si non fournie, toutes les colonnes sont exportées.
help.exportDelimiter=Caractère à utiliser comme séparateur de champs dans les fichiers CSV. Valeur par défaut : virgule (,)
help.exportIncludeHeaders=Inclure les noms de colonnes comme première ligne dans l’export CSV. Recommandé : true
help.exportNullValue=Chaîne à utiliser pour les valeurs NULL/vides en sortie. Valeur par défaut : chaîne vide
help.exportMaxRows=Nombre maximal de lignes autorisées pour éviter les exports excessifs. Valeur par défaut : 1000000
help.exportTimeout=Temps maximal en secondes pour l’opération d’export. Valeur par défaut : 3600 (1 heure)
info.startingExport=Démarrage de l’export de la table : {0}
info.noDataToExport=Aucune donnée à exporter depuis la table spécifiée
success.exportComplete=Export terminé avec succès. {0} lignes exportées vers : {1} (Durée : {2} secondes)
error.export=Erreur d’export : {0}
error.fileWrite=Échec de l’écriture du fichier de sortie {0} : {1}
error.noSchemaSpecified=Aucun schéma spécifié et impossible de déterminer le schéma courant
error.tableNotFound=Table introuvable : {0}
