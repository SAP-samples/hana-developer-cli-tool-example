title=Data Synchronization
dataSync=Synchronize data between systems or tables
dataSyncSourceConnection=Source Connection Profile or Connection String
dataSyncTargetConnection=Target Connection Profile or Connection String
dataSyncSchema=Schema Name
dataSyncTable=Table Name to Synchronize
dataSyncMode=Synchronization Mode (full or incremental)
dataSyncBatchSize=Batch Size for Processing
dataSyncConflictResolution=Conflict Resolution Strategy (source, target, or skip)
dataSyncKeyColumns=Key Columns for Row Matching (comma-separated)
dataSyncTimeout=Operation Timeout in Seconds
help.dataSyncSourceConnection=Source database connection profile or connection string. Example: DEV_DB
help.dataSyncTargetConnection=Target database connection profile or connection string. Example: PROD_DB
help.dataSyncSchema=Schema containing the table to synchronize. Default: current schema
help.dataSyncTable=Name of the table to synchronize. Example: CUSTOMERS
help.dataSyncMode=Synchronization mode: 'full' (complete sync) or 'incremental' (changes only). Default: full
help.dataSyncBatchSize=Number of rows to process in each batch. Default: 1000
help.dataSyncConflictResolution=How to resolve conflicts: 'source' (source wins), 'target' (target wins), 'skip' (skip conflict). Default: source
help.dataSyncKeyColumns=Comma-separated list of key columns for matching rows. Example: ID or CUSTOMER_ID, REGION
help.dataSyncTimeout=Maximum time in seconds for the synchronization. Default: 3600 (1 hour)
info.startingSynchronization=Starting data synchronization for {0}.{1}
info.rowsRead=Read {0} rows from source table
info.fullSyncMode=Using full synchronization mode
info.incrementalSyncMode=Using incremental synchronization mode
success.syncComplete=Synchronization complete. {0} rows synced to table {1}
error.dataSync=Data synchronization error: {0}
