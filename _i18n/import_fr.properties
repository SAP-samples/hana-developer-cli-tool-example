help.filename=Chemin complet vers le fichier source (CSV ou Excel). Exemples : /home/user/data.csv ou C:\\data\\sales.xlsx
help.table=Nom de la table HANA cible. La table doit déjà exister dans la base de données. Exemple : EMPLOYEES ou SCHEMA.TABLE_NAME
help.outputFormat=Format de sortie : CSV pour valeurs séparées par des virgules, Excel pour fichiers .xlsx
help.matchMode=Auto : essayer d’abord la correspondance par nom, puis par position. Name : correspondre uniquement par noms de colonnes. Order : correspondre par position de colonnes.
help.truncate=Cocher pour supprimer toutes les données existantes de la table cible avant l’importation de nouvelles données. ATTENTION : cela supprimera définitivement toutes les données !
help.batchSize=Nombre de lignes à traiter dans chaque lot. Des lots plus grands sont plus rapides (1000+). Des lots plus petits utilisent moins de mémoire (100-500).
help.worksheet=Pour les fichiers Excel, quelle feuille importer (1-based : 1 = première feuille, 2 = deuxième feuille, etc.). Ignoré pour les fichiers CSV.
help.startRow=À partir de quelle ligne commencer la lecture (1-based). Utilisez 2 pour ignorer une ligne d’en-tête, utilisez 5 pour ignorer les 4 premières lignes.
help.skipEmptyRows=Cocher pour ignorer les lignes sans données dans aucune colonne. Recommandé pour maintenir la qualité des données.
help.excelCacheMode=Cache : charge tout le fichier en mémoire (plus rapide pour petits fichiers). Emit : diffuse le contenu du fichier (mieux pour fichiers volumineux >100MB).
help.dryRun=Cocher pour prévisualiser l’importation sans modifier la base de données. Montre ce qui serait importé et les erreurs qui surviendraient.
help.maxFileSizeMB=Taille maximale du fichier à accepter (en MB). Les fichiers plus gros seront rejetés. La valeur par défaut 500MB protège contre une consommation excessive de ressources.
help.timeoutSeconds=Temps maximal autorisé pour le processus d’import (en secondes). Si l’import dépasse ce temps, il sera interrompu. Par défaut 3600 = 1 heure.
help.nullValues=Liste de valeurs séparées par des virgules à traiter comme NULL. Exemple : "null,NULL,#N/A,,N/A" convertit ces chaînes en NULL en base de données.
help.skipWithErrors=Cocher pour continuer l’import même si certaines lignes présentent des erreurs. Les lignes ignorées seront consignées. Combinez avec Nombre maximal d’erreurs autorisées pour définir des limites.
help.maxErrorsAllowed=Nombre maximal d’erreurs autorisées avant d’arrêter l’import (-1 = illimité). Réglez à 0 pour tolérance zéro. Réglez à 10 pour arrêter après 10 erreurs.
error.processingMessage=Erreur lors du traitement du message WebSocket
error.timeoutExceeded=Délai d’import dépassé
error.maxErrorsReached=Nombre maximal d’erreurs atteint
success.importComplete=Import terminé avec succès
success.dryRunComplete=Exécution à blanc terminée - aucune donnée importée
info.rowsProcessed=Lignes traitées : {0}
info.rowsInserted=Lignes insérées : {0}
info.rowsSkipped=Lignes ignorées : {0}
info.errorsEncountered=Erreurs rencontrées : {0}
info.fileSize=Taille du fichier : {0} MB
info.duration=Durée : {0} secondes
info.truncating=Troncature de la table avant import...
info.analyzing=Analyse de la structure du fichier...
info.validating=Validation des données...
info.importing=Importation des données...
