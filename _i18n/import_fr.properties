error.import=Erreur d’import
error.fileNotFound=Fichier introuvable
error.invalidFormat=Format de fichier invalide
error.tableNotFound=Table introuvable
error.columnMismatch=Incompatibilité des colonnes
error.dataTruncation=Erreur de troncature des données
