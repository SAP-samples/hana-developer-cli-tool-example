title=Detección de duplicados
duplicateDetection=Encontrar registros duplicados en una tabla
duplicateDetectionTable=Nombre de la tabla a comprobar
duplicateDetectionSchema=Esquema de la tabla
duplicateDetectionKeyColumns=Columnas clave para la coincidencia (separadas por comas)
duplicateDetectionCheckColumns=Columnas a comprobar duplicados (separadas por comas, opcional)
duplicateDetectionExcludeColumns=Columnas a excluir de la comprobación (separadas por comas, opcional)
duplicateDetectionMode=Modo de detección (exact, fuzzy, partial)
duplicateDetectionThreshold=Umbral de similitud para coincidencia difusa (0-1)
duplicateDetectionOutput=Ruta del archivo de informe de salida
duplicateDetectionFormat=Formato del informe (json, csv, summary)
duplicateDetectionLimit=Número máximo de filas a comprobar
duplicateDetectionTimeout=Tiempo de espera de la operación en segundos
duplicateDetectionExample=Ejemplo: hana-cli duplicateDetection --table MY_TABLE --mode exact --threshold 0.95
help.duplicateDetectionTable=Nombre de la tabla a revisar para duplicados. Ejemplo: CUSTOMERS
help.duplicateDetectionSchema=Esquema que contiene la tabla. Si no se proporciona, se usa el esquema actual.
help.duplicateDetectionKeyColumns=Lista separada por comas de columnas usadas para la coincidencia. Ejemplo: FIRST_NAME, LAST_NAME
help.duplicateDetectionCheckColumns=Columnas específicas a comparar para duplicados. Si se omite, se revisan todas excepto las columnas clave.
help.duplicateDetectionExcludeColumns=Columnas a omitir durante la detección de duplicados.
help.duplicateDetectionMode=Modo de detección: exact (coincidencia exacta), fuzzy (basada en similitud), partial (parcial). Predeterminado: exact
help.duplicateDetectionThreshold=Umbral de similitud para coincidencia difusa (0-1). Predeterminado: 0.95
help.duplicateDetectionOutput=Ruta del archivo para el informe de duplicados. Si no se proporciona, los resultados se muestran en la consola.
help.duplicateDetectionFormat=Formato del informe: json (estructurado), csv (tabular), summary (resumen). Predeterminado: summary
help.duplicateDetectionLimit=Número máximo de filas a comprobar. Predeterminado: 10000
help.duplicateDetectionTimeout=Tiempo máximo en segundos para la operación. Predeterminado: 3600 (1 hora)
info.startingDuplicateDetection=Iniciando detección de duplicados para la tabla {0}
success.duplicateDetectionComplete=Detección de duplicados completada. Total: {0}, Únicas: {1}, Grupos duplicados: {2}, Duplicados totales: {3}
error.duplicateDetection=Error de detección de duplicados: {0}
error.noColumns=No se encontraron columnas en la tabla
error.noColumnsDetailed=No se encontraron columnas en la tabla {0}. Esquema: {1}
warning.duplicateDetectionCheckColumnsMissing=Columnas solicitadas no encontradas: {0}. Columnas disponibles: {1}
warning.duplicateDetectionCheckColumnsNone=Ninguna de las columnas solicitadas fue encontrada: {0}. Columnas disponibles: {1}
