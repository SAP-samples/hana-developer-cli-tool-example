title = संदर्भात्मक जांच
referentialCheck = संदर्भात्मक अखंडता और विदेशी कुंजी बाधाओं को सत्यापित करें
referentialCheckTable = जांचने के लिए तालिका का नाम
referentialCheckSchema = तालिका के लिए स्कीमा
referentialCheckConstraints = जांचने के लिए विशिष्ट बाधाएं (अल्पविराम से अलग, वैकल्पिक)
referentialCheckMode = जांच मोड (check, report, repair, detailed)
referentialCheckOutput = आउटपुट रिपोर्ट फाइल पथ
referentialCheckFormat = रिपोर्ट प्रारूप (json, csv, summary)
referentialCheckLimit = जांचने के लिए अधिकतम पंक्तियां
referentialCheckTimeout = ऑपरेशन टाइमआउट सेकंड में
help.referentialCheckTable = संदर्भात्मक अखंडता के लिए जांचने के लिए तालिका का नाम। उदाहरण: ORDERS
help.referentialCheckSchema = तालिका युक्त स्कीमा। यदि प्रदान नहीं किया गया, वर्तमान स्कीमा का उपयोग करता है।
help.referentialCheckConstraints = जांचने के लिए विशिष्ट बाधा नामों की अल्पविराम से अलग की गई सूची। यदि छोड़ा गया, सभी की जांच की जाती है।
help.referentialCheckMode = जांच मोड: check (उल्लंघन की पहचान करें), report (रिपोर्ट उत्पन्न करें), repair (ठीक करने का प्रयास करें), detailed (पूर्ण विश्लेषण)। डिफ़ॉल्ट: check
help.referentialCheckOutput = अखंडता रिपोर्ट के लिए फाइल पथ। यदि प्रदान नहीं किया गया, परिणाम कंसोल में प्रदर्शित होते हैं।
help.referentialCheckFormat = रिपोर्ट प्रारूप: json (संरचित), csv (सारणीबद्ध), summary (अवलोकन)। डिफ़ॉल्ट: summary
help.referentialCheckLimit = अनाथ रिकॉर्ड की जांच करने के लिए अधिकतम पंक्तियां। डिफ़ॉल्ट: 10000
help.referentialCheckTimeout = ऑपरेशन के लिए अधिकतम समय सेकंड में। डिफ़ॉल्ट: 3600 (1 घंटा)
info.startingReferentialCheck = तालिका {0} के लिए संदर्भात्मक अखंडता जांच शुरू कर रहे हैं
info.noForeignKeys = तालिका {0} के लिए कोई विदेशी कुंजी नहीं मिली
success.referentialCheckComplete = संदर्भात्मक जांच पूर्ण। कुल FK: {0}, मान्य: {1}, उल्लंघन: {2}, अनाथ रिकॉर्ड: {3}
error.referentialCheck = संदर्भात्मक जांच त्रुटि: {0}
