title=Comparar esquema
compareSchema=Comparar estructuras de esquemas de base de datos entre entornos
compareSchemaSourceSchema=Nombre del esquema de origen
compareSchemaTargetSchema=Nombre del esquema de destino
compareSchemaTableFilter=Filtro de nombres de tablas (separado por comas, opcional)
compareSchemaCompareIndexes=Comparar índices
compareSchemaCompareTriggers=Comparar desencadenadores
compareSchemaCompareConstraints=Comparar restricciones
compareSchemaOutput=Ruta del archivo de informe de salida
compareSchemaTimeout=Tiempo de espera de la operación en segundos
help.compareSchemaSourceSchema=Nombre del primer esquema a comparar. Ejemplo: SCHEMA1
help.compareSchemaTargetSchema=Nombre del segundo esquema a comparar. Ejemplo: SCHEMA2
help.compareSchemaTableFilter=Lista opcional de tablas específicas a comparar separadas por comas. Si no se proporciona, se comparan todas las tablas.
help.compareSchemaCompareIndexes=Incluir definiciones de índices en la comparación de esquemas. Predeterminado: true
help.compareSchemaCompareTriggers=Incluir definiciones de desencadenadores en la comparación de esquemas. Predeterminado: true
help.compareSchemaCompareConstraints=Incluir definiciones de restricciones en la comparación de esquemas. Predeterminado: true
help.compareSchemaOutput=Ruta del archivo para el informe de comparación. Si no se proporciona, los resultados se muestran en la consola.
help.compareSchemaTimeout=Tiempo máximo en segundos para la comparación. Predeterminado: 3600 (1 hora)
info.startingSchemaComparison=Iniciando comparación de esquemas entre {0} y {1}
success.schemaComparisonComplete=Comparación de esquemas completada. Coincidencias de tablas: {0}, Diferencias de tablas: {1}, SoloOrigen: {2}, SoloDestino: {3}
error.compareSchema=Error de comparación de esquemas: {0}
errSchemaRequired=Se requieren los nombres de los esquemas de origen y destino
compareSchemaExample=Comparar dos esquemas de base de datos
