title=Copie de table
tableCopy=Copier la structure et/ou les données de table avec un filtrage optionnel
tableCopySourceTable=Nom de la table source
tableCopyTargetTable=Nom de la table cible
tableCopySourceSchema=Nom du schéma source
tableCopyTargetSchema=Nom du schéma cible
tableCopyStructureOnly=Copier uniquement la structure (sans données)
tableCopyDataOnly=Copier uniquement les données (sans structure)
tableCopyWhere=Filtre de clause WHERE pour la copie des données
tableCopyLimit=Limite de lignes pour la copie des données
tableCopyBatchSize=Taille de lot pour le traitement
tableCopyTimeout=Délai d’expiration de l’opération en secondes
help.tableCopySourceTable=Nom de la table source à copier. Exemple : CUSTOMERS
help.tableCopyTargetTable=Nom de la table cible à copier. Exemple : CUSTOMERS_BACKUP
help.tableCopySourceSchema=Schéma contenant la table source. Par défaut : schéma courant
help.tableCopyTargetSchema=Schéma de la table cible. Par défaut : schéma courant
help.tableCopyStructureOnly=Copier uniquement la structure de la table sans données. Ne peut pas être utilisé avec dataOnly. Valeur par défaut : false
help.tableCopyDataOnly=Copier uniquement les données vers une table existante. Ne peut pas être utilisé avec structureOnly. Valeur par défaut : false
help.tableCopyWhere=Clause WHERE pour filtrer les lignes pendant la copie. Exemple : STATUS='ACTIVE' AND YEAR=2024
help.tableCopyLimit=Nombre maximal de lignes à copier. Utile pour les tests ou copies partielles.
help.tableCopyBatchSize=Nombre de lignes à insérer dans chaque lot. Valeur par défaut : 1000
help.tableCopyTimeout=Temps maximal en secondes pour l’opération de copie de table. Valeur par défaut : 3600 (1 heure)
info.startingTableCopy=Démarrage de la copie de table de {0} vers {1}
info.copyingStructure=Copie de la structure de la table
info.targetTableExists=La table cible {0}.{1} existe déjà
info.copyingData=Copie des données de la table
info.rowsRead={0} lignes lues depuis la table source
info.processedRows={0} sur {1} lignes traitées
success.structureCopied=Structure de table copiée avec succès
success.dataCopied={0} lignes copiées avec succès
success.tableCopyComplete=Copie de table terminée. Source : {0}, Cible : {1}, Lignes copiées : {2}
error.tableCopy=Erreur de copie de table : {0}
error.sourceTableNotFound=Table source {0}.{1} introuvable
error.targetTableAlreadyExists=La table cible existe déjà. Utilisez le mode dataOnly pour copier les données vers une table existante.
