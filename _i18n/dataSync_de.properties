title=Datensynchronisation
dataSync=Daten zwischen Systemen oder Tabellen synchronisieren
dataSyncSourceConnection=Quellverbindungsprofil oder Verbindungszeichenfolge
dataSyncTargetConnection=Zielverbindungsprofil oder Verbindungszeichenfolge
dataSyncSchema=Schemaname
dataSyncTable=Tabellenname zur Synchronisierung
dataSyncMode=Synchronisierungsmodus (full oder incremental)
dataSyncBatchSize=Batchgröße für die Verarbeitung
dataSyncConflictResolution=Strategie zur Konfliktlösung (source, target oder skip)
dataSyncKeyColumns=Schlüsselspalten für Zeilenabgleich (durch Komma getrennt)
dataSyncTimeout=Zeitüberschreitung der Operation in Sekunden
help.dataSyncSourceConnection=Quelldatenbankverbindungsprofil oder Verbindungszeichenfolge. Beispiel: DEV_DB
help.dataSyncTargetConnection=Zieldatenbankverbindungsprofil oder Verbindungszeichenfolge. Beispiel: PROD_DB
help.dataSyncSchema=Schema mit der zu synchronisierenden Tabelle. Standard: aktuelles Schema
help.dataSyncTable=Name der zu synchronisierenden Tabelle. Beispiel: CUSTOMERS
help.dataSyncMode=Synchronisierungsmodus: 'full' (vollständige Synchronisierung) oder 'incremental' (nur Änderungen). Standard: full
help.dataSyncBatchSize=Anzahl der Zeilen, die in jedem Batch verarbeitet werden. Standard: 1000
help.dataSyncConflictResolution=Konfliktlösung: 'source' (Quelle gewinnt), 'target' (Ziel gewinnt), 'skip' (Konflikt überspringen). Standard: source
help.dataSyncKeyColumns=Durch Komma getrennte Liste von Schlüsselspalten für den Zeilenabgleich. Beispiel: ID oder CUSTOMER_ID, REGION
help.dataSyncTimeout=Maximale Zeit in Sekunden für die Synchronisierung. Standard: 3600 (1 Stunde)
info.startingSynchronization=Starte Datensynchronisierung für {0}.{1}
info.rowsRead={0} Zeilen aus Quelltabelle gelesen
info.fullSyncMode=Verwende vollständigen Synchronisierungsmodus
info.incrementalSyncMode=Verwende inkrementellen Synchronisierungsmodus
success.syncComplete=Synchronisierung abgeschlossen. {0} Zeilen zu Tabelle {1} synchronisiert
error.dataSync=Fehler bei der Datensynchronisierung: {0}
