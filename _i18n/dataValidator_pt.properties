title=Data Validator
dataValidator=Validar dados contra regras de negócio e restrições
dataValidatorTable=Nome da Tabela a Validar
dataValidatorSchema=Esquema da Tabela
dataValidatorRules=Regras de Validação (formato coluna:regra)
dataValidatorRulesFile=Caminho do Ficheiro de Regras de Validação
dataValidatorColumns=Colunas a Validar (separadas por vírgula, opcional)
dataValidatorOutput=Caminho do Ficheiro do Relatório de Saída
dataValidatorFormat=Formato do Relatório (json, csv, resumo, detalhado)
dataValidatorLimit=Número Máximo de Linhas a Validar
dataValidatorStopOnFirstError=Parar o Processamento Após Primeiro Erro
dataValidatorTimeout=Tempo Limite da Operação em Segundos
help.dataValidatorTable=Nome da tabela a validar. Exemplo: EMPLOYEES
help.dataValidatorSchema=Esquema contendo a tabela. Se não fornecido, usa o esquema atual.
help.dataValidatorRules=Regras de validação no formato: coluna1:obrigatório,email;coluna2:numérico,intervalo:0:100
help.dataValidatorRulesFile=Caminho do ficheiro contendo as regras de validação
help.dataValidatorColumns=Lista separada por vírgula de colunas específicas a validar. Se omitido, todas são validadas.
help.dataValidatorOutput=Caminho do ficheiro para o relatório de validação. Se não fornecido, os resultados aparecem na consola.
help.dataValidatorFormat=Formato do relatório: json (estruturado), csv (tabular), resumo (visão geral), detalhado (resultados completos). Padrão: resumo
help.dataValidatorLimit=Número máximo de linhas a validar. Padrão: 10000
help.dataValidatorStopOnFirstError=Parar validação após encontrar o primeiro erro. Padrão: false
help.dataValidatorTimeout=Tempo máximo em segundos para operação. Padrão: 3600 (1 hora)
info.startingDataValidation=Iniciando validação de dados para tabela {0}
success.dataValidationComplete=Validação de dados completa. Total: {0}, Válidas: {1}, Inválidas: {2}, Erros: {3}
error.dataValidator=Erro na validação de dados: {0}
error.noValidationRules=Nenhuma regra de validação especificada ou encontrada

