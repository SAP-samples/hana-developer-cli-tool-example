title=Daten-Differenz
dataDiff=Unterschiede zwischen zwei Datensätzen mit detaillierter Änderungsverfolgung anzeigen
dataDiffTable1=Name der ersten Tabelle
dataDiffTable2=Name der zweiten Tabelle
dataDiffSchema1=Schema für erste Tabelle
dataDiffSchema2=Schema für zweite Tabelle
dataDiffKeyColumns=Schlüsselspalten zum Abgleich (kommagetrennt)
dataDiffCompareColumns=Zu vergleichende Spalten (kommagetrennt, optional)
dataDiffOutput=Pfad der Ausgabebericht-Datei
dataDiffFormat=Berichtformat (json, csv, summary)
dataDiffLimit=Maximale Anzahl der zu vergleichenden Zeilen
dataDiffShowValues=Tatsächliche Werte im Bericht anzeigen
dataDiffTimeout=Zeitüberschreitung für Betrieb (Sekunden)
help.dataDiffTable1=Name der ersten zu vergleichenden Tabelle. Beispiel: MITARBEITER
help.dataDiffTable2=Name der zweiten zu vergleichenden Tabelle. Beispiel: MITARBEITER_NEU
help.dataDiffSchema1=Schema mit der ersten Tabelle. Wenn nicht angegeben, wird das aktuelle Schema verwendet.
help.dataDiffSchema2=Schema mit der zweiten Tabelle. Wenn nicht angegeben, wird das erste Schema verwendet.
help.dataDiffKeyColumns=Kommagetrennte Liste von Spalten, die Zeilen eindeutig identifizieren. Beispiel: EMP_ID oder DEPT_ID, EMP_ID
help.dataDiffCompareColumns=Kommagetrennte Liste spezifischer Spalten zum Vergleich. Wenn nicht angegeben, werden alle gemeinsamen Spalten verglichen.
help.dataDiffOutput=Dateipfad für Differenzbericht. Wenn nicht angegeben, werden die Ergebnisse in der Konsole angezeigt.
help.dataDiffFormat=Berichtformat: json (strukturiert), csv (tabellarisch), summary (Übersicht). Standard: summary
help.dataDiffLimit=Maximale Zeilen aus jeder Tabelle zum Verarbeiten. Standard: 10000
help.dataDiffShowValues=Tatsächliche Spaltenwerte im Bericht einbeziehen. Standard: false
help.dataDiffTimeout=Maximale Zeit in Sekunden für die Operation. Standard: 3600 (1 Stunde)
info.startingDataDiff=Starte Daten-Differenz-Vergleich zwischen {0} und {1}
success.dataDiffComplete=Daten-Differenz abgeschlossen. Identisch: {0}, Unterschiedlich: {1}, Nur in Tabelle1: {2}, Nur in Tabelle2: {3}
error.dataDiff=Daten-Differenz-Fehler: {0}
error.noKeyColumns=Keine Schlüsselspalten für Zeilenabgleich angegeben
