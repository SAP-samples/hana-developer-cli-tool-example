title=导出数据
export=将表/视图数据导出为CSV、Excel或JSON文件
exportTable=源表名称
exportSchema=源模式名称
exportOutput=输出文件路径
exportFormat=导出格式（csv、excel、json）
exportWhere=用于筛选的WHERE子句（可选）
exportLimit=最大导出行数
exportOrderBy=ORDER BY子句（可选）
exportColumns=逗号分隔的列列表（可选，默认：*）
exportDelimiter=CSV分隔符
exportIncludeHeaders=在CSV导出中包含标题行
exportNullValue=NULL单元格使用的值
exportMaxRows=允许的最大行数
exportTimeout=操作超时（秒）
help.exportTable=要导出的源HANA表或视图的名称。示例：EMPLOYEES 或 SCHEMA.TABLE_NAME
help.exportSchema=包含该表的模式。如果未提供，则使用当前模式。
help.exportOutput=输出文件的完整路径。如果未提供，将根据表和时间戳生成文件名称。
help.exportFormat=导出格式：csv为逗号分隔值，excel为.xlsx文件，json为JSON数组
help.exportWhere=可选的WHERE子句以筛选导出的行。示例：SALARY > 50000
help.exportLimit=最大导出行数。默认值：1000000
help.exportOrderBy=可选的ORDER BY子句以排序导出的数据。示例：NAME ASC、SALARY DESC
help.exportColumns=要导出的列的逗号分隔列表。如果未提供，则导出所有列。
help.exportDelimiter=在CSV文件中用作字段分隔符的字符。默认值：逗号（,）
help.exportIncludeHeaders=在CSV导出中将列名称作为第一行包含。推荐：true
help.exportNullValue=输出中用于NULL/空值的字符串。默认值：空字符串
help.exportMaxRows=允许的最大行数以防止过度导出。默认值：1000000
help.exportTimeout=允许导出操作的最大时间（秒）。默认值：3600（1小时）
info.startingExport=开始导出表：{0}
info.noDataToExport=指定的表中没有要导出的数据
success.exportComplete=导出成功完成。已导出 {0} 行至：{1}（持续时间：{2} 秒）
error.export=导出错误：{0}
error.fileWrite=无法写入输出文件 {0}：{1}
error.noSchemaSpecified=未指定模式且无法确定当前模式
error.tableNotFound=未找到表：{0}
