title=Copia de tabla
tableCopy=Copiar la estructura de la tabla y/o datos con filtrado opcional
tableCopySourceTable=Nombre de la tabla de origen
tableCopyTargetTable=Nombre de la tabla de destino
tableCopySourceSchema=Nombre del esquema de origen
tableCopyTargetSchema=Nombre del esquema de destino
tableCopyStructureOnly=Copiar solo estructura (sin datos)
tableCopyDataOnly=Copiar solo datos (sin estructura)
tableCopyWhere=Filtro de cláusula WHERE para la copia de datos
tableCopyLimit=Límite de filas para la copia de datos
tableCopyBatchSize=Tamaño de lote para el procesamiento
tableCopyTimeout=Tiempo de espera de la operación en segundos
help.tableCopySourceTable=Nombre de la tabla de origen desde la que copiar. Ejemplo: CUSTOMERS
help.tableCopyTargetTable=Nombre de la tabla de destino a la que copiar. Ejemplo: CUSTOMERS_BACKUP
help.tableCopySourceSchema=Esquema que contiene la tabla de origen. Predeterminado: esquema actual
help.tableCopyTargetSchema=Esquema de la tabla de destino. Predeterminado: esquema actual
help.tableCopyStructureOnly=Copiar solo la estructura de la tabla sin datos. No se puede usar con dataOnly. Predeterminado: false
help.tableCopyDataOnly=Copiar solo datos a una tabla existente. No se puede usar con structureOnly. Predeterminado: false
help.tableCopyWhere=Cláusula WHERE para filtrar filas durante la copia. Ejemplo: STATUS='ACTIVE' AND YEAR=2024
help.tableCopyLimit=Número máximo de filas a copiar. Útil para pruebas o copias parciales.
help.tableCopyBatchSize=Número de filas a insertar en cada lote. Predeterminado: 1000
help.tableCopyTimeout=Tiempo máximo en segundos para la operación de copia de tabla. Predeterminado: 3600 (1 hora)
info.startingTableCopy=Iniciando copia de tabla de {0} a {1}
info.copyingStructure=Copiando estructura de la tabla
info.targetTableExists=La tabla de destino {0}.{1} ya existe
info.copyingData=Copiando datos de la tabla
info.rowsRead=Se leyeron {0} filas de la tabla de origen
info.processedRows=Procesadas {0} de {1} filas
success.structureCopied=Estructura de tabla copiada correctamente
success.dataCopied={0} filas copiadas correctamente
success.tableCopyComplete=Copia de tabla completada. Origen: {0}, Destino: {1}, Filas copiadas: {2}
error.tableCopy=Error de copia de tabla: {0}
error.sourceTableNotFound=Tabla de origen {0}.{1} no encontrada
error.targetTableAlreadyExists=La tabla de destino ya existe. Use el modo dataOnly para copiar datos a una tabla existente.
