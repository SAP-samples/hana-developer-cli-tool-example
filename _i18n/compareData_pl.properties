title=Porównaj dane
compareData=Porównaj dane między dwiema tabelami lub schematami pod kątem różnic
compareDataSourceTable=Nazwa tabeli źródłowej
compareDataSourceSchema=Nazwa schematu źródłowego
compareDataTargetTable=Nazwa tabeli docelowej
compareDataTargetSchema=Nazwa schematu docelowego
compareDataKeyColumns=Kolumny kluczowe do dopasowania (oddzielone przecinkami)
compareDataOutput=Ścieżka pliku raportu wyjściowego
compareDataColumns=Kolumny do porównania (oddzielone przecinkami, opcjonalnie)
compareDataShowMatches=Pokaż szczegóły pasujących wierszy
compareDataLimit=Maksymalna liczba wierszy do porównania
compareDataTimeout=Limit czasu operacji w sekundach
help.compareDataSourceTable=Nazwa pierwszej tabeli do porównania. Przykład: EMPLOYEES lub SCHEMA.TABLE_NAME
help.compareDataSourceSchema=Schemat zawierający tabelę źródłową. Jeśli nie podano, używa bieżącego schematu.
help.compareDataTargetTable=Nazwa drugiej tabeli do porównania. Przykład: EMPLOYEES_NEW
help.compareDataTargetSchema=Schemat zawierający tabelę docelową. Jeśli nie podano, używa schematu źródłowego.
help.compareDataKeyColumns=Lista kolumn kluczowych oddzielonych przecinkami, używanych do dopasowywania wierszy między tabelami. Przykład: EMP_ID lub ID, DEPT_ID
help.compareDataOutput=Ścieżka pliku dla raportu porównania. Jeśli nie podano, wyniki są wyświetlane w konsoli.
help.compareDataColumns=Lista kolumn do porównania oddzielonych przecinkami. Jeśli nie podano, porównywane są wszystkie wspólne kolumny.
help.compareDataShowMatches=Wyświetl szczegóły pasujących wierszy w raporcie. Domyślnie: false
help.compareDataLimit=Maksymalna liczba wierszy do porównania z każdej tabeli. Domyślnie: 1000
help.compareDataTimeout=Maksymalny czas w sekundach dla porównania. Domyślnie: 3600 (1 godzina)
info.startingDataComparison=Rozpoczynanie porównania danych między {0} a {1}
success.comparisonComplete=Porównanie zakończone. Źródło: {0} wierszy, Cel: {1} wierszy, Dopasowania: {2}, Różnice: {3}, TylkoŹródło: {4}, TylkoCel: {5}
error.compareData=Błąd porównania danych: {0}
error.noKeyColumns=Nie określono kolumn kluczowych do dopasowania wierszy
error.schemaRequired=Wymagane są schematy źródłowy i docelowy
