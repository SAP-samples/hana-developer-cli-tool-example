title=Linaje de datos
dataLineage=Rastrear el linaje de datos y las transformaciones entre tablas
dataLineageTable=Nombre de la tabla a rastrear
dataLineageSchema=Esquema de la tabla
dataLineageDirection=Dirección del linaje (upstream, downstream, bidirectional)
dataLineageDepth=Profundidad máxima del linaje
dataLineageIncludeTransformations=Incluir transformaciones (vistas, procedimientos)
dataLineageOutput=Ruta del archivo de informe de salida
dataLineageFormat=Formato del informe (json, csv, graphml, summary)
dataLineageTimeout=Tiempo de espera de la operación en segundos
help.dataLineageTable=Nombre de la tabla cuyo linaje se va a rastrear. Ejemplo: SALES_ORDERS
help.dataLineageSchema=Esquema que contiene la tabla. Si no se proporciona, se usa el esquema actual.
help.dataLineageDirection=Dirección del linaje: upstream (tablas de origen), downstream (tablas dependientes), bidirectional (ambos). Predeterminado: upstream
help.dataLineageDepth=Profundidad máxima del linaje a rastrear. Predeterminado: 5
help.dataLineageIncludeTransformations=Incluir vistas, procedimientos y transformaciones en el linaje. Predeterminado: true
help.dataLineageOutput=Ruta del archivo para el informe de linaje. Si no se proporciona, los resultados se muestran en la consola.
help.dataLineageFormat=Formato del informe: json (estructurado), csv (tabular), graphml (XML de gráficos), summary (resumen). Predeterminado: summary
help.dataLineageTimeout=Tiempo máximo en segundos para la operación. Predeterminado: 3600 (1 hora)
info.startingLineageTrace=Iniciando rastreo de linaje para la tabla {0} en dirección {1}
success.lineageTraceComplete=Rastreo de linaje completado. Tablas de origen: {0}, Transformaciones: {1}, Tablas de destino: {2}
error.dataLineage=Error de linaje de datos: {0}
