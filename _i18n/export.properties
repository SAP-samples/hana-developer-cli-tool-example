title=Export Data
export=Export table/view data to CSV, Excel, or JSON files
exportTable=Source Table Name
exportSchema=Source Schema Name
exportOutput=Output File Path
exportFormat=Export Format (csv, excel, json)
exportWhere=WHERE Clause for Filtering (optional)
exportLimit=Maximum Rows to Export
exportOrderBy=ORDER BY Clause (optional)
exportColumns=Comma-separated Column List (optional, default: *)
exportDelimiter=CSV Delimiter Character
exportIncludeHeaders=Include Header Row in CSV Export
exportNullValue=Value to Use for NULL Cells
exportMaxRows=Maximum Rows to Allow
exportTimeout=Operation Timeout in Seconds
help.exportTable=Name of the source HANA table or view to export. Example: EMPLOYEES or SCHEMA.TABLE_NAME
help.exportSchema=Schema containing the table. If not provided, uses current schema.
help.exportOutput=Full path to output file. If not provided, generates file name based on table and timestamp.
help.exportFormat=Export format: csv for comma-separated values, excel for .xlsx files, json for JSON array
help.exportWhere=Optional WHERE clause to filter exported rows. Example: SALARY > 50000
help.exportLimit=Maximum number of rows to export. Default: 1000000
help.exportOrderBy=Optional ORDER BY clause for sorting exported data. Example: NAME ASC, SALARY DESC
help.exportColumns=Comma-separated list of columns to export. If not provided, all columns are exported.
help.exportDelimiter=Character to use as field delimiter in CSV files. Default: comma (,)
help.exportIncludeHeaders=Include column names as first row in CSV export. Recommended: true
help.exportNullValue=String to use for NULL/empty values in output. Default: empty string
help.exportMaxRows=Maximum rows allowed to prevent excessive exports. Default: 1000000
help.exportTimeout=Maximum time in seconds to allow for the export operation. Default: 3600 (1 hour)
info.startingExport=Starting export of table: {0}
info.noDataToExport=No data to export from the specified table
success.exportComplete=Export completed successfully. Exported {0} rows to: {1} (Duration: {2} seconds)
error.export=Export error: {0}
error.fileWrite=Failed to write output file {0}: {1}
error.noSchemaSpecified=No schema specified and cannot determine current schema
error.tableNotFound=Table not found: {0}
