help.matchMode = स्वचालित: पहले नाम से मिलान करने का प्रयास करें, फिर स्थिति। नाम: केवल स्तंभ नामों से मिलान करें। आदेश: स्तंभ स्थिति से मिलान करें।
help.truncate = आयात से पहले लक्ष्य तालिका से सभी मौजूदा डेटा हटाने के लिए चेक करें। सावधानी: यह सभी डेटा को स्थायी रूप से हटा देगा!
help.batchSize = प्रत्येक बैच में संसाधित करने योग्य पंक्तियों की संख्या। बड़े बैच तेजी हैं (1000+)। छोटे बैच कम मेमोरी का उपयोग करते हैं (100-500)।
help.worksheet = Excel फाइलों के लिए, किस वर्कशीट से आयात करना है (1-आधारित: 1 = पहली शीट, 2 = दूसरी शीट, आदि)। CSV फाइलों के लिए अनदेखा किया गया।
help.startRow = किस पंक्ति से पढ़ना शुरू करें (1-आधारित)। हेडर पंक्ति को छोड़ने के लिए 2 का उपयोग करें, पहली 4 पंक्तियों को छोड़ने के लिए 5 का उपयोग करें।
help.skipEmptyRows = किसी भी स्तंभ में कोई भी डेटा नहीं होने वाली पंक्तियों को छोड़ने के लिए चेक करें। डेटा गुणवत्ता बनाए रखने के लिए अनुशंसित।
help.excelCacheMode = कैश: पूरी फाइल को मेमोरी में लोड करता है (छोटी फाइलों के लिए तेजी)। Emit: फाइल सामग्री को स्ट्रीम करता है (बड़ी फाइलों के लिए बेहतर > 100MB)।
help.dryRun = डेटाबेस को वास्तव में संशोधित किए बिना आयात का पूर्वावलोकन करने के लिए चेक करें। दिखाता है कि क्या आयात किया जाएगा और कोई भी त्रुटि होगी।
help.maxFileSizeMB = स्वीकार करने के लिए अधिकतम फाइल आकार (MB में)। इससे बड़ी फाइलें अस्वीकार कर दी जाएंगी। डिफ़ॉल्ट 500MB बहुत अधिक संसाधन खपत से बचाता है।
help.timeoutSeconds = आयात प्रक्रिया के लिए अनुमत अधिकतम समय (सेकंड में)। यदि आयात इस समय से अधिक समय लेता है, तो इसे समाप्त कर दिया जाएगा। डिफ़ॉल्ट 3600 = 1 घंटा।
help.nullValues = NULL के रूप में माने जाने वाले मानों की अल्पविराम से अलग की गई सूची। उदाहरण: "null,NULL,#N/A,,N/A" इन स्ट्रिंग्स को डेटाबेस NULL मानों में परिवर्तित करता है।
help.skipWithErrors = भले ही कुछ पंक्तियों को त्रुटियों का सामना करना पड़े, आयात जारी रखने के लिए चेक करें। छोड़ी गई पंक्तियां लॉग की जाएंगी। अधिकतम सीमा निर्धारित करने के लिए अधिकतम त्रुटियों के साथ संयोजित करें।
help.maxErrorsAllowed = आयात बंद करने से पहले अनुमत अधिकतम त्रुटियां (-1 = असीमित)। सहनशीलता के लिए 0 पर सेट करें। 10 त्रुटियों के बाद रुकने के लिए 10 पर सेट करें।
