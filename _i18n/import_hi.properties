help.table = लक्ष्य HANA तालिका का नाम। तालिका डेटाबेस में पहले से मौजूद होनी चाहिए। उदाहरण: EMPLOYEES या SCHEMA.TABLE_NAME
help.outputFormat = आउटपुट प्रारूप: CSV अल्पविराम से अलग मान के लिए, Excel .xlsx फाइलों के लिए
help.matchMode = स्वचालित: पहले नाम से मिलान का प्रयास करें, फिर स्थिति। नाम: केवल स्तंभ नामों से मिलान करें। क्रम: स्तंभ स्थिति से मिलान करें।
help.truncate = आयात को शुरू करने से पहले लक्ष्य तालिका से सभी मौजूदा डेटा हटाने के लिए चेक करें। चेतावनी: यह सभी डेटा को स्थायी रूप से हटा देगा!
help.batchSize = प्रत्येक बैच में संसाधित करने के लिए पंक्तियों की संख्या। बड़े बैच तेज़ हैं (1000+)। छोटे बैच कम मेमोरी का उपयोग करते हैं (100-500)।
help.worksheet = Excel फाइलों के लिए, किस वर्कशीट से आयात करना है (1-आधारित: 1 = पहली शीट, 2 = दूसरी शीट, आदि)। CSV फाइलों के लिए अनदेखा किया जाता है।
help.startRow = किस पंक्ति से पढ़ना शुरू करें (1-आधारित)। हेडर पंक्ति को छोड़ने के लिए 2 का उपयोग करें, पहली 4 पंक्तियों को छोड़ने के लिए 5 का उपयोग करें।
help.skipEmptyRows = बिना किसी स्तंभ में डेटा वाली पंक्तियों को छोड़ने के लिए चेक करें। डेटा गुणवत्ता बनाए रखने के लिए अनुशंसित।
help.excelCacheMode = कैश: पूरी फाइल को मेमोरी में लोड करता है (छोटी फाइलों के लिए तेज़)। उत्सर्जन: फाइल सामग्री को स्ट्रीम करता है (बड़ी फाइलों >100MB के लिए बेहतर)।
help.dryRun = डेटाबेस को वास्तव में संशोधित किए बिना आयात पूर्वावलोकन करने के लिए चेक करें। दिखाता है कि क्या आयात किया जाएगा और कोई त्रुटि होगी।
help.maxFileSizeMB = स्वीकार करने के लिए अधिकतम फाइल आकार (MB में)। इससे बड़ी फाइलें अस्वीकृत की जाएंगी। डिफ़ॉल्ट 500MB अत्यधिक संसाधन खपत से बचाता है।
help.timeoutSeconds = आयात प्रक्रिया के लिए अनुमति देने के लिए अधिकतम समय (सेकंड में)। यदि आयात इस समय से अधिक हो, तो यह समाप्त हो जाएगा। डिफ़ॉल्ट 3600 = 1 घंटा।
help.nullValues = NULL के रूप में मानने के लिए मानों की अल्पविराम से अलग की गई सूची। उदाहरण: "null,NULL,#N/A,,N/A" इन स्ट्रिंग्स को डेटाबेस NULL मान में परिवर्तित करता है।
help.skipWithErrors = यदि कुछ पंक्तियों को त्रुटि का सामना करना पड़े तो भी आयात जारी रखने के लिए चेक करें। छोड़ी गई पंक्तियों को लॉग किया जाएगा। सीमाएं निर्धारित करने के लिए अधिकतम अनुमत त्रुटियों के साथ संयोजन करें।
help.maxErrorsAllowed = आयात को रोकने से पहले अधिकतम अनुमत त्रुटियां (-1 = असीमित)। कोई सहिष्णुता के लिए 0 पर सेट करें। 10 त्रुटियों के बाद रोकने के लिए 10 पर सेट करें।
