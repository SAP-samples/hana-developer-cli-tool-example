swagger.info.title=API HANA CLI
swagger.info.description=API RESTful pour HANA Developer CLI Tool\n\nCette API fournit un accès programmatique aux opérations de base de données HANA, y compris l’inspection des schémas, la gestion des tables/vues, les opérations de conteneur HDI et la gestion des instances de service HANA Cloud.\n\n## Fonctionnalités\n- Inspection des objets de base de données (tables, vues, fonctions, index)\n- Gestion des conteneurs HDI\n- Liste des instances de service HANA Cloud\n- Informations système et requêtes de fonctionnalités\n- Gestion de la configuration\n\n## Authentification\nLes connexions à la base de données utilisent la configuration définie via l’endpoint PUT /.
