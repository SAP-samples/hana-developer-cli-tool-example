title=Clonage de schéma
schemaClone=Cloner un schéma complet avec ou sans données
schemaCloneSourceSchema=Nom du schéma source
schemaCloneTargetSchema=Nom du schéma cible
schemaCloneIncludeData=Inclure les données de table dans le clonage
schemaCloneIncludeGrants=Inclure les droits et privilèges
schemaCloneParallel=Nombre d’opérations parallèles
schemaCloneExcludeTables=Tables à exclure (séparées par des virgules)
schemaCloneTimeout=Délai d’expiration de l’opération en secondes
help.schemaCloneSourceSchema=Nom du schéma source à cloner. Exemple : PROD_SCHEMA
help.schemaCloneTargetSchema=Nom du schéma cible à cloner. Sera créé s’il n’existe pas. Exemple : DEV_SCHEMA
help.schemaCloneIncludeData=Cloner les données de table avec la structure. Si false, seule la structure est clonée. Valeur par défaut : false
help.schemaCloneIncludeGrants=Copier les droits et privilèges du schéma source vers le schéma cible. Valeur par défaut : false
help.schemaCloneParallel=Nombre d’opérations de clonage en parallèle. Des valeurs plus élevées peuvent améliorer les performances. Valeur par défaut : 1
help.schemaCloneExcludeTables=Liste de tables à exclure du clonage, séparées par des virgules. Exemple : TEMP_TABLE,LOG_TABLE
help.schemaCloneTimeout=Temps maximal en secondes pour l’opération de clonage de schéma. Valeur par défaut : 7200 (2 heures)
info.startingSchemaClone=Démarrage du clonage de schéma de {0} vers {1}
info.targetSchemaExists=Le schéma cible {0} existe déjà
info.creatingTargetSchema=Création du schéma cible {0}
info.foundTables={0} table(s) trouvée(s) à cloner
info.cloningTable=Clonage de la table : {0}
info.copiedRows={0} ligne(s) copiée(s) vers la table {1}
info.foundViews={0} vue(s) trouvée(s) à cloner
info.cloningView=Clonage de la vue : {0}
info.viewCloneSkipped=Vue {0} ignorée (nécessite une conversion DDL manuelle)
info.cloningGrants=Clonage des droits et privilèges
info.foundGrants={0} droit(s) trouvé(s) à cloner
success.schemaCloneComplete=Clonage de schéma terminé. Source : {0}, Cible : {1}, Tables : {2}, Lignes : {3}
error.schemaClone=Erreur de clonage de schéma : {0}
error.sourceSchemaNotFound=Schéma source {0} introuvable
error.tableCloneFailed=Échec du clonage de la table {0} : {1}
error.viewCloneFailed=Échec du clonage de la vue {0} : {1}
