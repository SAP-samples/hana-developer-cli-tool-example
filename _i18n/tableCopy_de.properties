title=Tabelle kopieren
tableCopy=Tabellenstruktur und/oder Daten mit optionaler Filterung kopieren
tableCopySourceTable=Quelltabellenname
tableCopyTargetTable=Zieltabellenname
tableCopySourceSchema=Quell-Schema-Name
tableCopyTargetSchema=Ziel-Schema-Name
tableCopyStructureOnly=Nur Struktur kopieren (keine Daten)
tableCopyDataOnly=Nur Daten kopieren (keine Struktur)
tableCopyWhere=WHERE-Klausel-Filter für Datenkopie
tableCopyLimit=Zeilenlimit für Datenkopie
tableCopyBatchSize=Batchgröße für die Verarbeitung
tableCopyTimeout=Zeitüberschreitung der Operation in Sekunden
help.tableCopySourceTable=Name der zu kopierenden Quelltabelle. Beispiel: CUSTOMERS
help.tableCopyTargetTable=Name der Zieltabelle zum Kopieren. Beispiel: CUSTOMERS_BACKUP
help.tableCopySourceSchema=Schema mit der Quelltabelle. Standard: aktuelles Schema
help.tableCopyTargetSchema=Schema für die Zieltabelle. Standard: aktuelles Schema
help.tableCopyStructureOnly=Nur Tabellenstruktur ohne Daten kopieren. Kann nicht mit dataOnly verwendet werden. Standard: false
help.tableCopyDataOnly=Nur Daten in eine vorhandene Tabelle kopieren. Kann nicht mit structureOnly verwendet werden. Standard: false
help.tableCopyWhere=WHERE-Klausel zum Filtern von Zeilen während des Kopierens. Beispiel: STATUS='ACTIVE' AND YEAR=2024
help.tableCopyLimit=Maximale Anzahl zu kopierender Zeilen. Nützlich zum Testen oder für Teilkopien.
help.tableCopyBatchSize=Anzahl der Zeilen, die in jedem Batch eingefügt werden. Standard: 1000
help.tableCopyTimeout=Maximale Zeit in Sekunden für die Tabellenkopieoperation. Standard: 3600 (1 Stunde)
info.startingTableCopy=Starte Tabellenkopie von {0} zu {1}
info.copyingStructure=Kopiere Tabellenstruktur
info.targetTableExists=Zieltabelle {0}.{1} existiert bereits
info.copyingData=Kopiere Tabellendaten
info.rowsRead={0} Zeilen aus Quelltabelle gelesen
info.processedRows={0} von {1} Zeilen verarbeitet
success.structureCopied=Tabellenstruktur erfolgreich kopiert
success.dataCopied={0} Zeilen erfolgreich kopiert
success.tableCopyComplete=Tabellenkopie abgeschlossen. Quelle: {0}, Ziel: {1}, Kopierte Zeilen: {2}
error.tableCopy=Tabellenkopie-Fehler: {0}
error.sourceTableNotFound=Quelltabelle {0}.{1} nicht gefunden
error.targetTableAlreadyExists=Zieltabelle existiert bereits. Verwenden Sie den dataOnly-Modus zum Kopieren von Daten in eine vorhandene Tabelle.
