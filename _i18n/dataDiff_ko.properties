help.dataDiffTable1=비교할 첫 번째 테이블 이름. 예: EMPLOYEES
help.dataDiffTable2=비교할 두 번째 테이블 이름. 예: EMPLOYEES_NEW
help.dataDiffSchema1=첫 번째 테이블이 포함된 스키마. 제공되지 않으면 현재 스키마를 사용합니다.
help.dataDiffSchema2=두 번째 테이블이 포함된 스키마. 제공되지 않으면 첫 번째 스키마를 사용합니다.
help.dataDiffKeyColumns=행을 고유하게 식별하는 컬럼의 쉼표로 구분된 목록. 예: EMP_ID 또는 DEPT_ID, EMP_ID
help.dataDiffCompareColumns=중복을 비교할 특정 컬럼의 쉼표로 구분된 목록. 생략하면 모든 공통 컬럼이 비교됩니다.
help.dataDiffOutput=차이 보고서의 파일 경로. 제공되지 않으면 결과가 콘솔에 표시됩니다.
help.dataDiffFormat=보고서 형식: json (구조화), csv (표 형식), summary (개요). 기본값: summary
help.dataDiffLimit=각 테이블에서 처리할 최대 행 수. 기본값: 10000
help.dataDiffShowValues=보고서에 실제 컬럼 값 포함. 기본값: false
help.dataDiffTimeout=작업의 최대 시간(초). 기본값: 3600 (1시간)
info.startingDataDiff={0}과(와) {1} 간의 데이터 차이 비교를 시작합니다
success.dataDiffComplete=데이터 차이 완료. 동일: {0}, 다름: {1}, 테이블1만: {2}, 테이블2만: {3}
error.dataDiff=데이터 차이 오류: {0}
error.noKeyColumns=행 매칭을 위한 키 컬럼이 지정되지 않았습니다
