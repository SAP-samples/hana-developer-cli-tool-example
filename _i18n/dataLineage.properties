title=Data Lineage
dataLineage=Trace data lineage and transformations across tables
dataLineageTable=Table Name to Trace
dataLineageSchema=Schema for Table
dataLineageDirection=Lineage Direction (upstream, downstream, bidirectional)
dataLineageDepth=Maximum Lineage Depth
dataLineageIncludeTransformations=Include Transformations (views, procedures)
dataLineageOutput=Output Report File Path
dataLineageFormat=Report Format (json, csv, graphml, summary)
dataLineageTimeout=Operation Timeout in Seconds
help.dataLineageTable=Name of the table to trace lineage for. Example: SALES_ORDERS
help.dataLineageSchema=Schema containing the table. If not provided, uses current schema.
help.dataLineageDirection=Lineage direction: upstream (source tables), downstream (dependent tables), bidirectional (both). Default: upstream
help.dataLineageDepth=Maximum depth of lineage to trace. Default: 5
help.dataLineageIncludeTransformations=Include views, procedures, and transformations in lineage. Default: true
help.dataLineageOutput=File path for lineage report. If not provided, results display in console.
help.dataLineageFormat=Report format: json (structured), csv (tabular), graphml (graph XML), summary (overview). Default: summary
help.dataLineageTimeout=Maximum time in seconds for operation. Default: 3600 (1 hour)
info.startingLineageTrace=Starting lineage trace for table {0} in {1} direction
success.lineageTraceComplete=Lineage trace complete. Source Tables: {0}, Transformations: {1}, Target Tables: {2}
error.dataLineage=Data lineage error: {0}
