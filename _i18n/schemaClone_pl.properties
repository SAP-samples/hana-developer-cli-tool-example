help.schemaCloneSourceSchema=Nazwa schematu źródłowego do sklonowania. Przykład: PROD_SCHEMA
help.schemaCloneTargetSchema=Nazwa schematu docelowego do sklonowania. Zostanie utworzony, jeśli nie istnieje. Przykład: DEV_SCHEMA
help.schemaCloneIncludeData=Klonuj dane tabeli wraz ze strukturą. Jeśli false, klonowana jest tylko struktura. Domyślnie: false
help.schemaCloneIncludeGrants=Skopiuj uprawnienia i przywileje ze schematu źródłowego do docelowego. Domyślnie: false
help.schemaCloneParallel=Liczba równoległych operacji klonowania. Wyższe wartości mogą poprawić wydajność. Domyślnie: 1
help.schemaCloneExcludeTables=Lista tabel do wykluczenia z klonowania oddzielonych przecinkami. Przykład: TEMP_TABLE,LOG_TABLE
help.schemaCloneTimeout=Maksymalny czas w sekundach dla operacji klonowania schematu. Domyślnie: 7200 (2 godziny)
