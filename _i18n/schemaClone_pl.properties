title=Klonowanie schematu
schemaClone=Klonuj cały schemat z danymi lub bez
schemaCloneSourceSchema=Nazwa schematu źródłowego
schemaCloneTargetSchema=Nazwa schematu docelowego
schemaCloneIncludeData=Dołącz dane tabeli w klonie
schemaCloneIncludeGrants=Dołącz uprawnienia i przywileje
