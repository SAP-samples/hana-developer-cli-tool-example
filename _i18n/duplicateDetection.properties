title=Duplicate Detection
duplicateDetection=Find duplicate records in a table
duplicateDetectionTable=Table Name to Check
duplicateDetectionSchema=Schema for Table
duplicateDetectionKeyColumns=Key Columns for Matching (comma-separated)
duplicateDetectionCheckColumns=Columns to Check for Duplicates (comma-separated, optional)
duplicateDetectionExcludeColumns=Columns to Exclude from Check (comma-separated, optional)
duplicateDetectionMode=Detection Mode (exact, fuzzy, partial)
duplicateDetectionThreshold=Similarity Threshold for Fuzzy Matching (0-1)
duplicateDetectionOutput=Output Report File Path
duplicateDetectionFormat=Report Format (json, csv, summary)
duplicateDetectionLimit=Maximum Rows to Check
duplicateDetectionTimeout=Operation Timeout in Seconds
help.duplicateDetectionTable=Name of the table to check for duplicates. Example: CUSTOMERS
help.duplicateDetectionSchema=Schema containing the table. If not provided, uses current schema.
help.duplicateDetectionKeyColumns=Comma-separated list of columns used for matching. Example: FIRST_NAME, LAST_NAME
help.duplicateDetectionCheckColumns=Specific columns to compare for duplicates. If omitted, all except key columns are checked.
help.duplicateDetectionExcludeColumns=Columns to skip during duplicate detection.
help.duplicateDetectionMode=Detection mode: exact (exact match), fuzzy (similarity-based), partial (partial match). Default: exact
help.duplicateDetectionThreshold=Similarity threshold for fuzzy matching (0-1). Default: 0.95
help.duplicateDetectionOutput=File path for duplicate report. If not provided, results display in console.
help.duplicateDetectionFormat=Report format: json (structured), csv (tabular), summary (overview). Default: summary
help.duplicateDetectionLimit=Maximum rows to check. Default: 10000
help.duplicateDetectionTimeout=Maximum time in seconds for operation. Default: 3600 (1 hour)
info.startingDuplicateDetection=Starting duplicate detection for table {0}
success.duplicateDetectionComplete=Duplicate detection complete. Total: {0}, Unique: {1}, Duplicate Groups: {2}, Total Duplicates: {3}
error.duplicateDetection=Duplicate detection error: {0}
error.noColumns=No columns found in table
