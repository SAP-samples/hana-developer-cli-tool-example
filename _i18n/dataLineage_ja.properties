title=データ系統
dataLineage=テーブル間のデータ系統と変換をトレース
dataLineageTable=トレースするテーブル名
dataLineageSchema=テーブルのスキーマ
dataLineageDirection=系統の方向（upstream、downstream、bidirectional）
dataLineageDepth=最大系統深度
dataLineageIncludeTransformations=変換を含める（ビュー、プロシージャ）
dataLineageOutput=出力レポートファイルパス
dataLineageFormat=レポート形式（json、csv、graphml、summary）
dataLineageTimeout=操作タイムアウト（秒）
help.dataLineageTable=系統をトレースするテーブル名。例：SALES_ORDERS
help.dataLineageSchema=テーブルを含むスキーマ。指定しない場合は現在のスキーマを使用します。
help.dataLineageDirection=系統の方向：upstream（ソーステーブル）、downstream（依存テーブル）、bidirectional（両方）。デフォルト：upstream
help.dataLineageDepth=トレースする最大系統深度。デフォルト：5
help.dataLineageIncludeTransformations=系統にビュー、プロシージャ、変換を含めます。デフォルト：true
help.dataLineageOutput=系統レポートのファイルパス。指定しない場合は結果がコンソールに表示されます。
help.dataLineageFormat=レポート形式：json（構造化）、csv（表形式）、graphml（グラフXML）、summary（概要）。デフォルト：summary
help.dataLineageTimeout=操作の最大時間（秒）。デフォルト：3600（1時間）
info.startingLineageTrace=テーブル {0} の {1} 方向の系統トレースを開始しています
success.lineageTraceComplete=系統トレース完了。ソーステーブル：{0}、変換：{1}、ターゲットテーブル：{2}
error.dataLineage=データ系統エラー：{0}
