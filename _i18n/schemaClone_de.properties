schemaCloneIncludeData=Tabellendaten in Klon einbeziehen
schemaCloneIncludeGrants=Berechtigungen und Privilegien einbeziehen
schemaCloneParallel=Anzahl paralleler Operationen
schemaCloneExcludeTables=Auszuschließende Tabellen (durch Komma getrennt)
schemaCloneTimeout=Zeitüberschreitung der Operation in Sekunden
help.schemaCloneSourceSchema=Name des zu klonenden Quellschemas. Beispiel: PROD_SCHEMA
help.schemaCloneTargetSchema=Name des Zielschemas zum Klonen. Wird erstellt, falls nicht vorhanden. Beispiel: DEV_SCHEMA
help.schemaCloneIncludeData=Tabellendaten zusammen mit Struktur klonen. Falls false, wird nur die Struktur geklont. Standard: false
help.schemaCloneIncludeGrants=Berechtigungen und Privilegien vom Quell- zum Zielschema kopieren. Standard: false
help.schemaCloneParallel=Anzahl paralleler Klonoperationen. Höhere Werte können die Leistung verbessern. Standard: 1
help.schemaCloneExcludeTables=Durch Komma getrennte Liste von Tabellen, die vom Klonen ausgeschlossen werden sollen. Beispiel: TEMP_TABLE,LOG_TABLE
help.schemaCloneTimeout=Maximale Zeit in Sekunden für die Schema-Klonoperation. Standard: 7200 (2 Stunden)
