title=数据血缘
dataLineage=跟踪表之间的数据血缘和转换
dataLineageTable=要跟踪的表名称
dataLineageSchema=表的模式
dataLineageDirection=血缘方向（上游、下游、双向）
dataLineageDepth=最大血缘深度
dataLineageIncludeTransformations=包含转换（视图、过程）
dataLineageOutput=输出报告文件路径
dataLineageFormat=报告格式（json、csv、graphml、摘要）
dataLineageTimeout=操作超时（秒）
help.dataLineageTable=要跟踪血缘的表的名称。示例：SALES_ORDERS
help.dataLineageSchema=包含该表的模式。如果未提供，则使用当前模式。
help.dataLineageDirection=血缘方向：upstream（源表）、downstream（依赖表）、bidirectional（两者）。默认值：upstream
help.dataLineageDepth=要跟踪的血缘的最大深度。默认值：5
help.dataLineageIncludeTransformations=在血缘中包含视图、过程和转换。默认值：true
help.dataLineageOutput=血缘报告的文件路径。如果未提供，结果将显示在控制台中。
help.dataLineageFormat=报告格式：json（结构化）、csv（表格式）、graphml（图形XML）、summary（概览）。默认值：summary
help.dataLineageTimeout=操作的最大时间（秒）。默认值：3600（1小时）
info.startingLineageTrace=开始以 {1} 方向对表 {0} 进行血缘跟踪
success.lineageTraceComplete=血缘跟踪完成。源表：{0}，转换：{1}，目标表：{2}
error.dataLineage=数据血缘错误：{0}
