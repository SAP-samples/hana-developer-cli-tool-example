title=Duplikat-Erkennung
duplicateDetection=Finde doppelte Datensätze in einer Tabelle
duplicateDetectionTable=Name der zu überprüfenden Tabelle
duplicateDetectionSchema=Schema für Tabelle
duplicateDetectionKeyColumns=Schlüsselspalten für Matching (kommagetrennt)
duplicateDetectionCheckColumns=Zu überprüfende Spalten (kommagetrennt, optional)
duplicateDetectionExcludeColumns=Auszuschließende Spalten (kommagetrennt, optional)
duplicateDetectionMode=Erkennungsmodus (exact, fuzzy, partial)
duplicateDetectionThreshold=Ähnlichkeitsschwelle für Fuzzy-Matching (0-1)
duplicateDetectionOutput=Ausgabedatei für Bericht
duplicateDetectionFormat=Berichtsformat (json, csv, summary)
duplicateDetectionLimit=Maximale Anzahl zu überprüfender Zeilen
duplicateDetectionTimeout=Timeout der Operation in Sekunden
duplicateDetectionExample=Beispiel: hana-cli duplicateDetection --table MY_TABLE --mode exact --threshold 0.95
help.duplicateDetectionTable=Name der Tabelle zur Überprüfung auf Duplikate. Beispiel: CUSTOMERS
help.duplicateDetectionSchema=Schema mit der Tabelle. Falls nicht angegeben, wird aktuelles Schema verwendet.
help.duplicateDetectionKeyColumns=Kommagetrennte Liste von Spalten zum Matching. Beispiel: FIRST_NAME, LAST_NAME
help.duplicateDetectionCheckColumns=Spezifische Spalten zum Vergleich auf Duplikate. Falls leer, werden alle außer Schlüsselspalten überprüft.
help.duplicateDetectionExcludeColumns=Spalten zum Überspringen während der Duplikat-Erkennung.
help.duplicateDetectionMode=Erkennungsmodus: exact (exakte Übereinstimmung), fuzzy (ähnlichkeitsbasiert), partial (teilweise Übereinstimmung). Standard: exact
help.duplicateDetectionThreshold=Ähnlichkeitsschwelle für Fuzzy-Matching (0-1). Standard: 0.95
help.duplicateDetectionOutput=Dateipfad für Duplikatbericht. Falls nicht angegeben, werden Ergebnisse in Konsole angezeigt.
help.duplicateDetectionFormat=Berichtsformat: json (strukturiert), csv (tabellarisch), summary (Übersicht). Standard: summary
help.duplicateDetectionLimit=Maximale Anzahl zu überprüfender Zeilen. Standard: 10000
help.duplicateDetectionTimeout=Maximale Zeit in Sekunden für Operation. Standard: 3600 (1 Stunde)
info.startingDuplicateDetection=Starte Duplikat-Erkennung für Tabelle {0}
success.duplicateDetectionComplete=Duplikat-Erkennung abgeschlossen. Gesamt: {0}, Unikat: {1}, Duplikatgruppen: {2}, Gesamtduplikate: {3}
error.duplicateDetection=Duplikat-Erkennungsfehler: {0}
error.noColumns=Keine Spalten in Tabelle gefunden
error.noColumnsDetailed=Keine Spalten in Tabelle {0} gefunden. Schema: {1}
warning.duplicateDetectionCheckColumnsMissing=Angeforderte Prüfspalten nicht gefunden: {0}. Verfügbare Spalten: {1}
warning.duplicateDetectionCheckColumnsNone=Keine der angeforderten Prüfspalten gefunden: {0}. Verfügbare Spalten: {1}
