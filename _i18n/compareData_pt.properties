title=Compare Data
compareData=Comparar dados entre duas tabelas ou esquemas para diferenças
compareDataSourceTable=Nome da Tabela Origem
compareDataSourceSchema=Nome do Esquema Origem
compareDataTargetTable=Nome da Tabela Destino
compareDataTargetSchema=Nome do Esquema Destino
compareDataKeyColumns=Colunas-Chave para Correspondência (separadas por vírgula)
compareDataOutput=Caminho do Ficheiro do Relatório de Saída
compareDataColumns=Colunas a Comparar (separadas por vírgula, opcional)
compareDataShowMatches=Mostrar Detalhes de Linhas Correspondentes
compareDataLimit=Número Máximo de Linhas a Comparar
compareDataTimeout=Tempo Limite da Operação em Segundos
help.compareDataSourceTable=Nome da primeira tabela a comparar. Exemplo: EMPLOYEES ou SCHEMA.TABLE_NAME
help.compareDataSourceSchema=Esquema contendo a tabela origem. Se não fornecido, usa o esquema atual.
help.compareDataTargetTable=Nome da segunda tabela a comparar. Exemplo: EMPLOYEES_NEW
help.compareDataTargetSchema=Esquema contendo a tabela destino. Se não fornecido, usa o esquema origem.
help.compareDataKeyColumns=Lista separada por vírgula de colunas-chave usadas para combinar linhas entre tabelas. Exemplo: EMP_ID ou ID, DEPT_ID
help.compareDataOutput=Caminho do ficheiro para o relatório de comparação. Se não fornecido, os resultados aparecem na consola.
help.compareDataColumns=Lista separada por vírgula de colunas a comparar. Se não fornecido, todas as colunas comuns são comparadas.
help.compareDataShowMatches=Mostrar detalhes de linhas correspondentes no relatório. Padrão: false
help.compareDataLimit=Número máximo de linhas a comparar de cada tabela. Padrão: 1000
help.compareDataTimeout=Tempo máximo em segundos para a comparação. Padrão: 3600 (1 hora)
info.startingDataComparison=Iniciando comparação de dados entre {0} e {1}
success.comparisonComplete=Comparação completa. Origem: {0} linhas, Destino: {1} linhas, Correspondências: {2}, Diferenças: {3}, ApenasNaOrigem: {4}, ApenasNoDestino: {5}
error.compareData=Erro na comparação de dados: {0}
error.noKeyColumns=Nenhuma coluna-chave especificada para correspondência de linhas
error.schemaRequired=Esquemas origem e destino são necessários

