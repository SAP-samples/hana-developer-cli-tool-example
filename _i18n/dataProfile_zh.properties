title=数据概览
dataProfile=为表生成数据质量指标和统计分析
dataProfileTable=目标表名称
dataProfileSchema=目标模式名称
dataProfileColumns=要进行概览的列（逗号分隔，可选）
dataProfileOutput=输出报告文件路径
dataProfileFormat=报告格式（json、csv、摘要）
dataProfileNullAnalysis=包含NULL值分析
dataProfileCardinalityAnalysis=包含基数分析
dataProfileStatisticalAnalysis=包含统计分析（最小值、最大值、平均值）
dataProfilePatternAnalysis=包含模式分析（长度统计）
dataProfileSampleSize=最大分析行数
dataProfileTimeout=操作超时（秒）
help.dataProfileTable=要进行概览的表的名称。示例：EMPLOYEES 或 SCHEMA.TABLE_NAME
help.dataProfileSchema=包含该表的模式。如果未提供，则使用当前模式。
help.dataProfileColumns=要进行概览的特定列的逗号分隔列表。如果未提供，则对所有列进行概览。
help.dataProfileOutput=概览报告的文件路径。如果未提供，结果将显示在控制台中。
help.dataProfileFormat=报告格式：json（结构化）、csv（表格式）、summary（概览）。默认值：summary
help.dataProfileNullAnalysis=计算NULL计数和百分比。默认值：true
help.dataProfileCardinalityAnalysis=计算不同值计数。默认值：true
help.dataProfileStatisticalAnalysis=计算最小值、最大值、平均值。默认值：true
help.dataProfilePatternAnalysis=计算字符串长度统计。默认值：false（较慢）
help.dataProfileSampleSize=最大分析行数（限制大表）。默认值：10000
help.dataProfileTimeout=概览的最大时间（秒）。默认值：3600（1小时）
info.startingDataProfile=开始对表 {0} 进行数据概览分析
success.dataProfileComplete=表 {0} 的数据概览完成。行数：{1}，列数：{2}
error.dataProfile=数据概览错误：{0}
error.tableNotFound=未找到表：{0}
