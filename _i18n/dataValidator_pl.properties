help.dataValidatorTable=Nazwa tabeli do walidacji. Przykład: EMPLOYEES
help.dataValidatorSchema=Schemat zawierający tabelę. Jeśli nie podano, używa bieżącego schematu.
help.dataValidatorRules=Reguły walidacji w formacie: column1:required,email;column2:numeric,range:0:100
help.dataValidatorRulesFile=Ścieżka do pliku zawierającego reguły walidacji
help.dataValidatorColumns=Lista określonych kolumn do walidacji oddzielonych przecinkami. Jeśli pominięto, wszystkie są walidowane.
