title=Schema Clone
schemaClone=Clonar esquema inteiro com ou sem dados
schemaCloneSourceSchema=Nome do Esquema Origem
schemaCloneTargetSchema=Nome do Esquema Destino
schemaCloneIncludeData=Incluir Dados de Tabela no Clone
schemaCloneIncludeGrants=Incluir Grants e Privilégios
schemaCloneParallel=Número de Operações Paralelas
schemaCloneExcludeTables=Tabelas a Excluir (separadas por vírgula)
schemaCloneTimeout=Tempo Limite da Operação em Segundos
help.schemaCloneSourceSchema=Nome do esquema origem a clonar de. Exemplo: PROD_SCHEMA
help.schemaCloneTargetSchema=Nome do esquema destino a clonar para. Será criado se não existir. Exemplo: DEV_SCHEMA
help.schemaCloneIncludeData=Clonar dados de tabela junto com estrutura. Se false, apenas estrutura é clonada. Padrão: false
help.schemaCloneIncludeGrants=Copiar grants e privilégios do esquema origem para destino. Padrão: false
help.schemaCloneParallel=Número de operações de clonagem paralelas. Valores mais altos podem melhorar desempenho. Padrão: 1
help.schemaCloneExcludeTables=Lista separada por vírgula de tabelas a excluir da clonagem. Exemplo: TEMP_TABLE,LOG_TABLE
help.schemaCloneTimeout=Tempo máximo em segundos para operação de clone de esquema. Padrão: 7200 (2 horas)
info.startingSchemaClone=Iniciando clone de esquema de {0} para {1}
info.targetSchemaExists=Esquema destino {0} já existe
info.creatingTargetSchema=Criando esquema destino {0}
info.foundTables=Encontrada(s) {0} tabela(s) para clonar
info.cloningTable=Clonando tabela: {0}
info.copiedRows=Copiada(s) {0} linha(s) para tabela {1}
info.foundViews=Encontrada(s) {0} vista(s) para clonar
info.cloningView=Clonando vista: {0}
info.viewCloneSkipped=Vista {0} ignorada (requer conversão DDL manual)
info.cloningGrants=Clonando grants e privilégios
info.foundGrants=Encontrado(s) {0} grant(s) para clonar
success.schemaCloneComplete=Clone de esquema completo. Origem: {0}, Destino: {1}, Tabelas: {2}, Linhas: {3}
error.schemaClone=Erro no clone de esquema: {0}
error.sourceSchemaNotFound=Esquema origem {0} não encontrado
error.tableCloneFailed=Falha ao clonar tabela {0}: {1}
error.viewCloneFailed=Falha ao clonar vista {0}: {1}

