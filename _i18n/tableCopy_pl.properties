title=Kopiowanie tabeli
tableCopy=Kopiuj strukturę tabeli i/lub dane z opcjonalnym filtrowaniem
tableCopySourceTable=Nazwa tabeli źródłowej
tableCopyTargetTable=Nazwa tabeli docelowej
tableCopySourceSchema=Nazwa schematu źródłowego
tableCopyTargetSchema=Nazwa schematu docelowego
tableCopyStructureOnly=Kopiuj tylko strukturę (bez danych)
tableCopyDataOnly=Kopiuj tylko dane (bez struktury)
tableCopyWhere=Filtr klauzuli WHERE dla kopiowania danych
tableCopyLimit=Limit wierszy dla kopiowania danych
tableCopyBatchSize=Rozmiar partii do przetwarzania
tableCopyTimeout=Limit czasu operacji w sekundach
help.tableCopySourceTable=Nazwa tabeli źródłowej do skopiowania. Przykład: CUSTOMERS
help.tableCopyTargetTable=Nazwa tabeli docelowej do skopiowania. Przykład: CUSTOMERS_BACKUP
help.tableCopySourceSchema=Schemat zawierający tabelę źródłową. Domyślnie: bieżący schemat
help.tableCopyTargetSchema=Schemat dla tabeli docelowej. Domyślnie: bieżący schemat
help.tableCopyStructureOnly=Kopiuj tylko strukturę tabeli bez danych. Nie można używać z dataOnly. Domyślnie: false
help.tableCopyDataOnly=Kopiuj tylko dane do istniejącej tabeli. Nie można używać z structureOnly. Domyślnie: false
help.tableCopyWhere=Klauzula WHERE do filtrowania wierszy podczas kopiowania. Przykład: STATUS='ACTIVE' AND YEAR=2024
help.tableCopyLimit=Maksymalna liczba wierszy do skopiowania. Przydatne do testowania lub częściowych kopii.
help.tableCopyBatchSize=Liczba wierszy do wstawienia w każdej partii. Domyślnie: 1000
help.tableCopyTimeout=Maksymalny czas w sekundach dla operacji kopiowania tabeli. Domyślnie: 3600 (1 godzina)
info.startingTableCopy=Rozpoczynanie kopiowania tabeli z {0} do {1}
info.copyingStructure=Kopiowanie struktury tabeli
info.targetTableExists=Tabela docelowa {0}.{1} już istnieje
info.copyingData=Kopiowanie danych tabeli
info.rowsRead=Odczytano {0} wierszy z tabeli źródłowej
info.processedRows=Przetworzono {0} z {1} wierszy
success.structureCopied=Struktura tabeli skopiowana pomyślnie
success.dataCopied={0} wierszy skopiowanych pomyślnie
success.tableCopyComplete=Kopiowanie tabeli zakończone. Źródło: {0}, Cel: {1}, Skopiowane wiersze: {2}
error.tableCopy=Błąd kopiowania tabeli: {0}
error.sourceTableNotFound=Nie znaleziono tabeli źródłowej {0}.{1}
error.targetTableAlreadyExists=Tabela docelowa już istnieje. Użyj trybu dataOnly, aby skopiować dane do istniejącej tabeli.
