title=表复制
tableCopy=复制表结构和/或数据(可选筛选)
tableCopySourceTable=源表名称
tableCopyTargetTable=目标表名称
tableCopySourceSchema=源模式名称
tableCopyTargetSchema=目标模式名称
tableCopyStructureOnly=仅复制结构(无数据)
tableCopyDataOnly=仅复制数据(无结构)
tableCopyWhere=数据复制的 WHERE 子句筛选器
tableCopyLimit=数据复制的行限制
tableCopyBatchSize=处理批次大小
tableCopyTimeout=操作超时时间(秒)
help.tableCopySourceTable=要从中复制的源表名称。示例:CUSTOMERS
help.tableCopyTargetTable=要复制到的目标表名称。示例:CUSTOMERS_BACKUP
help.tableCopySourceSchema=包含源表的模式。默认值:当前模式
help.tableCopyTargetSchema=目标表的模式。默认值:当前模式
help.tableCopyStructureOnly=仅复制表结构而不复制数据。不能与 dataOnly 一起使用。默认值:false
help.tableCopyDataOnly=仅将数据复制到现有表。不能与 structureOnly 一起使用。默认值:false
help.tableCopyWhere=在复制期间筛选行的 WHERE 子句。示例:STATUS='ACTIVE' AND YEAR=2024
help.tableCopyLimit=要复制的最大行数。用于测试或部分复制。
help.tableCopyBatchSize=每批插入的行数。默认值:1000
help.tableCopyTimeout=表复制操作的最大时间(秒)。默认值:3600(1小时)
info.startingTableCopy=开始从 {0} 复制表到 {1}
info.copyingStructure=正在复制表结构
info.targetTableExists=目标表 {0}.{1} 已存在
info.copyingData=正在复制表数据
info.rowsRead=从源表读取 {0} 行
info.processedRows=已处理 {1} 行中的 {0} 行
success.structureCopied=表结构成功复制
success.dataCopied=成功复制 {0} 行
success.tableCopyComplete=表复制完成。源:{0}、目标:{1}、已复制行数:{2}
error.tableCopy=表复制错误:{0}
error.sourceTableNotFound=未找到源表 {0}.{1}
error.targetTableAlreadyExists=目标表已存在。使用 dataOnly 模式将数据复制到现有表。
