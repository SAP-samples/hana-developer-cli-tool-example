title=Comprobación referencial
referentialCheck=Verificar integridad referencial y restricciones de claves externas
referentialCheckTable=Nombre de la tabla a comprobar
referentialCheckSchema=Esquema de la tabla
referentialCheckConstraints=Restricciones específicas a comprobar (separadas por comas, opcional)
referentialCheckMode=Modo de comprobación (check, report, repair, detailed)
referentialCheckOutput=Ruta del archivo de informe de salida
referentialCheckFormat=Formato del informe (json, csv, summary)
referentialCheckLimit=Número máximo de filas a comprobar
referentialCheckTimeout=Tiempo de espera de la operación en segundos
help.referentialCheckTable=Nombre de la tabla para verificar integridad referencial. Ejemplo: ORDERS
help.referentialCheckSchema=Esquema que contiene la tabla. Si no se proporciona, se usa el esquema actual.
help.referentialCheckConstraints=Lista separada por comas de nombres de restricciones específicas a comprobar. Si se omite, se comprueban todas.
help.referentialCheckMode=Modo de comprobación: check (identificar violaciones), report (generar informe), repair (intentar arreglar), detailed (análisis completo). Predeterminado: check
help.referentialCheckOutput=Ruta del archivo para el informe de integridad. Si no se proporciona, los resultados se muestran en la consola.
help.referentialCheckFormat=Formato del informe: json (estructurado), csv (tabular), summary (resumen). Predeterminado: summary
help.referentialCheckLimit=Número máximo de filas para comprobar registros huérfanos. Predeterminado: 10000
help.referentialCheckTimeout=Tiempo máximo en segundos para la operación. Predeterminado: 3600 (1 hora)
info.startingReferentialCheck=Iniciando comprobación de integridad referencial para la tabla {0}
info.noForeignKeys=No se encontraron claves externas para la tabla {0}
success.referentialCheckComplete=Comprobación referencial completada. Total FK: {0}, Válidas: {1}, Violadas: {2}, Registros huérfanos: {3}
error.referentialCheck=Error de comprobación referencial: {0}
