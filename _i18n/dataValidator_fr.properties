title=Validateur de données
dataValidator=Valider les données par rapport aux règles métier et contraintes
dataValidatorTable=Nom de la table à valider
dataValidatorSchema=Schéma de la table
dataValidatorRules=Règles de validation (format colonne:règle)
dataValidatorRulesFile=Chemin du fichier de règles de validation
dataValidatorColumns=Colonnes à valider (séparées par des virgules, facultatif)
dataValidatorOutput=Chemin du fichier de rapport de sortie
dataValidatorFormat=Format du rapport (json, csv, summary, detailed)
dataValidatorLimit=Nombre maximal de lignes à valider
dataValidatorStopOnFirstError=Arrêter le traitement après la première erreur
dataValidatorTimeout=Délai d’expiration de l’opération en secondes
help.dataValidatorTable=Nom de la table à valider. Exemple : EMPLOYEES
help.dataValidatorSchema=Schéma contenant la table. Si non fourni, utilise le schéma courant.
help.dataValidatorRules=Règles de validation au format : colonne1:required,email;colonne2:numeric,range:0:100
help.dataValidatorRulesFile=Chemin du fichier contenant les règles de validation
help.dataValidatorColumns=Liste de colonnes spécifiques à valider séparées par des virgules. Si omise, toutes sont validées.
help.dataValidatorOutput=Chemin du fichier pour le rapport de validation. Si non fourni, les résultats s’affichent dans la console.
help.dataValidatorFormat=Format du rapport : json (structuré), csv (tabulaire), summary (aperçu), detailed (résultats complets). Valeur par défaut : summary
help.dataValidatorLimit=Nombre maximal de lignes à valider. Valeur par défaut : 10000
help.dataValidatorStopOnFirstError=Arrêter la validation après la première erreur. Valeur par défaut : false
help.dataValidatorTimeout=Temps maximal en secondes pour l’opération. Valeur par défaut : 3600 (1 heure)
info.startingDataValidation=Démarrage de la validation des données pour la table {0}
success.dataValidationComplete=Validation des données terminée. Total : {0}, Valides : {1}, Invalides : {2}, Erreurs : {3}
error.dataValidator=Erreur de validation des données : {0}
error.noValidationRules=Aucune règle de validation spécifiée ou trouvée
