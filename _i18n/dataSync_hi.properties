title = डेटा सिंक्रोनाइज़ेशन
dataSync = सिस्टम या तालिकाओं के बीच डेटा सिंक्रोनाइज़ करें
dataSyncSourceConnection = स्रोत कनेक्शन प्रोफाइल या कनेक्शन स्ट्रिंग
dataSyncTargetConnection = लक्ष्य कनेक्शन प्रोफाइल या कनेक्शन स्ट्रिंग
dataSyncSchema = स्कीमा का नाम
dataSyncTable = सिंक्रोनाइज़ करने के लिए तालिका का नाम
dataSyncMode = सिंक्रोनाइज़ेशन मोड (full या incremental)
dataSyncBatchSize = प्रोसेसिंग के लिए बैच आकार
dataSyncConflictResolution = संघर्ष समाधान कौशल (source, target, या skip)
dataSyncKeyColumns = पंक्ति मिलान के लिए मुख्य स्तंभ (अल्पविराम से अलग)
dataSyncTimeout = ऑपरेशन टाइमआउट सेकंड में
help.dataSyncSourceConnection = स्रोत डेटाबेस कनेक्शन प्रोफाइल या कनेक्शन स्ट्रिंग। उदाहरण: DEV_DB
help.dataSyncTargetConnection = लक्ष्य डेटाबेस कनेक्शन प्रोफाइल या कनेक्शन स्ट्रिंग। उदाहरण: PROD_DB
help.dataSyncSchema = सिंक्रोनाइज़ करने के लिए तालिका युक्त स्कीमा। डिफ़ॉल्ट: वर्तमान स्कीमा
help.dataSyncTable = सिंक्रोनाइज़ करने के लिए तालिका का नाम। उदाहरण: CUSTOMERS
help.dataSyncMode = सिंक्रोनाइज़ेशन मोड: 'full' (पूर्ण सिंक्रोनाइज़ेशन) या 'incremental' (केवल परिवर्तन)। डिफ़ॉल्ट: full
help.dataSyncBatchSize = प्रत्येक बैच में प्रोसेस करने योग्य पंक्तियों की संख्या। डिफ़ॉल्ट: 1000
help.dataSyncConflictResolution = संघर्षों को कैसे समाधान करें: 'source' (स्रोत जीतता है), 'target' (लक्ष्य जीतता है), 'skip' (संघर्ष छोड़ें)। डिफ़ॉल्ट: source
help.dataSyncKeyColumns = पंक्तियों से मेल खाने के लिए मुख्य स्तंभों की अल्पविराम से अलग की गई सूची। उदाहरण: ID या CUSTOMER_ID, REGION
help.dataSyncTimeout = सिंक्रोनाइज़ेशन के लिए अधिकतम समय सेकंड में। डिफ़ॉल्ट: 3600 (1 घंटा)
info.startingSynchronization = {0}.{1} के लिए डेटा सिंक्रोनाइज़ेशन शुरू कर रहे हैं
info.rowsRead = स्रोत तालिका से {0} पंक्तियां पढ़ी गईं
info.fullSyncMode = पूर्ण सिंक्रोनाइज़ेशन मोड का उपयोग कर रहे हैं
info.incrementalSyncMode = वृद्धिशील सिंक्रोनाइज़ेशन मोड का उपयोग कर रहे हैं
success.syncComplete = सिंक्रोनाइज़ेशन पूर्ण। {0} पंक्तियां तालिका {1} में सिंक्रोनाइज़ की गईं
error.dataSync = डेटा सिंक्रोनाइज़ेशन त्रुटि: {0}
