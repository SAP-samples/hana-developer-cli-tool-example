title=중복 감지
duplicateDetection=테이블에서 중복 레코드 찾기
duplicateDetectionTable=확인할 테이블 이름
duplicateDetectionSchema=테이블의 스키마
duplicateDetectionKeyColumns=매칭용 키 컬럼 (쉼표로 구분)
duplicateDetectionCheckColumns=중복 확인할 컬럼 (쉼표로 구분, 선택사항)
duplicateDetectionExcludeColumns=확인에서 제외할 컬럼 (쉼표로 구분, 선택사항)
duplicateDetectionMode=감지 모드 (exact, fuzzy, partial)
duplicateDetectionThreshold=퍼지 매칭을 위한 유사도 임계값 (0-1)
duplicateDetectionOutput=출력 보고서 파일 경로
duplicateDetectionFormat=보고서 형식 (json, csv, summary)
duplicateDetectionLimit=확인할 최대 행 수
duplicateDetectionTimeout=작업 타임아웃 (초)
duplicateDetectionExample=예: hana-cli duplicateDetection --table MY_TABLE --mode exact --threshold 0.95
help.duplicateDetectionTable=중복을 확인할 테이블 이름. 예: CUSTOMERS
help.duplicateDetectionSchema=테이블이 포함된 스키마. 제공되지 않으면 현재 스키마를 사용합니다.
help.duplicateDetectionKeyColumns=매칭에 사용되는 컬럼의 쉼표로 구분된 목록. 예: FIRST_NAME, LAST_NAME
help.duplicateDetectionCheckColumns=중복을 비교할 특정 컬럼. 생략하면 키 컬럼을 제외한 모든 컬럼이 확인됩니다.
help.duplicateDetectionExcludeColumns=중복 감지 중 건너뛸 컬럼.
help.duplicateDetectionMode=감지 모드: exact (정확 일치), fuzzy (유사도 기반), partial (부분 일치). 기본값: exact
help.duplicateDetectionThreshold=퍼지 매칭을 위한 유사도 임계값 (0-1). 기본값: 0.95
help.duplicateDetectionOutput=중복 보고서의 파일 경로. 제공되지 않으면 결과가 콘솔에 표시됩니다.
help.duplicateDetectionFormat=보고서 형식: json (구조화), csv (표 형식), summary (개요). 기본값: summary
help.duplicateDetectionLimit=확인할 최대 행 수. 기본값: 10000
help.duplicateDetectionTimeout=작업의 최대 시간(초). 기본값: 3600 (1시간)
info.startingDuplicateDetection=테이블 {0}에 대한 중복 감지를 시작합니다
success.duplicateDetectionComplete=중복 감지 완료. 전체: {0}, 고유: {1}, 중복 그룹: {2}, 전체 중복: {3}
error.duplicateDetection=중복 감지 오류: {0}
error.noColumns=테이블에서 컬럼을 찾을 수 없습니다
error.noColumnsDetailed=테이블 {0}에서 컬럼을 찾을 수 없습니다. 스키마: {1}
warning.duplicateDetectionCheckColumnsMissing=요청한 확인 컬럼을 찾을 수 없음: {0}. 사용 가능한 컬럼: {1}
warning.duplicateDetectionCheckColumnsNone=요청한 확인 컬럼을 하나도 찾을 수 없음: {0}. 사용 가능한 컬럼: {1}
