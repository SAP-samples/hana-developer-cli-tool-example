title=Data Diff
dataDiff=Show differences between two datasets with detailed change tracking
dataDiffTable1=First Table Name
dataDiffTable2=Second Table Name
dataDiffSchema1=Schema for First Table
dataDiffSchema2=Schema for Second Table
dataDiffKeyColumns=Key Columns for Matching (comma-separated)
dataDiffCompareColumns=Columns to Compare (comma-separated, optional)
dataDiffOutput=Output Report File Path
dataDiffFormat=Report Format (json, csv, summary)
dataDiffLimit=Maximum Rows to Compare
dataDiffShowValues=Show Actual Values in Report
dataDiffTimeout=Operation Timeout in Seconds
help.dataDiffTable1=Name of the first table to compare. Example: EMPLOYEES
help.dataDiffTable2=Name of the second table to compare. Example: EMPLOYEES_NEW
help.dataDiffSchema1=Schema containing the first table. If not provided, uses current schema.
help.dataDiffSchema2=Schema containing the second table. If not provided, uses first schema.
help.dataDiffKeyColumns=Comma-separated list of columns that uniquely identify rows. Example: EMP_ID or DEPT_ID, EMP_ID
help.dataDiffCompareColumns=Comma-separated list of specific columns to compare. If not provided, all common columns are compared.
help.dataDiffOutput=File path for difference report. If not provided, results display in console.
help.dataDiffFormat=Report format: json (structured), csv (tabular), summary (overview). Default: summary
help.dataDiffLimit=Maximum rows from each table to process. Default: 10000
help.dataDiffShowValues=Include actual column values in the report. Default: false
help.dataDiffTimeout=Maximum time in seconds for the operation. Default: 3600 (1 hour)
info.startingDataDiff=Starting data diff comparison between {0} and {1}
success.dataDiffComplete=Data diff complete. Identical: {0}, Different: {1}, OnlyInTable1: {2}, OnlyInTable2: {3}
error.dataDiff=Data diff error: {0}
error.noKeyColumns=No key columns specified for row matching
