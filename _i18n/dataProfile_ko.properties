title=데이터 프로파일
dataProfile=테이블에 대한 데이터 품질 지표 및 통계 분석 생성
dataProfileTable=대상 테이블 이름
dataProfileSchema=대상 스키마 이름
dataProfileColumns=프로파일링할 컬럼 (쉼표로 구분, 선택사항)
dataProfileOutput=출력 보고서 파일 경로
dataProfileFormat=보고서 형식 (json, csv, summary)
dataProfileNullAnalysis=NULL 값 분석 포함
dataProfileCardinalityAnalysis=카디널리티 분석 포함
dataProfileStatisticalAnalysis=통계 분석 포함 (최소, 최대, 평균)
dataProfilePatternAnalysis=패턴 분석 포함 (길이 통계)
dataProfileSampleSize=분석할 최대 행 수
dataProfileTimeout=작업 타임아웃 (초)
help.dataProfileTable=프로파일링할 테이블 이름. 예: EMPLOYEES 또는 SCHEMA.TABLE_NAME
help.dataProfileSchema=테이블이 포함된 스키마. 제공되지 않으면 현재 스키마를 사용합니다.
help.dataProfileColumns=프로파일링할 특정 컬럼의 쉼표로 구분된 목록. 제공되지 않으면 모든 컬럼이 프로파일링됩니다.
help.dataProfileOutput=프로파일링 보고서의 파일 경로. 제공되지 않으면 결과가 콘솔에 표시됩니다.
help.dataProfileFormat=보고서 형식: json (구조화), csv (표 형식), summary (개요). 기본값: summary
help.dataProfileNullAnalysis=NULL 개수 및 백분율 계산. 기본값: true
help.dataProfileCardinalityAnalysis=고유값 개수 계산. 기본값: true
help.dataProfileStatisticalAnalysis=최소, 최대, 평균값 계산. 기본값: true
help.dataProfilePatternAnalysis=문자열 길이 통계 계산. 기본값: false (느림)
help.dataProfileSampleSize=분석할 최대 행 수 (큰 테이블 제한). 기본값: 10000
help.dataProfileTimeout=프로파일링의 최대 시간(초). 기본값: 3600 (1시간)
info.startingDataProfile=테이블에 대한 데이터 프로파일 분석을 시작합니다: {0}
success.dataProfileComplete=테이블 {0}에 대한 데이터 프로파일 완료. 행: {1}, 컬럼: {2}
error.dataProfile=데이터 프로파일 오류: {0}
error.tableNotFound=테이블을 찾을 수 없음: {0}
