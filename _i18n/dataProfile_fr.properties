title=Profil de données
dataProfile=Générer des métriques de qualité des données et une analyse statistique pour les tables
dataProfileTable=Nom de la table cible
dataProfileSchema=Nom du schéma cible
dataProfileColumns=Colonnes à profiler (séparées par des virgules, facultatif)
dataProfileOutput=Chemin du fichier de rapport de sortie
dataProfileFormat=Format du rapport (json, csv, summary)
dataProfileNullAnalysis=Inclure l’analyse des valeurs NULL
dataProfileCardinalityAnalysis=Inclure l’analyse de cardinalité
dataProfileStatisticalAnalysis=Inclure l’analyse statistique (min, max, avg)
dataProfilePatternAnalysis=Inclure l’analyse des motifs (statistiques de longueur)
dataProfileSampleSize=Nombre maximal de lignes à analyser
dataProfileTimeout=Délai d’expiration de l’opération en secondes
help.dataProfileTable=Nom de la table à profiler. Exemple : EMPLOYEES ou SCHEMA.TABLE_NAME
help.dataProfileSchema=Schéma contenant la table. Si non fourni, utilise le schéma courant.
help.dataProfileColumns=Liste de colonnes spécifiques à profiler séparées par des virgules. Si non fourni, toutes les colonnes sont profilées.
help.dataProfileOutput=Chemin du fichier pour le rapport de profilage. Si non fourni, les résultats s’affichent dans la console.
help.dataProfileFormat=Format du rapport : json (structuré), csv (tabulaire), summary (aperçu). Valeur par défaut : summary
help.dataProfileNullAnalysis=Calculer le nombre et le pourcentage de NULL. Valeur par défaut : true
help.dataProfileCardinalityAnalysis=Calculer le nombre de valeurs distinctes. Valeur par défaut : true
help.dataProfileStatisticalAnalysis=Calculer les valeurs min, max et moyennes. Valeur par défaut : true
help.dataProfilePatternAnalysis=Calculer les statistiques de longueur de chaînes. Valeur par défaut : false (plus lent)
help.dataProfileSampleSize=Nombre maximal de lignes à analyser (limite les grandes tables). Valeur par défaut : 10000
help.dataProfileTimeout=Temps maximal en secondes pour le profilage. Valeur par défaut : 3600 (1 heure)
info.startingDataProfile=Démarrage de l’analyse de profil de données pour la table : {0}
success.dataProfileComplete=Profil de données terminé pour la table {0}. Lignes : {1}, Colonnes : {2}
error.dataProfile=Erreur de profil de données : {0}
error.tableNotFound=Table introuvable : {0}
