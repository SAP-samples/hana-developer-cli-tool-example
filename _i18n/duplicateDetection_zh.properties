title=重复检测
duplicateDetection=在表中查找重复记录
duplicateDetectionTable=要检查的表名称
duplicateDetectionSchema=表的模式名称
duplicateDetectionKeyColumns=用于匹配的关键列（逗号分隔）
duplicateDetectionCheckColumns=要检查重复的列（逗号分隔，可选）
duplicateDetectionExcludeColumns=要从检查中排除的列（逗号分隔，可选）
duplicateDetectionMode=检测模式（精确、模糊、部分）
duplicateDetectionThreshold=模糊匹配的相似度阈值（0-1）
duplicateDetectionOutput=输出报告文件路径
duplicateDetectionFormat=报告格式（json、csv、摘要）
duplicateDetectionLimit=最大检查行数
duplicateDetectionTimeout=操作超时（秒）
duplicateDetectionExample=示例：hana-cli duplicateDetection --table MY_TABLE --mode exact --threshold 0.95
help.duplicateDetectionTable=要检查重复的表名称。示例：CUSTOMERS
help.duplicateDetectionSchema=包含该表的模式。如果未提供，则使用当前模式。
help.duplicateDetectionKeyColumns=用于匹配的列的逗号分隔列表。示例：FIRST_NAME、LAST_NAME
help.duplicateDetectionCheckColumns=要比较重复的特定列。如果省略，则检查除关键列外的所有列。
help.duplicateDetectionExcludeColumns=在重复检测期间要跳过的列。
help.duplicateDetectionMode=检测模式：exact（精确匹配）、fuzzy（基于相似度）、partial（部分匹配）。默认值：exact
help.duplicateDetectionThreshold=模糊匹配的相似度阈值（0-1）。默认值：0.95
help.duplicateDetectionOutput=重复报告的文件路径。如果未提供，结果将显示在控制台中。
help.duplicateDetectionFormat=报告格式：json（结构化）、csv（表格式）、summary（概览）。默认值：summary
help.duplicateDetectionLimit=最大检查行数。默认值：10000
help.duplicateDetectionTimeout=操作的最大时间（秒）。默认值：3600（1小时）
info.startingDuplicateDetection=开始对表 {0} 进行重复检测
success.duplicateDetectionComplete=重复检测完成。总计：{0}，唯一值：{1}，重复组：{2}，总重复数：{3}
error.duplicateDetection=重复检测错误：{0}
error.noColumns=表中未找到列
error.noColumnsDetailed=在表 {0} 中未找到列。模式：{1}
warning.duplicateDetectionCheckColumnsMissing=未找到请求的检查列：{0}。可用列：{1}
warning.duplicateDetectionCheckColumnsNone=未找到任何请求的检查列：{0}。可用列：{1}
