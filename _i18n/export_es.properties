title=Exportar datos
export=Exportar datos de tabla/vista a archivos CSV, Excel o JSON
exportTable=Nombre de la tabla de origen
exportSchema=Nombre del esquema de origen
exportOutput=Ruta del archivo de salida
exportFormat=Formato de exportación (csv, excel, json)
exportWhere=Cláusula WHERE para filtrar (opcional)
exportLimit=Número máximo de filas a exportar
exportOrderBy=Cláusula ORDER BY (opcional)
exportColumns=Lista de columnas separadas por comas (opcional, predeterminado: *)
exportDelimiter=Carácter delimitador CSV
exportIncludeHeaders=Incluir fila de encabezados en la exportación CSV
exportNullValue=Valor a usar para celdas NULL
exportMaxRows=Número máximo de filas permitidas
exportTimeout=Tiempo de espera de la operación en segundos
help.exportTable=Nombre de la tabla o vista HANA de origen a exportar. Ejemplo: EMPLOYEES o SCHEMA.TABLE_NAME
help.exportSchema=Esquema que contiene la tabla. Si no se proporciona, se usa el esquema actual.
help.exportOutput=Ruta completa del archivo de salida. Si no se proporciona, se genera el nombre según la tabla y la marca de tiempo.
help.exportFormat=Formato de exportación: csv para valores separados por comas, excel para archivos .xlsx, json para arreglo JSON
help.exportWhere=Cláusula WHERE opcional para filtrar las filas exportadas. Ejemplo: SALARY > 50000
help.exportLimit=Número máximo de filas a exportar. Predeterminado: 1000000
help.exportOrderBy=Cláusula ORDER BY opcional para ordenar los datos exportados. Ejemplo: NAME ASC, SALARY DESC
help.exportColumns=Lista separada por comas de columnas a exportar. Si no se proporciona, se exportan todas las columnas.
help.exportDelimiter=Carácter a usar como delimitador de campos en archivos CSV. Predeterminado: coma (,)
help.exportIncludeHeaders=Incluir nombres de columnas como primera fila en la exportación CSV. Recomendado: true
help.exportNullValue=Cadena a usar para valores NULL/vacíos en la salida. Predeterminado: cadena vacía
help.exportMaxRows=Número máximo de filas permitidas para evitar exportaciones excesivas. Predeterminado: 1000000
help.exportTimeout=Tiempo máximo en segundos para permitir la operación de exportación. Predeterminado: 3600 (1 hora)
info.startingExport=Iniciando exportación de la tabla: {0}
info.noDataToExport=No hay datos para exportar de la tabla especificada
success.exportComplete=Exportación completada correctamente. {0} filas exportadas a: {1} (Duración: {2} segundos)
error.export=Error de exportación: {0}
error.fileWrite=No se pudo escribir el archivo de salida {0}: {1}
error.noSchemaSpecified=No se especificó el esquema y no se puede determinar el esquema actual
error.tableNotFound=Tabla no encontrada: {0}
