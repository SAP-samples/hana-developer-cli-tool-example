title=Compare Schema
compareSchema=Compare database schema structures across environments
compareSchemaSourceSchema=Source Schema Name
compareSchemaTargetSchema=Target Schema Name
compareSchemaTableFilter=Table Name Filter (comma-separated, optional)
compareSchemaCompareIndexes=Compare Indexes
compareSchemaCompareTriggers=Compare Triggers
compareSchemaCompareConstraints=Compare Constraints
compareSchemaOutput=Output Report File Path
compareSchemaTimeout=Operation Timeout in Seconds
help.compareSchemaSourceSchema=Name of the first schema to compare. Example: SCHEMA1
help.compareSchemaTargetSchema=Name of the second schema to compare. Example: SCHEMA2
help.compareSchemaTableFilter=Optional comma-separated list of specific tables to compare. If not provided, all tables are compared.
help.compareSchemaCompareIndexes=Include index definitions in schema comparison. Default: true
help.compareSchemaCompareTriggers=Include trigger definitions in schema comparison. Default: true
help.compareSchemaCompareConstraints=Include constraint definitions in schema comparison. Default: true
help.compareSchemaOutput=File path for comparison report. If not provided, results display in console.
help.compareSchemaTimeout=Maximum time in seconds for the comparison. Default: 3600 (1 hour)
info.startingSchemaComparison=Starting schema comparison between {0} and {1}
success.schemaComparisonComplete=Schema comparison complete. TableMatches: {0}, TableDifferences: {1}, SourceOnly: {2}, TargetOnly: {3}
error.compareSchema=Schema comparison error: {0}
error.schemaRequired=Source and target schema names are required
