title=Data Validator
dataValidator=Validate data against business rules and constraints
dataValidatorTable=Table Name to Validate
dataValidatorSchema=Schema for Table
dataValidatorRules=Validation Rules (column:rule format)
dataValidatorRulesFile=Path to Validation Rules File
dataValidatorColumns=Columns to Validate (comma-separated, optional)
dataValidatorOutput=Output Report File Path
dataValidatorFormat=Report Format (json, csv, summary, detailed)
dataValidatorLimit=Maximum Rows to Validate
dataValidatorStopOnFirstError=Stop Processing After First Error
dataValidatorTimeout=Operation Timeout in Seconds
help.dataValidatorTable=Name of the table to validate. Example: EMPLOYEES
help.dataValidatorSchema=Schema containing the table. If not provided, uses current schema.
help.dataValidatorRules=Validation rules in format: column1:required,email;column2:numeric,range:0:100
help.dataValidatorRulesFile=Path to file containing validation rules
help.dataValidatorColumns=Comma-separated list of specific columns to validate. If omitted, all are validated.
help.dataValidatorOutput=File path for validation report. If not provided, results display in console.
help.dataValidatorFormat=Report format: json (structured), csv (tabular), summary (overview), detailed (full results). Default: summary
help.dataValidatorLimit=Maximum rows to validate. Default: 10000
help.dataValidatorStopOnFirstError=Stop validation after encountering the first error. Default: false
help.dataValidatorTimeout=Maximum time in seconds for operation. Default: 3600 (1 hour)
info.startingDataValidation=Starting data validation for table {0}
success.dataValidationComplete=Data validation complete. Total: {0}, Valid: {1}, Invalid: {2}, Errors: {3}
error.dataValidator=Data validation error: {0}
error.noValidationRules=No validation rules specified or found
