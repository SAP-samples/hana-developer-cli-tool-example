swagger.info.title=HANA CLI API
swagger.info.description=HANA डेवलपर CLI टूल के लिए RESTful API\n\nयह API HANA डेटाबेस ऑपरेशन तक प्रोग्रामेटिक पहुंच प्रदान करता है, जिसमें स्कीमा निरीक्षण, तालिका/व्यू प्रबंधन, HDI कंटेनर ऑपरेशन, और HANA Cloud सेवा इंस्टेंस प्रबंधन शामिल है।\n\n## सुविधाएं\n- डेटाबेस ऑब्जेक्ट निरीक्षण (तालिकाएं, व्यू, फंक्शन, सूचकांक)\n- HDI कंटेनर प्रबंधन\n- HANA Cloud सेवा इंस्टेंस सूची\n- सिस्टम जानकारी और सुविधा क्वेरी\n- कॉन्फ़िगरेशन प्रबंधन\n\n## प्रमाणीकरण\nडेटाबेस कनेक्शन PUT / एंडपॉइंट के माध्यम से सेट किए गए कॉन्फ़िगरेशन का उपयोग करते हैं।
