title=Datenprofil
dataProfile=Generieren Sie Datenkualitätsmetriken und statistische Analysen für Tabellen
dataProfileTable=Name der Zieltabelle
dataProfileSchema=Name des Zielschemas
dataProfileColumns=Zu profilenierende Spalten (kommagetrennt, optional)
dataProfileOutput=Pfad der Ausgabebericht-Datei
dataProfileFormat=Berichtformat (json, csv, summary)
dataProfileNullAnalysis=NULL-Wert-Analyse einbeziehen
dataProfileCardinalityAnalysis=Kardinalitätsanalyse einbeziehen
dataProfileStatisticalAnalysis=Statistische Analyse einbeziehen (min, max, durchschn.)
dataProfilePatternAnalysis=Musteranalyse einbeziehen (Längenstatistiken)
dataProfileSampleSize=Maximale Anzahl der zu analysierenden Zeilen
dataProfileTimeout=Zeitüberschreitung für Betrieb (Sekunden)
help.dataProfileTable=Name der zu profilierenden Tabelle. Beispiel: MITARBEITER oder SCHEMA.TABELLENNAME
help.dataProfileSchema=Schema mit der Tabelle. Wenn nicht angegeben, wird das aktuelle Schema verwendet.
help.dataProfileColumns=Kommagetrennte Liste spezifischer Spalten zum Profilein. Wenn nicht angegeben, werden alle Spalten profilert.
help.dataProfileOutput=Dateipfad für Profilierungsbericht. Wenn nicht angegeben, werden die Ergebnisse in der Konsole angezeigt.
help.dataProfileFormat=Berichtformat: json (strukturiert), csv (tabellarisch), summary (Übersicht). Standard: summary
help.dataProfileNullAnalysis=Berechnen Sie NULL-Anzahl und -Prozentsatz. Standard: true
help.dataProfileCardinalityAnalysis=Berechnen Sie die Anzahl der eindeutigen Werte. Standard: true
help.dataProfileStatisticalAnalysis=Berechnen Sie min-, max- und Durchschnittswerte. Standard: true
help.dataProfilePatternAnalysis=Berechnen Sie Statistiken zur Zeichenfolgenlänge. Standard: false (langsamer)
help.dataProfileSampleSize=Maximale Zeilen zum Analysieren (begrenzt große Tabellen). Standard: 10000
help.dataProfileTimeout=Maximale Zeit in Sekunden für die Profilierung. Standard: 3600 (1 Stunde)
info.startingDataProfile=Starte Datenprofilanalyse für Tabelle: {0}
success.dataProfileComplete=Datenprofil abgeschlossen für Tabelle {0}. Zeilen: {1}, Spalten: {2}
error.dataProfile=Datenprofil-Fehler: {0}
error.tableNotFound=Tabelle nicht gefunden: {0}
