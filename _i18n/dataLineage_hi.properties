title = डेटा वंश
dataLineage = तालिकाओं में डेटा वंश और परिवर्तनों को ट्रेस करें
dataLineageTable = ट्रेस करने के लिए तालिका का नाम
dataLineageSchema = तालिका के लिए स्कीमा
dataLineageDirection = वंश दिशा (upstream, downstream, bidirectional)
dataLineageDepth = अधिकतम वंश गहराई
dataLineageIncludeTransformations = परिवर्तन शामिल करें (दृश्य, प्रक्रियाएं)
dataLineageOutput = आउटपुट रिपोर्ट फाइल पथ
dataLineageFormat = रिपोर्ट प्रारूप (json, csv, graphml, summary)
dataLineageTimeout = ऑपरेशन टाइमआउट सेकंड में
help.dataLineageTable = वंश को ट्रेस करने के लिए तालिका का नाम। उदाहरण: SALES_ORDERS
help.dataLineageSchema = तालिका युक्त स्कीमा। यदि प्रदान नहीं किया गया, वर्तमान स्कीमा का उपयोग करता है।
help.dataLineageDirection = वंश दिशा: upstream (स्रोत तालिकाएं), downstream (आश्रित तालिकाएं), bidirectional (दोनों)। डिफ़ॉल्ट: upstream
help.dataLineageDepth = ट्रेस करने के लिए वंश की अधिकतम गहराई। डिफ़ॉल्ट: 5
help.dataLineageIncludeTransformations = वंश में दृश्य, प्रक्रियाएं और परिवर्तन शामिल करें। डिफ़ॉल्ट: true
help.dataLineageOutput = वंश रिपोर्ट के लिए फाइल पथ। यदि प्रदान नहीं किया गया, परिणाम कंसोल में प्रदर्शित होते हैं।
help.dataLineageFormat = रिपोर्ट प्रारूप: json (संरचित), csv (सारणीबद्ध), graphml (ग्राफ XML), summary (अवलोकन)। डिफ़ॉल्ट: summary
help.dataLineageTimeout = ऑपरेशन के लिए अधिकतम समय सेकंड में। डिफ़ॉल्ट: 3600 (1 घंटा)
info.startingLineageTrace = {0} दिशा में {1} तालिका के लिए वंश ट्रेस शुरू कर रहे हैं
success.lineageTraceComplete = वंश ट्रेस पूर्ण। स्रोत तालिकाएं: {0}, परिवर्तन: {1}, लक्ष्य तालिकाएं: {2}
error.dataLineage = डेटा वंश त्रुटि: {0}
