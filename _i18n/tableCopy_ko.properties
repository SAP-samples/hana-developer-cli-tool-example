info.copyingStructure=테이블 구조를 복사합니다
info.targetTableExists=대상 테이블 {0}.{1}이(가) 이미 존재합니다
info.copyingData=테이블 데이터를 복사합니다
info.rowsRead=원본 테이블에서 {0}행을 읽었습니다
info.processedRows={1}행 중 {0}행을 처리했습니다
