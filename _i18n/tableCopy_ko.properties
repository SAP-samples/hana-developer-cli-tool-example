help.tableCopySourceTable=복사할 원본 테이블 이름. 예: CUSTOMERS
help.tableCopyTargetTable=복사할 대상 테이블 이름. 예: CUSTOMERS_BACKUP
help.tableCopySourceSchema=원본 테이블이 포함된 스키마. 기본값: 현재 스키마
help.tableCopyTargetSchema=대상 테이블의 스키마. 기본값: 현재 스키마
help.tableCopyStructureOnly=데이터 없이 테이블 구조만 복사합니다. dataOnly와 함께 사용할 수 없습니다. 기본값: false
help.tableCopyDataOnly=기존 테이블에 데이터만 복사합니다. structureOnly와 함께 사용할 수 없습니다. 기본값: false
help.tableCopyWhere=복사 중 행을 필터링하는 WHERE 절. 예: STATUS='ACTIVE' AND YEAR=2024
