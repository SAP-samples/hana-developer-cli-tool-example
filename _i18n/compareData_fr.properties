title=Comparer les données
compareData=Comparer les données entre deux tables ou schémas pour détecter les différences
compareDataSourceTable=Nom de la table source
compareDataSourceSchema=Nom du schéma source
compareDataTargetTable=Nom de la table cible
compareDataTargetSchema=Nom du schéma cible
compareDataKeyColumns=Colonnes clés pour l’appariement (séparées par des virgules)
compareDataOutput=Chemin du fichier de rapport de sortie
compareDataColumns=Colonnes à comparer (séparées par des virgules, facultatif)
compareDataShowMatches=Afficher les détails des lignes correspondantes
compareDataLimit=Nombre maximal de lignes à comparer
compareDataTimeout=Délai d’expiration de l’opération en secondes
help.compareDataSourceTable=Nom de la première table à comparer. Exemple : EMPLOYEES ou SCHEMA.TABLE_NAME
help.compareDataSourceSchema=Schéma contenant la table source. Si non fourni, utilise le schéma courant.
help.compareDataTargetTable=Nom de la seconde table à comparer. Exemple : EMPLOYEES_NEW
help.compareDataTargetSchema=Schéma contenant la table cible. Si non fourni, utilise le schéma source.
help.compareDataKeyColumns=Liste de colonnes clés séparées par des virgules pour apparier les lignes entre tables. Exemple : EMP_ID ou ID, DEPT_ID
help.compareDataOutput=Chemin du fichier pour le rapport de comparaison. Si non fourni, les résultats s’affichent dans la console.
help.compareDataColumns=Liste de colonnes à comparer séparées par des virgules. Si non fourni, toutes les colonnes communes sont comparées.
help.compareDataShowMatches=Afficher les détails des lignes correspondantes dans le rapport. Valeur par défaut : false
help.compareDataLimit=Nombre maximal de lignes à comparer depuis chaque table. Valeur par défaut : 1000
help.compareDataTimeout=Temps maximal en secondes pour la comparaison. Valeur par défaut : 3600 (1 heure)
info.startingDataComparison=Démarrage de la comparaison des données entre {0} et {1}
success.comparisonComplete=Comparaison terminée. Source : {0} lignes, Cible : {1} lignes, Correspondances : {2}, Différences : {3}, SourceUniquement : {4}, CibleUniquement : {5}
error.compareData=Erreur de comparaison des données : {0}
error.noKeyColumns=Aucune colonne clé spécifiée pour l’appariement des lignes
error.schemaRequired=Les schémas source et cible sont requis
