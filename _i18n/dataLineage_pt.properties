título=Rastreamento de Dados
dataLineage=Rastrear linhagem e transformações de dados entre tabelas
dataLineageTable=Nome da Tabela a Rastrear
dataLineageSchema=Esquema da Tabela
dataLineageDirection=Direção da Linhagem (ascendente, descendente, bidirecional)
dataLineageDepth=Profundidade Máxima da Linhagem
dataLineageIncludeTransformations=Incluir Transformações (vistas, procedimentos)
dataLineageOutput=Caminho do Ficheiro do Relatório de Saída
dataLineageFormat=Formato do Relatório (json, csv, graphml, resumo)
dataLineageTimeout=Tempo Limite da Operação em Segundos
help.dataLineageTable=Nome da tabela para rastrear a linhagem. Exemplo: SALES_ORDERS
help.dataLineageSchema=Esquema contendo a tabela. Se não fornecido, usa o esquema atual.
help.dataLineageDirection=Direção da linhagem: ascendente (tabelas origem), descendente (tabelas dependentes), bidirecional (ambas). Padrão: ascendente
help.dataLineageDepth=Profundidade máxima da linhagem a rastrear. Padrão: 5
help.dataLineageIncludeTransformations=Incluir vistas, procedimentos e transformações na linhagem. Padrão: true
help.dataLineageOutput=Caminho do ficheiro para o relatório de linhagem. Se não fornecido, os resultados aparecem na consola.
help.dataLineageFormat=Formato do relatório: json (estruturado), csv (tabular), graphml (XML gráfico), resumo (visão geral). Padrão: resumo
help.dataLineageTimeout=Tempo máximo em segundos para a operação. Padrão: 3600 (1 hora)
info.startingLineageTrace=Iniciando rastreamento de linhagem para a tabela {0} na direção {1}
success.lineageTraceComplete=Rastreamento de linhagem completo. Tabelas Origem: {0}, Transformações: {1}, Tabelas Destino: {2}
error.dataLineage=Erro no rastreamento de dados: {0}

