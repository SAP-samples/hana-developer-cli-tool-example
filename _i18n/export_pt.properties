título=Exportar Dados
export=Exportar dados de tabela/vista para ficheiros CSV, Excel ou JSON
exportTable=Nome da Tabela Origem
exportSchema=Nome do Esquema Origem
exportOutput=Caminho do Ficheiro de Saída
exportFormat=Formato de Exportação (csv, excel, json)
exportWhere=Cláusula WHERE para Filtragem (opcional)
exportLimit=Número Máximo de Linhas a Exportar
exportOrderBy=Cláusula ORDER BY (opcional)
exportColumns=Lista de Colunas Separadas por Vírgula (opcional, padrão: *)
exportDelimiter=Carácter Delimitador CSV
exportIncludeHeaders=Incluir Linha de Cabeçalho na Exportação CSV
exportNullValue=Valor a Utilizar para Células NULL
exportMaxRows=Número Máximo de Linhas a Permitir
exportTimeout=Tempo Limite da Operação em Segundos
help.exportTable=Nome da tabela ou vista HANA origem a exportar. Exemplo: EMPLOYEES ou SCHEMA.TABLE_NAME
help.exportSchema=Esquema contendo a tabela. Se não fornecido, usa o esquema atual.
help.exportOutput=Caminho completo do ficheiro de saída. Se não fornecido, gera nome do ficheiro baseado na tabela e timestamp.
help.exportFormat=Formato de exportação: csv para valores separados por vírgula, excel para ficheiros .xlsx, json para matriz JSON
help.exportWhere=Cláusula WHERE opcional para filtrar linhas exportadas. Exemplo: SALARY > 50000
help.exportLimit=Número máximo de linhas a exportar. Padrão: 1000000
help.exportOrderBy=Cláusula ORDER BY opcional para ordenar dados exportados. Exemplo: NAME ASC, SALARY DESC
help.exportColumns=Lista separada por vírgula de colunas a exportar. Se não fornecido, todas as colunas são exportadas.
help.exportDelimiter=Carácter a utilizar como delimitador de campo em ficheiros CSV. Padrão: vírgula (,)
help.exportIncludeHeaders=Incluir nomes de coluna como primeira linha na exportação CSV. Recomendado: true
help.exportNullValue=Sequência a utilizar para valores NULL/vazios na saída. Padrão: sequência vazia
help.exportMaxRows=Número máximo de linhas permitidas para evitar exportações excessivas. Padrão: 1000000
help.exportTimeout=Tempo máximo em segundos permitido para a operação de exportação. Padrão: 3600 (1 hora)
info.startingExport=Iniciando exportação de tabela: {0}
info.noDataToExport=Nenhum dado a exportar da tabela especificada
success.exportComplete=Exportação concluída com sucesso. Exportadas {0} linhas para: {1} (Duração: {2} segundos)
error.export=Erro na exportação: {0}
error.fileWrite=Falha ao escrever ficheiro de saída {0}: {1}
error.noSchemaSpecified=Nenhum esquema especificado e não consegue determinar o esquema atual
error.tableNotFound=Tabela não encontrada: {0}

