title=Daten exportieren
export=Exportieren Sie Tabellen-/View-Daten in CSV-, Excel- oder JSON-Dateien
exportTable=Name der Quelltabelle
exportSchema=Name des Quellschemas
exportOutput=Pfad der Ausgabedatei
exportFormat=Exportformat (csv, excel, json)
exportWhere=WHERE-Klausel zum Filtern (optional)
exportLimit=Maximale Anzahl der zu exportierenden Zeilen
exportOrderBy=ORDER BY-Klausel (optional)
exportColumns=Kommagetrennte Spaltenliste (optional, Standard: *)
exportDelimiter=CSV-Trennzeichen
exportIncludeHeaders=Kopfzeile in CSV-Export einbeziehen
exportNullValue=Wert für NULL-Zellen
exportMaxRows=Maximale zulässige Zeilen
exportTimeout=Zeitüberschreitung für Betrieb (Sekunden)
help.exportTable=Name der zu exportierenden HANA-Tabelle oder -View. Beispiel: MITARBEITER oder SCHEMA.TABELLENNAME
help.exportSchema=Schema mit der Tabelle. Wenn nicht angegeben, wird das aktuelle Schema verwendet.
help.exportOutput=Vollständiger Pfad zur Ausgabedatei. Wenn nicht angegeben, wird der Dateiname basierend auf Tabelle und Zeitstempel generiert.
help.exportFormat=Exportformat: csv für durch Kommas getrennte Werte, excel für .xlsx-Dateien, json für JSON-Array
help.exportWhere=Optionale WHERE-Klausel zum Filtern exportierter Zeilen. Beispiel: SALARY > 50000
help.exportLimit=Maximale Anzahl der zu exportierenden Zeilen. Standard: 1000000
help.exportOrderBy=Optionale ORDER BY-Klausel zum Sortieren exportierter Daten. Beispiel: NAME ASC, SALARY DESC
help.exportColumns=Kommagetrennte Liste von zu exportierenden Spalten. Wenn nicht angegeben, werden alle Spalten exportiert.
help.exportDelimiter=Trennzeichen für CSV-Dateien. Standard: Komma (,)
help.exportIncludeHeaders=Spaltennamen als erste Zeile in CSV-Export einbeziehen. Empfohlen: true
help.exportNullValue=Zeichenfolge für NULL/leere Werte in der Ausgabe. Standard: leere Zeichenfolge
help.exportMaxRows=Maximale zulässige Zeilen zur Verhinderung übermäßiger Exporte. Standard: 1000000
help.exportTimeout=Maximale Zeit in Sekunden für den Exportvorgang. Standard: 3600 (1 Stunde)
info.startingExport=Starte Export der Tabelle: {0}
info.noDataToExport=Keine Daten zum Exportieren aus der angegebenen Tabelle
success.exportComplete=Export erfolgreich abgeschlossen. {0} Zeilen exportiert nach: {1} (Dauer: {2} Sekunden)
error.export=Exportfehler: {0}
error.fileWrite=Fehler beim Schreiben der Ausgabedatei {0}: {1}
error.noSchemaSpecified=Kein Schema angegeben und aktuelles Schema kann nicht ermittelt werden
error.tableNotFound=Tabelle nicht gefunden: {0}
