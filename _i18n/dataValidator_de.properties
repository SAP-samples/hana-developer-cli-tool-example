title=Daten-Validator
dataValidator=Daten gegen Geschäftsregeln und Beschränkungen überprüfen
dataValidatorTable=Name der zu überprüfenden Tabelle
dataValidatorSchema=Schema für Tabelle
dataValidatorRules=Validierungsregeln (Format: column:rule)
dataValidatorRulesFile=Pfad zur Validierungsregeln-Datei
dataValidatorColumns=Zu überprüfende Spalten (kommagetrennt, optional)
dataValidatorOutput=Ausgabedatei für Bericht
dataValidatorFormat=Berichtsformat (json, csv, summary, detailed)
dataValidatorLimit=Maximale Anzahl zu überprüfender Zeilen
dataValidatorStopOnFirstError=Nach erstem Fehler stoppen
dataValidatorTimeout=Timeout der Operation in Sekunden
help.dataValidatorTable=Name der zu überprüfenden Tabelle. Beispiel: EMPLOYEES
help.dataValidatorSchema=Schema mit der Tabelle. Falls nicht angegeben, wird aktuelles Schema verwendet.
help.dataValidatorRules=Validierungsregeln im Format: column1:required,email;column2:numeric,range:0:100
help.dataValidatorRulesFile=Pfad zur Datei mit Validierungsregeln
help.dataValidatorColumns=Kommagetrennte Liste von Spalten zur Überprüfung. Falls leer, werden alle überprüft.
help.dataValidatorOutput=Dateipfad für Validierungsbericht. Falls nicht angegeben, werden Ergebnisse in Konsole angezeigt.
help.dataValidatorFormat=Berichtsformat: json (strukturiert), csv (tabellarisch), summary (Übersicht), detailed (vollständige Ergebnisse). Standard: summary
help.dataValidatorLimit=Maximale Anzahl zu überprüfender Zeilen. Standard: 10000
help.dataValidatorStopOnFirstError=Validierung nach erstem Fehler stoppen. Standard: false
help.dataValidatorTimeout=Maximale Zeit in Sekunden für Operation. Standard: 3600 (1 Stunde)
info.startingDataValidation=Starte Datenvalidierung für Tabelle {0}
success.dataValidationComplete=Datenvalidierung abgeschlossen. Gesamt: {0}, Gültig: {1}, Ungültig: {2}, Fehler: {3}
error.dataValidator=Datenvalidierungsfehler: {0}
error.noValidationRules=Keine Validierungsregeln angegeben oder gefunden
