title=数据同步
dataSync=在系统或表之间同步数据
dataSyncSourceConnection=源连接配置文件或连接字符串
dataSyncTargetConnection=目标连接配置文件或连接字符串
dataSyncSchema=模式名称
dataSyncTable=要同步的表名
dataSyncMode=同步模式(完全或增量)
dataSyncBatchSize=处理批次大小
dataSyncConflictResolution=冲突解决策略(source、target或skip)
dataSyncKeyColumns=用于行匹配的键列(逗号分隔)
dataSyncTimeout=操作超时时间(秒)
help.dataSyncSourceConnection=源数据库连接配置文件或连接字符串。示例:DEV_DB
help.dataSyncTargetConnection=目标数据库连接配置文件或连接字符串。示例:PROD_DB
help.dataSyncSchema=包含要同步的表的模式。默认值:当前模式
help.dataSyncTable=要同步的表名称。示例:CUSTOMERS
help.dataSyncMode=同步模式:'full'(完全同步)或'incremental'(仅更改)。默认值:full
help.dataSyncBatchSize=每批处理的行数。默认值:1000
help.dataSyncConflictResolution=如何解决冲突:'source'(源优先)、'target'(目标优先)、'skip'(跳过冲突)。默认值:source
help.dataSyncKeyColumns=用于匹配行的键列的逗号分隔列表。示例:ID 或 CUSTOMER_ID, REGION
help.dataSyncTimeout=同步的最大时间(秒)。默认值:3600(1小时)
info.startingSynchronization=开始数据同步 {0}.{1}
info.rowsRead=从源表读取 {0} 行
info.fullSyncMode=使用完全同步模式
info.incrementalSyncMode=使用增量同步模式
success.syncComplete=同步完成。{0} 行已同步到表 {1}
error.dataSync=数据同步错误:{0}
