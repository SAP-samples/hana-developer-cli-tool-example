title=Daten-Herkunft
dataLineage=Verfolge Daten-Herkunft und Transformationen über Tabellen hinweg
dataLineageTable=Name der Tabelle zur Verfolgung
dataLineageSchema=Schema für Tabelle
dataLineageDirection=Herkunftsrichtung (upstream, downstream, bidirectional)
dataLineageDepth=Maximale Herkunftstiefe
dataLineageIncludeTransformations=Transformationen einbeziehen (Sichten, Prozeduren)
dataLineageOutput=Ausgabedatei für Bericht
dataLineageFormat=Berichtsformat (json, csv, graphml, summary)
dataLineageTimeout=Timeout der Operation in Sekunden
help.dataLineageTable=Name der Tabelle zur Verfolgung der Herkunft. Beispiel: SALES_ORDERS
help.dataLineageSchema=Schema mit der Tabelle. Falls nicht angegeben, wird aktuelles Schema verwendet.
help.dataLineageDirection=Herkunftsrichtung: upstream (Quelltabellen), downstream (abhängige Tabellen), bidirectional (beides). Standard: upstream
help.dataLineageDepth=Maximale Tiefe der zu verfolgenden Herkunft. Standard: 5
help.dataLineageIncludeTransformations=Sichten, Prozeduren und Transformationen in Herkunft einbeziehen. Standard: true
help.dataLineageOutput=Dateipfad für Herkunftsbericht. Falls nicht angegeben, werden Ergebnisse in Konsole angezeigt.
help.dataLineageFormat=Berichtsformat: json (strukturiert), csv (tabellarisch), graphml (Graph XML), summary (Übersicht). Standard: summary
help.dataLineageTimeout=Maximale Zeit in Sekunden für Operation. Standard: 3600 (1 Stunde)
info.startingLineageTrace=Starte Herkunftsverfolgung für Tabelle {0} in Richtung {1}
success.lineageTraceComplete=Herkunftsverfolgung abgeschlossen. Quelltabellen: {0}, Transformationen: {1}, Zieltabellen: {2}
error.dataLineage=Daten-Herkunftsfehler: {0}
