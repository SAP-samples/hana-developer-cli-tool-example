title=数据验证器
dataValidator=根据业务规则和约束验证数据
dataValidatorTable=要验证的表名称
dataValidatorSchema=表的模式
dataValidatorRules=验证规则（column:rule格式）
dataValidatorRulesFile=验证规则文件的路径
dataValidatorColumns=要验证的列（逗号分隔，可选）
dataValidatorOutput=输出报告文件路径
dataValidatorFormat=报告格式（json、csv、摘要、详细）
dataValidatorLimit=最大验证行数
dataValidatorStopOnFirstError=在第一个错误后停止处理
dataValidatorTimeout=操作超时（秒）
help.dataValidatorTable=要验证的表的名称。示例：EMPLOYEES
help.dataValidatorSchema=包含该表的模式。如果未提供，则使用当前模式。
help.dataValidatorRules=验证规则格式：column1:required,email;column2:numeric,range:0:100
help.dataValidatorRulesFile=包含验证规则的文件路径
help.dataValidatorColumns=要验证的特定列的逗号分隔列表。如果省略，则验证所有列。
help.dataValidatorOutput=验证报告的文件路径。如果未提供，结果将显示在控制台中。
help.dataValidatorFormat=报告格式：json（结构化）、csv（表格式）、summary（概览）、detailed（完整结果）。默认值：summary
help.dataValidatorLimit=最大验证行数。默认值：10000
help.dataValidatorStopOnFirstError=在遇到第一个错误后停止验证。默认值：false
help.dataValidatorTimeout=操作的最大时间（秒）。默认值：3600（1小时）
info.startingDataValidation=开始对表 {0} 进行数据验证
success.dataValidationComplete=数据验证完成。总计：{0}，有效：{1}，无效：{2}，错误：{3}
error.dataValidator=数据验证错误：{0}
error.noValidationRules=未指定或找到验证规则
