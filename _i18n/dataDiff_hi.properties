help.dataDiffTable1 = तुलना करने के लिए पहली तालिका का नाम। उदाहरण: EMPLOYEES
help.dataDiffTable2 = तुलना करने के लिए दूसरी तालिका का नाम। उदाहरण: EMPLOYEES_NEW
help.dataDiffSchema1 = पहली तालिका युक्त स्कीमा। यदि प्रदान नहीं किया गया, वर्तमान स्कीमा का उपयोग करता है।
help.dataDiffSchema2 = दूसरी तालिका युक्त स्कीमा। यदि प्रदान नहीं किया गया, पहले स्कीमा का उपयोग करता है।
help.dataDiffKeyColumns = पंक्तियों को विशिष्ट रूप से पहचानने वाले स्तंभों की अल्पविराम से अलग की गई सूची। उदाहरण: EMP_ID या DEPT_ID, EMP_ID
help.dataDiffCompareColumns = तुलना करने के लिए विशिष्ट स्तंभों की अल्पविराम से अलग की गई सूची। यदि प्रदान नहीं किया गया, सभी सामान्य स्तंभों की तुलना की जाती है।
help.dataDiffOutput = अंतर रिपोर्ट के लिए फाइल पथ। यदि प्रदान नहीं किया गया, परिणाम कंसोल में प्रदर्शित होते हैं।
help.dataDiffFormat = रिपोर्ट प्रारूप: json (संरचित), csv (सारणीबद्ध), summary (अवलोकन)। डिफ़ॉल्ट: summary
help.dataDiffLimit = प्रत्येक तालिका से संसाधित करने की अधिकतम पंक्तियां। डिफ़ॉल्ट: 10000
help.dataDiffShowValues = रिपोर्ट में वास्तविक स्तंभ मान शामिल करें। डिफ़ॉल्ट: false
help.dataDiffTimeout = ऑपरेशन के लिए अधिकतम समय सेकंड में। डिफ़ॉल्ट: 3600 (1 घंटा)
