title=Data Profile
dataProfile=Generate data quality metrics and statistical analysis for tables
dataProfileTable=Target Table Name
dataProfileSchema=Target Schema Name
dataProfileColumns=Columns to Profile (comma-separated, optional)
dataProfileOutput=Output Report File Path
dataProfileFormat=Report Format (json, csv, summary)
dataProfileNullAnalysis=Include NULL Value Analysis
dataProfileCardinalityAnalysis=Include Cardinality Analysis
dataProfileStatisticalAnalysis=Include Statistical Analysis (min, max, avg)
dataProfilePatternAnalysis=Include Pattern Analysis (length statistics)
dataProfileSampleSize=Maximum Rows to Analyze
dataProfileTimeout=Operation Timeout in Seconds
help.dataProfileTable=Name of the table to profile. Example: EMPLOYEES or SCHEMA.TABLE_NAME
help.dataProfileSchema=Schema containing the table. If not provided, uses current schema.
help.dataProfileColumns=Comma-separated list of specific columns to profile. If not provided, all columns are profiled.
help.dataProfileOutput=File path for profiling report. If not provided, results display in console.
help.dataProfileFormat=Report format: json (structured), csv (tabular), summary (overview). Default: summary
help.dataProfileNullAnalysis=Calculate NULL count and percentage. Default: true
help.dataProfileCardinalityAnalysis=Calculate distinct value count. Default: true
help.dataProfileStatisticalAnalysis=Calculate min, max, average values. Default: true
help.dataProfilePatternAnalysis=Calculate string length statistics. Default: false (slower)
help.dataProfileSampleSize=Maximum rows to analyze (limits large tables). Default: 10000
help.dataProfileTimeout=Maximum time in seconds for profiling. Default: 3600 (1 hour)
info.startingDataProfile=Starting data profile analysis for table: {0}
success.dataProfileComplete=Data profile complete for table {0}. Rows: {1}, Columns: {2}
error.dataProfile=Data profile error: {0}
error.tableNotFound=Table not found: {0}
