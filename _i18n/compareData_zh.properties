title=比较数据
compareData=比较两个表或模式之间的数据差异
compareDataSourceTable=源表名称
compareDataSourceSchema=源模式名称
compareDataTargetTable=目标表名称
compareDataTargetSchema=目标模式名称
compareDataKeyColumns=用于匹配的关键列（逗号分隔）
compareDataOutput=输出报告文件路径
compareDataColumns=要比较的列（逗号分隔，可选）
compareDataShowMatches=显示匹配行详情
compareDataLimit=最大比较行数
compareDataTimeout=操作超时（秒）
help.compareDataSourceTable=第一个要比较的表的名称。示例：EMPLOYEES 或 SCHEMA.TABLE_NAME
help.compareDataSourceSchema=包含源表的模式。如果未提供，则使用当前模式。
help.compareDataTargetTable=第二个要比较的表的名称。示例：EMPLOYEES_NEW
help.compareDataTargetSchema=包含目标表的模式。如果未提供，则使用源模式。
help.compareDataKeyColumns=用于在表之间匹配行的关键列的逗号分隔列表。示例：EMP_ID 或 ID、DEPT_ID
help.compareDataOutput=比较报告的文件路径。如果未提供，结果将显示在控制台中。
help.compareDataColumns=要比较的列的逗号分隔列表。如果未提供，则比较所有公共列。
help.compareDataShowMatches=在报告中显示匹配行的详情。默认值：false
help.compareDataLimit=从每个表进行比较的最大行数。默认值：1000
help.compareDataTimeout=比较的最大时间（秒）。默认值：3600（1小时）
info.startingDataComparison=开始在 {0} 和 {1} 之间进行数据比较
success.comparisonComplete=比较完成。源：{0} 行，目标：{1} 行，匹配：{2}，差异：{3}，仅源中：{4}，仅目标中：{5}
error.compareData=数据比较错误：{0}
error.noKeyColumns=未指定用于行匹配的关键列
error.schemaRequired=需要源和目标模式
