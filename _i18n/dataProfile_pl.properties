title=Profil danych
dataProfile=Generuj metryki jakości danych i analizę statystyczną dla tabel
dataProfileTable=Nazwa tabeli docelowej
dataProfileSchema=Nazwa schematu docelowego
dataProfileColumns=Kolumny do profilowania (oddzielone przecinkami, opcjonalnie)
dataProfileOutput=Ścieżka pliku raportu wyjściowego
dataProfileFormat=Format raportu (json, csv, summary)
dataProfileNullAnalysis=Dołącz analizę wartości NULL
dataProfileCardinalityAnalysis=Dołącz analizę kardynalności
dataProfileStatisticalAnalysis=Dołącz analizę statystyczną (min, max, avg)
dataProfilePatternAnalysis=Dołącz analizę wzorców (statystyki długości)
dataProfileSampleSize=Maksymalna liczba wierszy do analizy
dataProfileTimeout=Limit czasu operacji w sekundach
help.dataProfileTable=Nazwa tabeli do profilowania. Przykład: EMPLOYEES lub SCHEMA.TABLE_NAME
help.dataProfileSchema=Schemat zawierający tabelę. Jeśli nie podano, używa bieżącego schematu.
help.dataProfileColumns=Lista określonych kolumn do profilowania oddzielonych przecinkami. Jeśli nie podano, profilowane są wszystkie kolumny.
help.dataProfileOutput=Ścieżka pliku dla raportu profilowania. Jeśli nie podano, wyniki są wyświetlane w konsoli.
help.dataProfileFormat=Format raportu: json (strukturalny), csv (tabelaryczny), summary (przegląd). Domyślnie: summary
help.dataProfileNullAnalysis=Oblicz liczbę i procent wartości NULL. Domyślnie: true
help.dataProfileCardinalityAnalysis=Oblicz liczbę unikalnych wartości. Domyślnie: true
help.dataProfileStatisticalAnalysis=Oblicz wartości min, max, średnia. Domyślnie: true
help.dataProfilePatternAnalysis=Oblicz statystyki długości ciągów. Domyślnie: false (wolniejsze)
help.dataProfileSampleSize=Maksymalna liczba wierszy do analizy (ogranicza duże tabele). Domyślnie: 10000
help.dataProfileTimeout=Maksymalny czas w sekundach dla profilowania. Domyślnie: 3600 (1 godzina)
info.startingDataProfile=Rozpoczynanie analizy profilu danych dla tabeli: {0}
success.dataProfileComplete=Profil danych zakończony dla tabeli {0}. Wiersze: {1}, Kolumny: {2}
error.dataProfile=Błąd profilu danych: {0}
error.tableNotFound=Nie znaleziono tabeli: {0}
