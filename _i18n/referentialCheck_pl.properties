help.referentialCheckTable=Nazwa tabeli do sprawdzenia integralności referencyjnej. Przykład: ORDERS
help.referentialCheckSchema=Schemat zawierający tabelę. Jeśli nie podano, używa bieżącego schematu.
help.referentialCheckConstraints=Lista określonych nazw ograniczeń do sprawdzenia oddzielonych przecinkami. Jeśli pominięto, sprawdzane są wszystkie.
help.referentialCheckMode=Tryb sprawdzania: check (identyfikuj naruszenia), report (generuj raport), repair (spróbuj naprawić), detailed (pełna analiza). Domyślnie: check
