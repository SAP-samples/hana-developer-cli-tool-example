help.referentialCheckLimit=Maksymalna liczba wierszy do sprawdzenia pod kątem osieroconych rekordów. Domyślnie: 10000
help.referentialCheckTimeout=Maksymalny czas w sekundach dla operacji. Domyślnie: 3600 (1 godzina)
