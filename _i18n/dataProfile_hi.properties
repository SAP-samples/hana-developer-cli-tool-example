help.dataProfileTable = प्रोफाइल करने के लिए तालिका का नाम। उदाहरण: EMPLOYEES या SCHEMA.TABLE_NAME
help.dataProfileSchema = तालिका युक्त स्कीमा। यदि प्रदान नहीं किया गया, वर्तमान स्कीमा का उपयोग करता है।
help.dataProfileColumns = प्रोफाइल करने के लिए विशिष्ट स्तंभों की अल्पविराम से अलग की गई सूची। यदि प्रदान नहीं किया गया, सभी स्तंभों को प्रोफाइल किया जाता है।
help.dataProfileOutput = प्रोफाइलिंग रिपोर्ट के लिए फाइल पथ। यदि प्रदान नहीं किया गया, परिणाम कंसोल में प्रदर्शित होते हैं।
help.dataProfileFormat = रिपोर्ट प्रारूप: json (संरचित), csv (सारणीबद्ध), summary (अवलोकन)। डिफ़ॉल्ट: summary
help.dataProfileNullAnalysis = NULL गणना और प्रतिशत की गणना करें। डिफ़ॉल्ट: true
help.dataProfileCardinalityAnalysis = विशिष्ट मान गणना की गणना करें। डिफ़ॉल्ट: true
help.dataProfileStatisticalAnalysis = न्यूनतम, अधिकतम, औसत मान की गणना करें। डिफ़ॉल्ट: true
help.dataProfilePatternAnalysis = स्ट्रिंग लंबाई सांख्यिकी की गणना करें। डिफ़ॉल्ट: false (धीमा)
help.dataProfileSampleSize = विश्लेषण करने के लिए अधिकतम पंक्तियां (बड़ी तालिकाओं को सीमित करता है)। डिफ़ॉल्ट: 10000
help.dataProfileTimeout = प्रोफाइलिंग के लिए अधिकतम समय सेकंड में। डिफ़ॉल्ट: 3600 (1 घंटा)
