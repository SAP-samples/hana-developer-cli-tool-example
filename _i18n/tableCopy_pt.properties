título=Cópia de Tabela
tableCopy=Copiar estrutura e/ou dados da tabela com filtragem opcional
tableCopySourceTable=Nome da Tabela Origem
tableCopyTargetTable=Nome da Tabela Destino
tableCopySourceSchema=Nome do Esquema Origem
tableCopyTargetSchema=Nome do Esquema Destino
tableCopyStructureOnly=Copiar Apenas Estrutura (sem dados)
tableCopyDataOnly=Copiar Apenas Dados (sem estrutura)
tableCopyWhere=Filtro de Cláusula WHERE para Cópia de Dados
tableCopyLimit=Limite de Linhas para Cópia de Dados
tableCopyBatchSize=Tamanho de Lote para Processamento
tableCopyTimeout=Tempo Limite da Operação em Segundos
help.tableCopySourceTable=Nome da tabela origem a copiar de. Exemplo: CUSTOMERS
help.tableCopyTargetTable=Nome da tabela destino a copiar para. Exemplo: CUSTOMERS_BACKUP
help.tableCopySourceSchema=Esquema contendo a tabela origem. Padrão: esquema atual
help.tableCopyTargetSchema=Esquema para a tabela destino. Padrão: esquema atual
help.tableCopyStructureOnly=Copiar apenas estrutura de tabela sem dados. Não pode ser usado com dataOnly. Padrão: false
help.tableCopyDataOnly=Copiar apenas dados para uma tabela existente. Não pode ser usado com structureOnly. Padrão: false
help.tableCopyWhere=Cláusula WHERE para filtrar linhas durante cópia. Exemplo: STATUS='ACTIVE' AND YEAR=2024
help.tableCopyLimit=Número máximo de linhas a copiar. Útil para testes ou cópias parciais.
help.tableCopyBatchSize=Número de linhas para inserir em cada lote. Padrão: 1000
help.tableCopyTimeout=Tempo máximo em segundos para operação de cópia de tabela. Padrão: 3600 (1 hora)
info.startingTableCopy=Iniciando cópia de tabela de {0} para {1}
info.copyingStructure=Copiando estrutura de tabela
info.targetTableExists=Tabela destino {0}.{1} já existe
info.copyingData=Copiando dados de tabela
info.rowsRead=Lidas {0} linhas da tabela origem
info.processedRows=Processadas {0} de {1} linhas
success.structureCopied=Estrutura de tabela copiada com sucesso
success.dataCopied={0} linhas copiadas com sucesso
success.tableCopyComplete=Cópia de tabela completa. Origem: {0}, Destino: {1}, Linhas copiadas: {2}
error.tableCopy=Erro na cópia de tabela: {0}
error.sourceTableNotFound=Tabela origem {0}.{1} não encontrada
error.targetTableAlreadyExists=Tabela destino já existe. Use modo dataOnly para copiar dados para tabela existente.

