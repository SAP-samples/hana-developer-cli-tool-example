title=Comparar datos
compareData=Comparar datos entre dos tablas o esquemas para ver diferencias
compareDataSourceTable=Nombre de la tabla de origen
compareDataSourceSchema=Nombre del esquema de origen
compareDataTargetTable=Nombre de la tabla de destino
compareDataTargetSchema=Nombre del esquema de destino
compareDataKeyColumns=Columnas clave para la coincidencia (separadas por comas)
compareDataOutput=Ruta del archivo de informe de salida
compareDataColumns=Columnas a comparar (separadas por comas, opcional)
compareDataShowMatches=Mostrar detalles de filas coincidentes
compareDataLimit=Número máximo de filas a comparar
compareDataTimeout=Tiempo de espera de la operación en segundos
help.compareDataSourceTable=Nombre de la primera tabla a comparar. Ejemplo: EMPLOYEES o SCHEMA.TABLE_NAME
help.compareDataSourceSchema=Esquema que contiene la tabla de origen. Si no se proporciona, se usa el esquema actual.
help.compareDataTargetTable=Nombre de la segunda tabla para comparar. Ejemplo: EMPLOYEES_NEW
help.compareDataTargetSchema=Esquema que contiene la tabla de destino. Si no se proporciona, se usa el esquema de origen.
help.compareDataKeyColumns=Lista separada por comas de columnas clave usadas para emparejar filas entre tablas. Ejemplo: EMP_ID o ID, DEPT_ID
help.compareDataOutput=Ruta del archivo para el informe de comparación. Si no se proporciona, los resultados se muestran en la consola.
help.compareDataColumns=Lista separada por comas de columnas a comparar. Si no se proporciona, se comparan todas las columnas comunes.
help.compareDataShowMatches=Mostrar detalles de filas coincidentes en el informe. Predeterminado: false
help.compareDataLimit=Número máximo de filas a comparar de cada tabla. Predeterminado: 1000
help.compareDataTimeout=Tiempo máximo en segundos para la comparación. Predeterminado: 3600 (1 hora)
info.startingDataComparison=Iniciando comparación de datos entre {0} y {1}
success.comparisonComplete=Comparación completada. Origen: {0} filas, Destino: {1} filas, Coincidencias: {2}, Diferencias: {3}, SoloOrigen: {4}, SoloDestino: {5}
error.compareData=Error de comparación de datos: {0}
error.noKeyColumns=No se especificaron columnas clave para la coincidencia de filas
error.schemaRequired=Se requieren los esquemas de origen y destino
