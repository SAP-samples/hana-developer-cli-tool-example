title=スキーマクローン
schemaClone=データあり/なしでスキーマ全体をクローン
schemaCloneSourceSchema=ソーススキーマ名
schemaCloneTargetSchema=ターゲットスキーマ名
schemaCloneIncludeData=クローンにテーブルデータを含める
schemaCloneIncludeGrants=権限と特権を含める
schemaCloneParallel=並列操作数
schemaCloneExcludeTables=除外するテーブル（カンマ区切り）
schemaCloneTimeout=操作タイムアウト（秒）
help.schemaCloneSourceSchema=クローン元のソーススキーマ名。例：PROD_SCHEMA
help.schemaCloneTargetSchema=クローン先のターゲットスキーマ名。存在しない場合は作成されます。例：DEV_SCHEMA
help.schemaCloneIncludeData=構造と共にテーブルデータをクローンします。falseの場合は構造のみがクローンされます。デフォルト：false
help.schemaCloneIncludeGrants=ソースからターゲットスキーマに権限と特権をコピーします。デフォルト：false
help.schemaCloneParallel=並列クローン操作の数。高い値はパフォーマンスを向上させる可能性があります。デフォルト：1
help.schemaCloneExcludeTables=クローンから除外するテーブルのカンマ区切りリスト。例：TEMP_TABLE,LOG_TABLE
help.schemaCloneTimeout=スキーマクローン操作の最大時間（秒）。デフォルト：7200（2時間）
info.startingSchemaClone={0} から {1} へのスキーマクローンを開始しています
info.targetSchemaExists=ターゲットスキーマ {0} は既に存在します
info.creatingTargetSchema=ターゲットスキーマ {0} を作成しています
info.foundTables=クローンする {0} 個のテーブルが見つかりました
info.cloningTable=テーブルをクローンしています：{0}
info.copiedRows={0} 行をテーブル {1} にコピーしました
info.foundViews=クローンする {0} 個のビューが見つかりました
info.cloningView=ビューをクローンしています：{0}
info.viewCloneSkipped=ビュー {0} はスキップされました（手動DDL変換が必要）
info.cloningGrants=権限と特権をクローンしています
info.foundGrants=クローンする {0} 個の権限が見つかりました
success.schemaCloneComplete=スキーマクローン完了。ソース：{0}、ターゲット：{1}、テーブル：{2}、行数：{3}
error.schemaClone=スキーマクローンエラー：{0}
error.sourceSchemaNotFound=ソーススキーマ {0} が見つかりません
error.tableCloneFailed=テーブル {0} のクローンに失敗しました：{1}
error.viewCloneFailed=ビュー {0} のクローンに失敗しました：{1}
