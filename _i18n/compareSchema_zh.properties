title=模式比较
compareSchema=跨环境比较数据库模式结构
compareSchemaSourceSchema=源模式名称
compareSchemaTargetSchema=目标模式名称
compareSchemaTableFilter=表名筛选器(逗号分隔,可选)
compareSchemaCompareIndexes=比较索引
compareSchemaCompareTriggers=比较触发器
compareSchemaCompareConstraints=比较约束
compareSchemaOutput=输出报告文件路径
compareSchemaTimeout=操作超时时间(秒)
help.compareSchemaSourceSchema=要比较的第一个模式名称。示例:SCHEMA1
help.compareSchemaTargetSchema=要比较的第二个模式名称。示例:SCHEMA2
help.compareSchemaTableFilter=可选的逗号分隔特定表列表。如果未提供,将比较所有表。
help.compareSchemaCompareIndexes=在模式比较中包含索引定义。默认值:true
help.compareSchemaCompareTriggers=在模式比较中包含触发器定义。默认值:true
help.compareSchemaCompareConstraints=在模式比较中包含约束定义。默认值:true
help.compareSchemaOutput=比较报告的文件路径。如果未提供,结果将显示在控制台。
help.compareSchemaTimeout=比较的最大时间(秒)。默认值:3600(1小时)
info.startingSchemaComparison=开始比较模式 {0} 和 {1}
success.schemaComparisonComplete=模式比较完成。表匹配:{0}、表差异:{1}、仅源:{2}、仅目标:{3}
error.compareSchema=模式比较错误:{0}
errSchemaRequired=需要源模式名称和目标模式名称
compareSchemaExample=比较两个数据库模式
