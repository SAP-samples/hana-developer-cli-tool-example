help.exportTable=내보낼 원본 HANA 테이블 또는 뷰 이름. 예: EMPLOYEES 또는 SCHEMA.TABLE_NAME
help.exportSchema=테이블이 포함된 스키마. 제공되지 않으면 현재 스키마를 사용합니다.
help.exportOutput=출력 파일의 전체 경로. 제공되지 않으면 테이블 및 타임스탬프를 기반으로 파일 이름을 생성합니다.
help.exportFormat=내보내기 형식: csv는 쉼표로 구분된 값, excel은 .xlsx 파일, json은 JSON 배열
help.exportWhere=내보낼 행을 필터링하기 위한 선택적 WHERE 절. 예: SALARY > 50000
help.exportLimit=내보낼 최대 행 수. 기본값: 1000000
help.exportOrderBy=내보낸 데이터를 정렬하기 위한 선택적 ORDER BY 절. 예: NAME ASC, SALARY DESC
help.exportColumns=내보낼 컬럼의 쉼표로 구분된 목록. 제공되지 않으면 모든 컬럼이 내보내집니다.
help.exportDelimiter=CSV 파일에서 필드 구분자로 사용할 문자. 기본값: 쉼표 (,)
help.exportIncludeHeaders=CSV 내보내기의 첫 번째 행으로 컬럼 이름을 포함합니다. 권장: true
help.exportNullValue=출력에서 NULL/빈 값에 사용할 문자열. 기본값: 빈 문자열
help.exportMaxRows=과도한 내보내기를 방지하기 위해 허용되는 최대 행 수. 기본값: 1000000
help.exportTimeout=내보내기 작업에 허용되는 최대 시간(초). 기본값: 3600 (1시간)
info.startingExport=테이블 내보내기를 시작합니다: {0}
info.noDataToExport=지정된 테이블에서 내보낼 데이터가 없습니다
success.exportComplete=내보내기가 성공적으로 완료되었습니다. {0}행을 다음으로 내보냈습니다: {1} (소요 시간: {2}초)
error.export=내보내기 오류: {0}
error.fileWrite=출력 파일 {0} 쓰기 실패: {1}
error.noSchemaSpecified=스키마가 지정되지 않았으며 현재 스키마를 확인할 수 없습니다
error.tableNotFound=테이블을 찾을 수 없음: {0}
