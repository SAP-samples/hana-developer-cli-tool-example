title=データ同期
dataSync=システムまたはテーブル間でデータを同期
dataSyncSourceConnection=ソース接続プロファイルまたは接続文字列
dataSyncTargetConnection=ターゲット接続プロファイルまたは接続文字列
dataSyncSchema=スキーマ名
dataSyncTable=同期するテーブル名
dataSyncMode=同期モード（full または incremental）
dataSyncBatchSize=処理用バッチサイズ
dataSyncConflictResolution=競合解決戦略（source、target、または skip）
dataSyncKeyColumns=行照合用キー列（カンマ区切り）
dataSyncTimeout=操作タイムアウト（秒）
help.dataSyncSourceConnection=ソースデータベース接続プロファイルまたは接続文字列。例：DEV_DB
help.dataSyncTargetConnection=ターゲットデータベース接続プロファイルまたは接続文字列。例：PROD_DB
help.dataSyncSchema=同期するテーブルを含むスキーマ。デフォルト：現在のスキーマ
help.dataSyncTable=同期するテーブル名。例：CUSTOMERS
help.dataSyncMode=同期モード：'full'（完全同期）または 'incremental'（変更のみ）。デフォルト：full
help.dataSyncBatchSize=各バッチで処理する行数。デフォルト：1000
help.dataSyncConflictResolution=競合を解決する方法：'source'（ソースが優先）、'target'（ターゲットが優先）、'skip'（競合をスキップ）。デフォルト：source
help.dataSyncKeyColumns=行を照合するためのキー列のカンマ区切りリスト。例：ID または CUSTOMER_ID, REGION
help.dataSyncTimeout=同期の最大時間（秒）。デフォルト：3600（1時間）
info.startingSynchronization={0}.{1} のデータ同期を開始しています
info.rowsRead=ソーステーブルから {0} 行を読み取りました
info.fullSyncMode=完全同期モードを使用しています
info.incrementalSyncMode=増分同期モードを使用しています
success.syncComplete=同期完了。{0} 行がテーブル {1} に同期されました
error.dataSync=データ同期エラー：{0}
