title=Comparer le schéma
compareSchema=Comparer les structures de schémas de base de données entre environnements
compareSchemaSourceSchema=Nom du schéma source
compareSchemaTargetSchema=Nom du schéma cible
compareSchemaTableFilter=Filtre des noms de tables (séparés par des virgules, facultatif)
compareSchemaCompareIndexes=Comparer les index
compareSchemaCompareTriggers=Comparer les déclencheurs
compareSchemaCompareConstraints=Comparer les contraintes
compareSchemaOutput=Chemin du fichier de rapport de sortie
compareSchemaTimeout=Délai d’expiration de l’opération en secondes
help.compareSchemaSourceSchema=Nom du premier schéma à comparer. Exemple : SCHEMA1
help.compareSchemaTargetSchema=Nom du second schéma à comparer. Exemple : SCHEMA2
help.compareSchemaTableFilter=Liste facultative de tables spécifiques à comparer, séparées par des virgules. Si non fournie, toutes les tables sont comparées.
help.compareSchemaCompareIndexes=Inclure les définitions d’index dans la comparaison des schémas. Valeur par défaut : true
help.compareSchemaCompareTriggers=Inclure les définitions de déclencheurs dans la comparaison des schémas. Valeur par défaut : true
help.compareSchemaCompareConstraints=Inclure les définitions de contraintes dans la comparaison des schémas. Valeur par défaut : true
help.compareSchemaOutput=Chemin du fichier pour le rapport de comparaison. Si non fourni, les résultats s’affichent dans la console.
help.compareSchemaTimeout=Temps maximal en secondes pour la comparaison. Valeur par défaut : 3600 (1 heure)
info.startingSchemaComparison=Démarrage de la comparaison des schémas entre {0} et {1}
success.schemaComparisonComplete=Comparaison des schémas terminée. Correspondances de tables : {0}, Différences de tables : {1}, SourceUniquement : {2}, CibleUniquement : {3}
error.compareSchema=Erreur de comparaison des schémas : {0}
error.schemaRequired=Les noms des schémas source et cible sont requis
