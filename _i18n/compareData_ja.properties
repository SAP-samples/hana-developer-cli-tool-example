title=データ比較
compareData=2つのテーブルまたはスキーマ間のデータの相違を比較
compareDataSourceTable=ソーステーブル名
compareDataSourceSchema=ソーススキーマ名
compareDataTargetTable=ターゲットテーブル名
compareDataTargetSchema=ターゲットスキーマ名
compareDataKeyColumns=照合用キー列（カンマ区切り）
compareDataOutput=出力レポートファイルパス
compareDataColumns=比較する列（カンマ区切り、オプション）
compareDataShowMatches=一致行の詳細を表示
compareDataLimit=比較する最大行数
compareDataTimeout=操作タイムアウト（秒）
help.compareDataSourceTable=比較する最初のテーブル名。例：EMPLOYEES または SCHEMA.TABLE_NAME
help.compareDataSourceSchema=ソーステーブルを含むスキーマ。指定しない場合は現在のスキーマを使用します。
help.compareDataTargetTable=比較対象となる2番目のテーブル名。例：EMPLOYEES_NEW
help.compareDataTargetSchema=ターゲットテーブルを含むスキーマ。指定しない場合はソーススキーマを使用します。
help.compareDataKeyColumns=テーブル間で行を照合するために使用されるキー列のカンマ区切りリスト。例：EMP_ID または ID, DEPT_ID
help.compareDataOutput=比較レポートのファイルパス。指定しない場合は結果がコンソールに表示されます。
help.compareDataColumns=比較する列のカンマ区切りリスト。指定しない場合は共通列がすべて比較されます。
help.compareDataShowMatches=レポートに一致行の詳細を表示します。デフォルト：false
help.compareDataLimit=各テーブルから比較する最大行数。デフォルト：1000
help.compareDataTimeout=比較の最大時間（秒）。デフォルト：3600（1時間）
info.startingDataComparison={0} と {1} 間のデータ比較を開始しています
success.comparisonComplete=比較完了。ソース：{0}行、ターゲット：{1}行、一致：{2}、相違：{3}、ソースのみ：{4}、ターゲットのみ：{5}
error.compareData=データ比較エラー：{0}
error.noKeyColumns=行照合のためのキー列が指定されていません
error.schemaRequired=ソースとターゲットのスキーマが必要です
