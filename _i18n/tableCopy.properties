title=Table Copy
tableCopy=Copy table structure and/or data with optional filtering
tableCopySourceTable=Source Table Name
tableCopyTargetTable=Target Table Name
tableCopySourceSchema=Source Schema Name
tableCopyTargetSchema=Target Schema Name
tableCopyStructureOnly=Copy Structure Only (no data)
tableCopyDataOnly=Copy Data Only (no structure)
tableCopyWhere=WHERE Clause Filter for Data Copy
tableCopyLimit=Row Limit for Data Copy
tableCopyBatchSize=Batch Size for Processing
tableCopyTimeout=Operation Timeout in Seconds
help.tableCopySourceTable=Name of the source table to copy from. Example: CUSTOMERS
help.tableCopyTargetTable=Name of the target table to copy to. Example: CUSTOMERS_BACKUP
help.tableCopySourceSchema=Schema containing the source table. Default: current schema
help.tableCopyTargetSchema=Schema for the target table. Default: current schema
help.tableCopyStructureOnly=Copy only table structure without data. Cannot be used with dataOnly. Default: false
help.tableCopyDataOnly=Copy only data to an existing table. Cannot be used with structureOnly. Default: false
help.tableCopyWhere=WHERE clause to filter rows during copy. Example: STATUS='ACTIVE' AND YEAR=2024
help.tableCopyLimit=Maximum number of rows to copy. Useful for testing or partial copies.
help.tableCopyBatchSize=Number of rows to insert in each batch. Default: 1000
help.tableCopyTimeout=Maximum time in seconds for the table copy operation. Default: 3600 (1 hour)
info.startingTableCopy=Starting table copy from {0} to {1}
info.copyingStructure=Copying table structure
info.targetTableExists=Target table {0}.{1} already exists
info.copyingData=Copying table data
info.rowsRead=Read {0} rows from source table
info.processedRows=Processed {0} of {1} rows
success.structureCopied=Table structure copied successfully
success.dataCopied={0} rows copied successfully
success.tableCopyComplete=Table copy complete. Source: {0}, Target: {1}, Rows copied: {2}
error.tableCopy=Table copy error: {0}
error.sourceTableNotFound=Source table {0}.{1} not found
error.targetTableAlreadyExists=Target table already exists. Use dataOnly mode to copy data to existing table.
