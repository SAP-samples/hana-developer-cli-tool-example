help.schemaCloneSourceSchema=복제할 원본 스키마 이름. 예: PROD_SCHEMA
help.schemaCloneTargetSchema=복제할 대상 스키마 이름. 존재하지 않으면 생성됩니다. 예: DEV_SCHEMA
help.schemaCloneIncludeData=구조와 함께 테이블 데이터를 복제합니다. false이면 구조만 복제됩니다. 기본값: false
help.schemaCloneIncludeGrants=원본에서 대상 스키마로 권한 부여 및 권한을 복사합니다. 기본값: false
help.schemaCloneParallel=병렬 복제 작업 수. 값이 높을수록 성능이 향상될 수 있습니다. 기본값: 1
