title=数据差异
dataDiff=显示两个数据集之间的差异，并进行详细的变更跟踪
dataDiffTable1=第一个表名称
dataDiffTable2=第二个表名称
dataDiffSchema1=第一个表的模式
dataDiffSchema2=第二个表的模式
dataDiffKeyColumns=用于匹配的关键列（逗号分隔）
dataDiffCompareColumns=要比较的列（逗号分隔，可选）
dataDiffOutput=输出报告文件路径
dataDiffFormat=报告格式（json、csv、摘要）
dataDiffLimit=最大比较行数
dataDiffShowValues=在报告中显示实际值
dataDiffTimeout=操作超时（秒）
help.dataDiffTable1=第一个要比较的表的名称。示例：EMPLOYEES
help.dataDiffTable2=第二个要比较的表的名称。示例：EMPLOYEES_NEW
help.dataDiffSchema1=包含第一个表的模式。如果未提供，则使用当前模式。
help.dataDiffSchema2=包含第二个表的模式。如果未提供，则使用第一个模式。
help.dataDiffKeyColumns=唯一标识行的列的逗号分隔列表。示例：EMP_ID 或 DEPT_ID、EMP_ID
help.dataDiffCompareColumns=要比较的特定列的逗号分隔列表。如果未提供，则比较所有公共列。
help.dataDiffOutput=差异报告的文件路径。如果未提供，结果将显示在控制台中。
help.dataDiffFormat=报告格式：json（结构化）、csv（表格式）、summary（概览）。默认值：summary
help.dataDiffLimit=从每个表处理的最大行数。默认值：10000
help.dataDiffShowValues=在报告中包含实际列值。默认值：false
help.dataDiffTimeout=操作的最大时间（秒）。默认值：3600（1小时）
info.startingDataDiff=开始在 {0} 和 {1} 之间进行数据差异比较
success.dataDiffComplete=数据差异完成。相同：{0}，不同：{1}，仅在表1中：{2}，仅在表2中：{3}
error.dataDiff=数据差异错误：{0}
error.noKeyColumns=未指定用于行匹配的关键列
