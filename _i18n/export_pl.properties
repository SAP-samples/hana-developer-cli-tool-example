help.exportTable=Nazwa źródłowej tabeli lub widoku HANA do eksportu. Przykład: EMPLOYEES lub SCHEMA.TABLE_NAME
help.exportSchema=Schemat zawierający tabelę. Jeśli nie podano, używa bieżącego schematu.
help.exportOutput=Pełna ścieżka do pliku wyjściowego. Jeśli nie podano, generuje nazwę pliku na podstawie tabeli i znacznika czasu.
help.exportFormat=Format eksportu: csv dla wartości oddzielonych przecinkami, excel dla plików .xlsx, json dla tablicy JSON
help.exportWhere=Opcjonalna klauzula WHERE do filtrowania eksportowanych wierszy. Przykład: SALARY > 50000
help.exportLimit=Maksymalna liczba wierszy do eksportu. Domyślnie: 1000000
help.exportOrderBy=Opcjonalna klauzula ORDER BY do sortowania eksportowanych danych. Przykład: NAME ASC, SALARY DESC
help.exportColumns=Lista kolumn do eksportu oddzielonych przecinkami. Jeśli nie podano, eksportowane są wszystkie kolumny.
help.exportDelimiter=Znak używany jako ogranicznik pól w plikach CSV. Domyślnie: przecinek (,)
help.exportIncludeHeaders=Dołącz nazwy kolumn jako pierwszy wiersz w eksporcie CSV. Zalecane: true
help.exportNullValue=Ciąg znaków używany dla wartości NULL/pustych w wyniku. Domyślnie: pusty ciąg
help.exportMaxRows=Maksymalna dozwolona liczba wierszy, aby zapobiec nadmiernym eksportom. Domyślnie: 1000000
help.exportTimeout=Maksymalny czas w sekundach dozwolony dla operacji eksportu. Domyślnie: 3600 (1 godzina)
info.startingExport=Rozpoczynanie eksportu tabeli: {0}
info.noDataToExport=Brak danych do eksportu z określonej tabeli
success.exportComplete=Eksport zakończony pomyślnie. Wyeksportowano {0} wierszy do: {1} (Czas trwania: {2} sekund)
error.export=Błąd eksportu: {0}
error.fileWrite=Nie udało się zapisać pliku wyjściowego {0}: {1}
error.noSchemaSpecified=Nie określono schematu i nie można określić bieżącego schematu
error.tableNotFound=Nie znaleziono tabeli: {0}
