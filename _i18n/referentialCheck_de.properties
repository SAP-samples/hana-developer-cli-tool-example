title=Referenzielle Überprüfung
referentialCheck=Überprüfe Referenzintegrität und Fremdschlüsselbeschränkungen
referentialCheckTable=Name der zu überprüfenden Tabelle
referentialCheckSchema=Schema für Tabelle
referentialCheckConstraints=Spezifische zu überprüfende Beschränkungen (kommagetrennt, optional)
referentialCheckMode=Überprüfungsmodus (check, report, repair, detailed)
referentialCheckOutput=Ausgabedatei für Bericht
referentialCheckFormat=Berichtsformat (json, csv, summary)
referentialCheckLimit=Maximale Anzahl zu überprüfender Zeilen
referentialCheckTimeout=Timeout der Operation in Sekunden
help.referentialCheckTable=Name der Tabelle zur Überprüfung der Referenzintegrität. Beispiel: ORDERS
help.referentialCheckSchema=Schema mit der Tabelle. Falls nicht angegeben, wird aktuelles Schema verwendet.
help.referentialCheckConstraints=Kommagetrennte Liste von Beschränkungsnamen zur Überprüfung. Falls leer, werden alle überprüft.
help.referentialCheckMode=Überprüfungsmodus: check (Verstöße identifizieren), report (Bericht generieren), repair (zu reparieren versuchen), detailed (vollständige Analyse). Standard: check
help.referentialCheckOutput=Dateipfad für Integritätsbericht. Falls nicht angegeben, werden Ergebnisse in Konsole angezeigt.
help.referentialCheckFormat=Berichtsformat: json (strukturiert), csv (tabellarisch), summary (Übersicht). Standard: summary
help.referentialCheckLimit=Maximale Anzahl zu überprüfender Zeilen auf verwaiste Datensätze. Standard: 10000
help.referentialCheckTimeout=Maximale Zeit in Sekunden für Operation. Standard: 3600 (1 Stunde)
info.startingReferentialCheck=Starte Referenzintegritätsprüfung für Tabelle {0}
info.noForeignKeys=Keine Fremdschlüssel für Tabelle {0} gefunden
success.referentialCheckComplete=Referenzprüfung abgeschlossen. Gesamt FK: {0}, Gültig: {1}, Verletzt: {2}, Verwaiste Datensätze: {3}
error.referentialCheck=Referenzprüfungsfehler: {0}
