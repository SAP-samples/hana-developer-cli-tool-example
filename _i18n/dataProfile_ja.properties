title=データプロファイル
dataProfile=テーブルのデータ品質メトリックと統計分析を生成
dataProfileTable=ターゲットテーブル名
dataProfileSchema=ターゲットスキーマ名
dataProfileColumns=プロファイルする列（カンマ区切り、オプション）
dataProfileOutput=出力レポートファイルパス
dataProfileFormat=レポート形式（json、csv、summary）
dataProfileNullAnalysis=NULL値分析を含める
dataProfileCardinalityAnalysis=カーディナリティ分析を含める
dataProfileStatisticalAnalysis=統計分析を含める（min、max、avg）
dataProfilePatternAnalysis=パターン分析を含める（長さ統計）
dataProfileSampleSize=分析する最大行数
dataProfileTimeout=操作タイムアウト（秒）
help.dataProfileTable=プロファイルするテーブル名。例：EMPLOYEES または SCHEMA.TABLE_NAME
help.dataProfileSchema=テーブルを含むスキーマ。指定しない場合は現在のスキーマを使用します。
help.dataProfileColumns=プロファイルする特定の列のカンマ区切りリスト。指定しない場合はすべての列がプロファイルされます。
help.dataProfileOutput=プロファイルレポートのファイルパス。指定しない場合は結果がコンソールに表示されます。
help.dataProfileFormat=レポート形式：json（構造化）、csv（表形式）、summary（概要）。デフォルト：summary
help.dataProfileNullAnalysis=NULL数とパーセンテージを計算します。デフォルト：true
help.dataProfileCardinalityAnalysis=重複しない値の数を計算します。デフォルト：true
help.dataProfileStatisticalAnalysis=min、max、平均値を計算します。デフォルト：true
help.dataProfilePatternAnalysis=文字列長の統計を計算します。デフォルト：false（遅い）
help.dataProfileSampleSize=分析する最大行数（大きなテーブルを制限）。デフォルト：10000
help.dataProfileTimeout=プロファイリングの最大時間（秒）。デフォルト：3600（1時間）
info.startingDataProfile=テーブル {0} のデータプロファイル分析を開始しています
success.dataProfileComplete=テーブル {0} のデータプロファイル完了。行数：{1}、列数：{2}
error.dataProfile=データプロファイルエラー：{0}
error.tableNotFound=テーブルが見つかりません：{0}
