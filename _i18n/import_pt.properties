help.filename=Caminho completo do ficheiro origem (CSV ou Excel). Exemplos: /home/user/data.csv ou C:\\data\\sales.xlsx
help.table=Nome da tabela HANA alvo. A tabela já deve existir na base de dados. Exemplo: EMPLOYEES ou SCHEMA.TABLE_NAME
help.outputFormat=Formato de saída: CSV para valores separados por vírgula, Excel para ficheiros .xlsx
help.matchMode=Automático: tentar correspondência por nome primeiro, depois por posição. Nome: correspondência apenas por nomes de colunas. Ordem: correspondência por posição de coluna.
help.truncate=Marcar para apagar todos os dados existentes da tabela alvo antes de importar novos dados. AVISO: Isto irá apagar permanentemente todos os dados!
help.batchSize=Número de linhas a processar em cada lote. Lotes maiores são mais rápidos (1000+). Lotes menores usam menos memória (100-500).
help.worksheet=Para ficheiros Excel, de qual folha importar (baseado em 1: 1 = primeira folha, 2 = segunda folha, etc.). Ignorado para ficheiros CSV.
help.startRow=De qual linha começar a ler (baseado em 1). Usar 2 para ignorar uma linha de cabeçalho, usar 5 para ignorar as 4 primeiras linhas.
help.skipEmptyRows=Marcar para ignorar linhas sem dados em nenhuma coluna. Recomendado para manter qualidade dos dados.
help.excelCacheMode=Cache: carrega ficheiro inteiro em memória (mais rápido para ficheiros pequenos). Emitir: transmite conteúdo do ficheiro (melhor para ficheiros grandes >100MB).
help.dryRun=Marcar para visualizar a importação sem efetivamente modificar a base de dados. Mostra o que seria importado e quaisquer erros que ocorreriam.
help.maxFileSizeMB=Tamanho máximo de ficheiro a aceitar (em MB). Ficheiros maiores que isto serão rejeitados. Padrão 500MB protege contra consumir demasiados recursos.
help.timeoutSeconds=Tempo máximo a permitir para o processo de importação (em segundos). Se a importação exceder este tempo, será terminada. Padrão 3600 = 1 hora.
help.nullValues=Lista separada por vírgula de valores a tratar como NULL. Exemplo: "null,NULL,#N/A,,N/A" converte estas sequências para valores NULL de base de dados.
help.skipWithErrors=Marcar para continuar improtando mesmo se algumas linhas encontrem erros. Linhas ignoradas serão registadas. Combinar com Número Máximo de Erros para definir limites.
help.maxErrorsAllowed=Número máximo de erros permitidos antes de parar importação (-1 = ilimitado). Definir para 0 para sem tolerância. Definir para 10 para parar após 10 erros.
error.processingMessage=Erro ao processar mensagem WebSocket
error.timeoutExceeded=Tempo limite de importação excedido
error.maxErrorsReached=Número máximo de erros atingido
success.importComplete=Importação concluída com sucesso
success.dryRunComplete=Execução simulada concluída - nenhum dado importado
