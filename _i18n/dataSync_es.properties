title=Sincronización de datos
dataSync=Sincronizar datos entre sistemas o tablas
dataSyncSourceConnection=Perfil o cadena de conexión de origen
dataSyncTargetConnection=Perfil o cadena de conexión de destino
dataSyncSchema=Nombre del esquema
dataSyncTable=Nombre de la tabla a sincronizar
dataSyncMode=Modo de sincronización (full o incremental)
dataSyncBatchSize=Tamaño de lote para el procesamiento
dataSyncConflictResolution=Estrategia de resolución de conflictos (source, target o skip)
dataSyncKeyColumns=Columnas clave para la coincidencia de filas (separadas por comas)
dataSyncTimeout=Tiempo de espera de la operación en segundos
help.dataSyncSourceConnection=Perfil de conexión o cadena de conexión de la base de datos de origen. Ejemplo: DEV_DB
help.dataSyncTargetConnection=Perfil de conexión o cadena de conexión de la base de datos de destino. Ejemplo: PROD_DB
help.dataSyncSchema=Esquema que contiene la tabla a sincronizar. Predeterminado: esquema actual
help.dataSyncTable=Nombre de la tabla a sincronizar. Ejemplo: CUSTOMERS
help.dataSyncMode=Modo de sincronización: 'full' (sincronización completa) o 'incremental' (solo cambios). Predeterminado: full
help.dataSyncBatchSize=Número de filas a procesar en cada lote. Predeterminado: 1000
help.dataSyncConflictResolution=Cómo resolver conflictos: 'source' (gana origen), 'target' (gana destino), 'skip' (omitir conflicto). Predeterminado: source
help.dataSyncKeyColumns=Lista separada por comas de columnas clave para coincidir filas. Ejemplo: ID o CUSTOMER_ID, REGION
help.dataSyncTimeout=Tiempo máximo en segundos para la sincronización. Predeterminado: 3600 (1 hora)
info.startingSynchronization=Iniciando sincronización de datos para {0}.{1}
info.rowsRead=Se leyeron {0} filas de la tabla de origen
info.fullSyncMode=Usando modo de sincronización completa
info.incrementalSyncMode=Usando modo de sincronización incremental
success.syncComplete=Sincronización completa. {0} filas sincronizadas en la tabla {1}
error.dataSync=Error de sincronización de datos: {0}
