title=Detecção de Duplicados
duplicateDetection=Encontrar registos duplicados numa tabela
duplicateDetectionTable=Nome da Tabela a Verificar
duplicateDetectionSchema=Esquema da Tabela
duplicateDetectionKeyColumns=Colunas-Chave para Correspondência (separadas por vírgula)
duplicateDetectionCheckColumns=Colunas a Verificar para Duplicados (separadas por vírgula, opcional)
duplicateDetectionExcludeColumns=Colunas a Excluir da Verificação (separadas por vírgula, opcional)
duplicateDetectionMode=Modo de Detecção (exato, fuzzy, parcial)
duplicateDetectionThreshold=Limiar de Similaridade para Correspondência Fuzzy (0-1)
duplicateDetectionOutput=Caminho do Ficheiro do Relatório de Saída
duplicateDetectionFormat=Formato do Relatório (json, csv, resumo)
duplicateDetectionLimit=Número Máximo de Linhas a Verificar
duplicateDetectionTimeout=Tempo Limite da Operação em Segundos
duplicateDetectionExample=Exemplo: hana-cli duplicateDetection --table MY_TABLE --mode exact --threshold 0.95
help.duplicateDetectionTable=Nome da tabela a verificar para duplicados. Exemplo: CUSTOMERS
help.duplicateDetectionSchema=Esquema contendo a tabela. Se não fornecido, usa o esquema atual.
help.duplicateDetectionKeyColumns=Lista separada por vírgula de colunas usadas para correspondência. Exemplo: FIRST_NAME, LAST_NAME
help.duplicateDetectionCheckColumns=Colunas específicas a comparar para duplicados. Se omitido, todas exceto colunas-chave são verificadas.
help.duplicateDetectionExcludeColumns=Colunas a ignorar durante detecção de duplicados.
help.duplicateDetectionMode=Modo de detecção: exato (correspondência exata), fuzzy (baseado em similaridade), parcial (correspondência parcial). Padrão: exato
help.duplicateDetectionThreshold=Limiar de similaridade para correspondência fuzzy (0-1). Padrão: 0.95
help.duplicateDetectionOutput=Caminho do ficheiro para relatório de duplicados. Se não fornecido, os resultados aparecem na consola.
help.duplicateDetectionFormat=Formato do relatório: json (estruturado), csv (tabular), resumo (visão geral). Padrão: resumo
help.duplicateDetectionLimit=Número máximo de linhas a verificar. Padrão: 10000
help.duplicateDetectionTimeout=Tempo máximo em segundos para operação. Padrão: 3600 (1 hora)
info.startingDuplicateDetection=Iniciando detecção de duplicados para tabela {0}
success.duplicateDetectionComplete=Detecção de duplicados completa. Total: {0}, Únicos: {1}, Grupos Duplicados: {2}, Total de Duplicados: {3}
error.duplicateDetection=Erro na detecção de duplicados: {0}
error.noColumns=Nenhuma coluna encontrada na tabela
error.noColumnsDetailed=Nenhuma coluna encontrada na tabela {0}. Esquema: {1}
warning.duplicateDetectionCheckColumnsMissing=Colunas solicitadas não encontradas: {0}. Colunas disponíveis: {1}
warning.duplicateDetectionCheckColumnsNone=Nenhuma das colunas solicitadas foi encontrada: {0}. Colunas disponíveis: {1}

