title=Clonar esquema
schemaClone=Clonar un esquema completo con o sin datos
schemaCloneSourceSchema=Nombre del esquema de origen
schemaCloneTargetSchema=Nombre del esquema de destino
schemaCloneIncludeData=Incluir datos de tabla en el clon
schemaCloneIncludeGrants=Incluir concesiones y privilegios
schemaCloneParallel=Número de operaciones en paralelo
schemaCloneExcludeTables=Tablas a excluir (separadas por comas)
schemaCloneTimeout=Tiempo de espera de la operación en segundos
help.schemaCloneSourceSchema=Nombre del esquema de origen del que clonar. Ejemplo: PROD_SCHEMA
help.schemaCloneTargetSchema=Nombre del esquema de destino al que clonar. Se creará si no existe. Ejemplo: DEV_SCHEMA
help.schemaCloneIncludeData=Clonar datos de tabla junto con la estructura. Si es false, solo se clona la estructura. Predeterminado: false
help.schemaCloneIncludeGrants=Copiar concesiones y privilegios del esquema de origen al de destino. Predeterminado: false
help.schemaCloneParallel=Número de operaciones de clonación en paralelo. Valores más altos pueden mejorar el rendimiento. Predeterminado: 1
help.schemaCloneExcludeTables=Lista separada por comas de tablas a excluir del clonado. Ejemplo: TEMP_TABLE,LOG_TABLE
help.schemaCloneTimeout=Tiempo máximo en segundos para la operación de clonado de esquema. Predeterminado: 7200 (2 horas)
info.startingSchemaClone=Iniciando clonado de esquema de {0} a {1}
info.targetSchemaExists=El esquema de destino {0} ya existe
info.creatingTargetSchema=Creando esquema de destino {0}
info.foundTables=Se encontraron {0} tabla(s) para clonar
info.cloningTable=Clonando tabla: {0}
info.copiedRows=Se copiaron {0} fila(s) en la tabla {1}
info.foundViews=Se encontraron {0} vista(s) para clonar
info.cloningView=Clonando vista: {0}
info.viewCloneSkipped=Vista {0} omitida (requiere conversión DDL manual)
info.cloningGrants=Clonando concesiones y privilegios
info.foundGrants=Se encontraron {0} concesión(es) para clonar
success.schemaCloneComplete=Clonado de esquema completado. Origen: {0}, Destino: {1}, Tablas: {2}, Filas: {3}
error.schemaClone=Error de clonado de esquema: {0}
error.sourceSchemaNotFound=Esquema de origen {0} no encontrado
error.tableCloneFailed=No se pudo clonar la tabla {0}: {1}
error.viewCloneFailed=No se pudo clonar la vista {0}: {1}
