help.compareSchemaSourceSchema=Nome do primeiro esquema a comparar. Exemplo: SCHEMA1
help.compareSchemaTargetSchema=Nome do segundo esquema a comparar. Exemplo: SCHEMA2
help.compareSchemaTableFilter=Lista opcional separada por vírgula de tabelas específicas a comparar. Se não fornecido, todas as tabelas são comparadas.
help.compareSchemaCompareIndexes=Incluir definições de índices na comparação de esquema. Padrão: true
help.compareSchemaCompareTriggers=Incluir definições de triggers na comparação de esquema. Padrão: true
help.compareSchemaCompareConstraints=Incluir definições de restrições na comparação de esquema. Padrão: true
help.compareSchemaOutput=Caminho do ficheiro para o relatório de comparação. Se não fornecido, os resultados aparecem na consola.
help.compareSchemaTimeout=Tempo máximo em segundos para a comparação. Padrão: 3600 (1 hora)
info.startingSchemaComparison=Iniciando comparação de esquema entre {0} e {1}
success.schemaComparisonComplete=Comparação de esquema completa. CorrespondênciasdeTabelas: {0}, DiferençasdeTabelas: {1}, ApenasnaOrigem: {2}, ApenasnoDestino: {3}
error.compareSchema=Erro na comparação de esquema: {0}
errSchemaRequired=Nomes de esquema origem e destino são necessários
compareSchemaExample=Comparar dois esquemas de base de dados

