importMatchMode=Modo de correspondência de colunas - ordem: por posição, nome: por nomes de coluna, automático: tentar nomes depois reverter para posição
importTruncate=Truncar tabela alvo antes da importação
importBatchSize=Tamanho de lote para operações de inserção em massa (1-10000, padrão: 1000)
importWorksheet=Número da folha Excel para importar (baseado em 1, padrão: 1)
importStartRow=Número de linha inicial no Excel (baseado em 1, linha 1 é cabeçalho por padrão)
importSkipEmptyRows=Ignorar linhas vazias em ficheiros Excel (padrão: true)
importExcelCacheMode=Modo de cache de sequências partilhadas do Excel - cache: mais rápido com mais memória, emitir: streaming com menos memória, ignorar: ignorar sequências partilhadas
importDryRun=Visualizar resultados de importação sem cometer na base de dados
importMaxFileSizeMB=Tamanho máximo de ficheiro em MB (evita esgotamento de memória, padrão: 500)
importTimeoutSeconds=Tempo limite de operação de importação em segundos (0 = sem tempo limite, padrão: 3600)
importNullValues=Lista separada por vírgula de valores a tratar como NULL (padrão: null,NULL,#N/A,)
importSkipWithErrors=Continuar importação mesmo se erros excederem limiar
importMaxErrorsAllowed=Número máximo de erros permitidos antes de parar (-1 = ilimitado, padrão: -1)
importSummary=Resumo de Importação
importErrors=Erros de Importação

