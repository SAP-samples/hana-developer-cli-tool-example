swagger.info.title=API HANA CLI
swagger.info.description=API RESTful para Ferramenta CLI do Desenvolvedor HANA\n\nEsta API fornece acesso programático a operações de base de dados HANA, incluindo inspeção de esquema, gestão de tabela/vista, operações de contentor HDI e gestão de instâncias de serviço HANA Cloud.\n\n## Características\n- Inspeção de objetos de base de dados (tabelas, vistas, funções, índices)\n- Gestão de contentores HDI\n- Listagem de instâncias de serviço HANA Cloud\n- Consultas de informações do sistema e características\n- Gestão de configuração\n\n## Autenticação\nAs ligações de base de dados usam a configuração definida via PUT / endpoint.
