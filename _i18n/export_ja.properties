title=データエクスポート
export=テーブル/ビューデータをCSV、Excel、またはJSONファイルにエクスポート
exportTable=ソーステーブル名
exportSchema=ソーススキーマ名
exportOutput=出力ファイルパス
exportFormat=エクスポート形式（csv、excel、json）
exportWhere=フィルタリング用WHERE句（オプション）
exportLimit=エクスポートする最大行数
exportOrderBy=ORDER BY句（オプション）
exportColumns=カンマ区切り列リスト（オプション、デフォルト：*）
exportDelimiter=CSV区切り文字
exportIncludeHeaders=CSVエクスポートにヘッダー行を含める
exportNullValue=NULLセルに使用する値
exportMaxRows=許可する最大行数
exportTimeout=操作タイムアウト（秒）
help.exportTable=エクスポートするソースHANAテーブルまたはビュー名。例：EMPLOYEES または SCHEMA.TABLE_NAME
help.exportSchema=テーブルを含むスキーマ。指定しない場合は現在のスキーマを使用します。
help.exportOutput=出力ファイルへのフルパス。指定しない場合はテーブルとタイムスタンプに基づいてファイル名を生成します。
help.exportFormat=エクスポート形式：csv（カンマ区切り値）、excel（.xlsxファイル）、json（JSON配列）
help.exportWhere=エクスポートする行をフィルタリングするオプションのWHERE句。例：SALARY > 50000
help.exportLimit=エクスポートする最大行数。デフォルト：1000000
help.exportOrderBy=エクスポートデータをソートするためのオプションのORDER BY句。例：NAME ASC, SALARY DESC
help.exportColumns=エクスポートする列のカンマ区切りリスト。指定しない場合はすべての列がエクスポートされます。
help.exportDelimiter=CSVファイルでフィールド区切り文字として使用する文字。デフォルト：カンマ（,）
help.exportIncludeHeaders=CSVエクスポートの最初の行に列名を含めます。推奨：true
help.exportNullValue=出力でNULL/空値に使用する文字列。デフォルト：空文字列
help.exportMaxRows=過度なエクスポートを防ぐために許可される最大行数。デフォルト：1000000
help.exportTimeout=エクスポート操作を許可する最大時間（秒）。デフォルト：3600（1時間）
info.startingExport=テーブルのエクスポートを開始しています：{0}
info.noDataToExport=指定されたテーブルからエクスポートするデータがありません
success.exportComplete=エクスポート正常完了。{0} 行を {1} にエクスポートしました（所要時間：{2}秒）
error.export=エクスポートエラー：{0}
error.fileWrite=出力ファイル {0} の書き込みに失敗しました：{1}
error.noSchemaSpecified=スキーマが指定されておらず、現在のスキーマを判断できません
error.tableNotFound=テーブルが見つかりません：{0}
