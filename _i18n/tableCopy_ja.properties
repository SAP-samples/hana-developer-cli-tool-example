title=テーブルコピー
tableCopy=オプションのフィルタリングでテーブル構造やデータをコピー
tableCopySourceTable=ソーステーブル名
tableCopyTargetTable=ターゲットテーブル名
tableCopySourceSchema=ソーススキーマ名
tableCopyTargetSchema=ターゲットスキーマ名
tableCopyStructureOnly=構造のみをコピー（データなし）
tableCopyDataOnly=データのみをコピー（構造なし）
tableCopyWhere=データコピー用WHERE句フィルタ
tableCopyLimit=データコピーの行数制限
tableCopyBatchSize=処理用バッチサイズ
tableCopyTimeout=操作タイムアウト（秒）
help.tableCopySourceTable=コピー元のソーステーブル名。例：CUSTOMERS
help.tableCopyTargetTable=コピー先のターゲットテーブル名。例：CUSTOMERS_BACKUP
help.tableCopySourceSchema=ソーステーブルを含むスキーマ。デフォルト：現在のスキーマ
help.tableCopyTargetSchema=ターゲットテーブルのスキーマ。デフォルト：現在のスキーマ
help.tableCopyStructureOnly=データなしでテーブル構造のみをコピーします。dataOnlyとは併用できません。デフォルト：false
help.tableCopyDataOnly=既存のテーブルにデータのみをコピーします。structureOnlyとは併用できません。デフォルト：false
help.tableCopyWhere=コピー中に行をフィルタリングするWHERE句。例：STATUS='ACTIVE' AND YEAR=2024
help.tableCopyLimit=コピーする最大行数。テストや部分コピーに便利です。
help.tableCopyBatchSize=各バッチで挿入する行数。デフォルト：1000
help.tableCopyTimeout=テーブルコピー操作の最大時間（秒）。デフォルト：3600（1時間）
info.startingTableCopy={0} から {1} へのテーブルコピーを開始しています
info.copyingStructure=テーブル構造をコピーしています
info.targetTableExists=ターゲットテーブル {0}.{1} は既に存在します
info.copyingData=テーブルデータをコピーしています
info.rowsRead=ソーステーブルから {0} 行を読み取りました
info.processedRows={0} / {1} 行を処理しました
success.structureCopied=テーブル構造が正常にコピーされました
success.dataCopied={0} 行が正常にコピーされました
success.tableCopyComplete=テーブルコピー完了。ソース：{0}、ターゲット：{1}、コピーされた行数：{2}
error.tableCopy=テーブルコピーエラー：{0}
error.sourceTableNotFound=ソーステーブル {0}.{1} が見つかりません
error.targetTableAlreadyExists=ターゲットテーブルは既に存在します。既存のテーブルにデータをコピーするにはdataOnlyモードを使用してください。
