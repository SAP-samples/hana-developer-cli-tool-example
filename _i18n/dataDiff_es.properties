title=Comparación de datos
dataDiff=Mostrar diferencias entre dos conjuntos de datos con seguimiento detallado de cambios
dataDiffTable1=Nombre de la primera tabla
dataDiffTable2=Nombre de la segunda tabla
dataDiffSchema1=Esquema de la primera tabla
dataDiffSchema2=Esquema de la segunda tabla
dataDiffKeyColumns=Columnas clave para la coincidencia (separadas por comas)
dataDiffCompareColumns=Columnas a comparar (separadas por comas, opcional)
dataDiffOutput=Ruta del archivo de informe de salida
dataDiffFormat=Formato del informe (json, csv, summary)
dataDiffLimit=Número máximo de filas a comparar
dataDiffShowValues=Mostrar valores reales en el informe
dataDiffTimeout=Tiempo de espera de la operación en segundos
help.dataDiffTable1=Nombre de la primera tabla a comparar. Ejemplo: EMPLOYEES
help.dataDiffTable2=Nombre de la segunda tabla a comparar. Ejemplo: EMPLOYEES_NEW
help.dataDiffSchema1=Esquema que contiene la primera tabla. Si no se proporciona, se usa el esquema actual.
help.dataDiffSchema2=Esquema que contiene la segunda tabla. Si no se proporciona, se usa el primer esquema.
help.dataDiffKeyColumns=Lista separada por comas de columnas que identifican de forma única las filas. Ejemplo: EMP_ID o DEPT_ID, EMP_ID
help.dataDiffCompareColumns=Lista separada por comas de columnas específicas a comparar. Si no se proporciona, se comparan todas las columnas comunes.
help.dataDiffOutput=Ruta del archivo para el informe de diferencias. Si no se proporciona, los resultados se muestran en la consola.
help.dataDiffFormat=Formato del informe: json (estructurado), csv (tabular), summary (resumen). Predeterminado: summary
help.dataDiffLimit=Número máximo de filas de cada tabla a procesar. Predeterminado: 10000
help.dataDiffShowValues=Incluir valores reales de las columnas en el informe. Predeterminado: false
help.dataDiffTimeout=Tiempo máximo en segundos para la operación. Predeterminado: 3600 (1 hora)
info.startingDataDiff=Iniciando comparación de data diff entre {0} y {1}
success.dataDiffComplete=Data diff completado. Idénticas: {0}, Diferentes: {1}, SoloEnTabla1: {2}, SoloEnTabla2: {3}
error.dataDiff=Error de data diff: {0}
error.noKeyColumns=No se especificaron columnas clave para la coincidencia de filas
