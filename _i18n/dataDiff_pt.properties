title=Data Diff
dataDiff=Mostrar diferenças entre dois conjuntos de dados com rastreamento detalhado de alterações
dataDiffTable1=Nome da Primeira Tabela
dataDiffTable2=Nome da Segunda Tabela
dataDiffSchema1=Esquema da Primeira Tabela
dataDiffSchema2=Esquema da Segunda Tabela
dataDiffKeyColumns=Colunas-Chave para Correspondência (separadas por vírgula)
dataDiffCompareColumns=Colunas a Comparar (separadas por vírgula, opcional)
dataDiffOutput=Caminho do Ficheiro do Relatório de Saída
dataDiffFormat=Formato do Relatório (json, csv, resumo)
dataDiffLimit=Número Máximo de Linhas a Comparar
dataDiffShowValues=Mostrar Valores Reais no Relatório
dataDiffTimeout=Tempo Limite da Operação em Segundos
help.dataDiffTable1=Nome da primeira tabela a comparar. Exemplo: EMPLOYEES
help.dataDiffTable2=Nome da segunda tabela a comparar. Exemplo: EMPLOYEES_NEW
help.dataDiffSchema1=Esquema contendo a primeira tabela. Se não fornecido, usa o esquema atual.
help.dataDiffSchema2=Esquema contendo a segunda tabela. Se não fornecido, usa o esquema da primeira tabela.
help.dataDiffKeyColumns=Lista separada por vírgula de colunas que identificam unicamente as linhas. Exemplo: EMP_ID ou DEPT_ID, EMP_ID
help.dataDiffCompareColumns=Lista separada por vírgula de colunas específicas a comparar. Se não fornecido, todas as colunas comuns são comparadas.
help.dataDiffOutput=Caminho do ficheiro para o relatório de diferenças. Se não fornecido, os resultados aparecem na consola.
help.dataDiffFormat=Formato do relatório: json (estruturado), csv (tabular), resumo (visão geral). Padrão: resumo
help.dataDiffLimit=Número máximo de linhas de cada tabela a processar. Padrão: 10000
help.dataDiffShowValues=Incluir valores reais das colunas no relatório. Padrão: false
help.dataDiffTimeout=Tempo máximo em segundos para a operação. Padrão: 3600 (1 hora)
info.startingDataDiff=Iniciando comparação de diferença de dados entre {0} e {1}
success.dataDiffComplete=Diferença de dados completa. Idênticas: {0}, Diferentes: {1}, ApenasnaTabela1: {2}, ApenasnaTabela2: {3}
error.dataDiff=Erro na diferença de dados: {0}
error.noKeyColumns=Nenhuma coluna-chave especificada para correspondência de linhas

