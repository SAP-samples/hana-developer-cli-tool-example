help.compareDataSourceTable=비교할 첫 번째 테이블 이름. 예: EMPLOYEES 또는 SCHEMA.TABLE_NAME
help.compareDataSourceSchema=원본 테이블이 포함된 스키마. 제공되지 않으면 현재 스키마를 사용합니다.
help.compareDataTargetTable=비교할 두 번째 테이블 이름. 예: EMPLOYEES_NEW
help.compareDataTargetSchema=대상 테이블이 포함된 스키마. 제공되지 않으면 원본 스키마를 사용합니다.
help.compareDataKeyColumns=테이블 간 행 매칭에 사용되는 키 컬럼의 쉼표로 구분된 목록. 예: EMP_ID 또는 ID, DEPT_ID
help.compareDataOutput=비교 보고서의 파일 경로. 제공되지 않으면 결과가 콘솔에 표시됩니다.
help.compareDataColumns=비교할 컬럼의 쉼표로 구분된 목록. 제공되지 않으면 모든 공통 컬럼이 비교됩니다.
help.compareDataShowMatches=보고서에 일치하는 행의 세부정보를 표시합니다. 기본값: false
help.compareDataLimit=각 테이블에서 비교할 최대 행 수. 기본값: 1000
help.compareDataTimeout=비교의 최대 시간(초). 기본값: 3600 (1시간)
info.startingDataComparison={0}과(와) {1} 간의 데이터 비교를 시작합니다
