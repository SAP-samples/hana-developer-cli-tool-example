title=Synchronisation des données
dataSync=Synchroniser les données entre systèmes ou tables
dataSyncSourceConnection=Profil de connexion source ou chaîne de connexion
dataSyncTargetConnection=Profil de connexion cible ou chaîne de connexion
dataSyncSchema=Nom du schéma
dataSyncTable=Nom de la table à synchroniser
dataSyncMode=Mode de synchronisation (full ou incremental)
dataSyncBatchSize=Taille de lot pour le traitement
dataSyncConflictResolution=Stratégie de résolution des conflits (source, target ou skip)
dataSyncKeyColumns=Colonnes clés pour l’appariement des lignes (séparées par des virgules)
dataSyncTimeout=Délai d’expiration de l’opération en secondes
help.dataSyncSourceConnection=Profil de connexion ou chaîne de connexion de la base source. Exemple : DEV_DB
help.dataSyncTargetConnection=Profil de connexion ou chaîne de connexion de la base cible. Exemple : PROD_DB
help.dataSyncSchema=Schéma contenant la table à synchroniser. Par défaut : schéma courant
help.dataSyncTable=Nom de la table à synchroniser. Exemple : CUSTOMERS
help.dataSyncMode=Mode de synchronisation : 'full' (synchronisation complète) ou 'incremental' (changements uniquement). Valeur par défaut : full
help.dataSyncBatchSize=Nombre de lignes à traiter dans chaque lot. Valeur par défaut : 1000
help.dataSyncConflictResolution=Comment résoudre les conflits : 'source' (source gagnante), 'target' (cible gagnante), 'skip' (ignorer le conflit). Valeur par défaut : source
help.dataSyncKeyColumns=Liste de colonnes clés séparées par des virgules pour apparier les lignes. Exemple : ID ou CUSTOMER_ID, REGION
help.dataSyncTimeout=Temps maximal en secondes pour la synchronisation. Valeur par défaut : 3600 (1 heure)
info.startingSynchronization=Démarrage de la synchronisation des données pour {0}.{1}
info.rowsRead=Lecture de {0} lignes depuis la table source
info.fullSyncMode=Utilisation du mode de synchronisation complet
info.incrementalSyncMode=Utilisation du mode de synchronisation incrémental
success.syncComplete=Synchronisation terminée. {0} lignes synchronisées vers la table {1}
error.dataSync=Erreur de synchronisation des données : {0}
