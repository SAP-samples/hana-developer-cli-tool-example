swagger.info.title=HANA CLI API
swagger.info.description=RESTful-API für das HANA Developer CLI Tool\n\nDiese API bietet programmgesteuerten Zugriff auf HANA-Datenbankoperationen, einschließlich Schemaprüfung, Tabellen/Ansichtenverwaltung, HDI-Container-Operationen und HANA Cloud Service-Instanzverwaltung.\n\n## Funktionen\n- Datenbankobjekt-Inspektion (Tabellen, Ansichten, Funktionen, Indizes)\n- HDI-Containermanagement\n- Auflistung von HANA Cloud Service-Instanzen\n- Systeminformationen und Feature-Abfragen\n- Konfigurationsverwaltung\n\n## Authentifizierung\nDatenbankverbindungen verwenden die Konfiguration, die über den PUT / Endpunkt gesetzt wird.
