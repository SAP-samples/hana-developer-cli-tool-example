swagger.info.title=API de HANA CLI
swagger.info.description=API RESTful para HANA Developer CLI Tool\n\nEsta API proporciona acceso programático a operaciones de base de datos HANA, incluyendo inspección de esquema, gestión de tablas/vistas, operaciones de contenedores HDI y gestión de instancias de servicio HANA Cloud.\n\n## Funcionalidades\n- Inspección de objetos de base de datos (tablas, vistas, funciones, índices)\n- Gestión de contenedores HDI\n- Listado de instancias de servicio HANA Cloud\n- Información del sistema y consultas de funciones\n- Gestión de configuración\n\n## Autenticación\nLas conexiones de base de datos usan la configuración establecida vía el endpoint PUT /.
