title=Contrôle référentiel
referentialCheck=Vérifier l’intégrité référentielle et les contraintes de clé étrangère
referentialCheckTable=Nom de la table à vérifier
referentialCheckSchema=Schéma de la table
referentialCheckConstraints=Contraintes spécifiques à vérifier (séparées par des virgules, facultatif)
referentialCheckMode=Mode de contrôle (check, report, repair, detailed)
referentialCheckOutput=Chemin du fichier de rapport de sortie
referentialCheckFormat=Format du rapport (json, csv, summary)
referentialCheckLimit=Nombre maximal de lignes à vérifier
referentialCheckTimeout=Délai d’expiration de l’opération en secondes
help.referentialCheckTable=Nom de la table pour vérifier l’intégrité référentielle. Exemple : ORDERS
help.referentialCheckSchema=Schéma contenant la table. Si non fourni, utilise le schéma courant.
help.referentialCheckConstraints=Liste de noms de contraintes spécifiques séparés par des virgules à vérifier. Si omise, toutes sont vérifiées.
help.referentialCheckMode=Mode de contrôle : check (identifier les violations), report (générer un rapport), repair (tenter de corriger), detailed (analyse complète). Valeur par défaut : check
help.referentialCheckOutput=Chemin du fichier pour le rapport d’intégrité. Si non fourni, les résultats s’affichent dans la console.
help.referentialCheckFormat=Format du rapport : json (structuré), csv (tabulaire), summary (aperçu). Valeur par défaut : summary
help.referentialCheckLimit=Nombre maximal de lignes à vérifier pour les enregistrements orphelins. Valeur par défaut : 10000
help.referentialCheckTimeout=Temps maximal en secondes pour l’opération. Valeur par défaut : 3600 (1 heure)
info.startingReferentialCheck=Démarrage du contrôle d’intégrité référentielle pour la table {0}
info.noForeignKeys=Aucune clé étrangère trouvée pour la table {0}
success.referentialCheckComplete=Contrôle référentiel terminé. Total FK : {0}, Valides : {1}, Violées : {2}, Enregistrements orphelins : {3}
error.referentialCheck=Erreur de contrôle référentiel : {0}
