title=Compare Data
compareData=Compare data between two tables or schemas for differences
compareDataSourceTable=Source Table Name
compareDataSourceSchema=Source Schema Name
compareDataTargetTable=Target Table Name
compareDataTargetSchema=Target Schema Name
compareDataKeyColumns=Key Columns for Matching (comma-separated)
compareDataOutput=Output Report File Path
compareDataColumns=Columns to Compare (comma-separated, optional)
compareDataShowMatches=Show Matching Row Details
compareDataLimit=Maximum Rows to Compare
compareDataTimeout=Operation Timeout in Seconds
help.compareDataSourceTable=Name of the first table to compare. Example: EMPLOYEES or SCHEMA.TABLE_NAME
help.compareDataSourceSchema=Schema containing the source table. If not provided, uses current schema.
help.compareDataTargetTable=Name of the second table to compare against. Example: EMPLOYEES_NEW
help.compareDataTargetSchema=Schema containing the target table. If not provided, uses source schema.
help.compareDataKeyColumns=Comma-separated list of key columns used to match rows between tables. Example: EMP_ID or ID, DEPT_ID
help.compareDataOutput=File path for comparison report. If not provided, results display in console.
help.compareDataColumns=Comma-separated list of columns to compare. If not provided, all common columns are compared.
help.compareDataShowMatches=Display details of matching rows in the report. Default: false
help.compareDataLimit=Maximum number of rows to compare from each table. Default: 1000
help.compareDataTimeout=Maximum time in seconds for the comparison. Default: 3600 (1 hour)
info.startingDataComparison=Starting data comparison between {0} and {1}
success.comparisonComplete=Comparison complete. Source: {0} rows, Target: {1} rows, Matches: {2}, Differences: {3}, SourceOnly: {4}, TargetOnly: {5}
error.compareData=Data comparison error: {0}
error.noKeyColumns=No key columns specified for row matching
error.schemaRequired=Source and target schemas are required
