help.filename=Ruta completa al archivo de origen (CSV o Excel). Ejemplos: /home/user/data.csv o C:\\data\\sales.xlsx
help.table=Nombre de la tabla HANA de destino. La tabla debe existir en la base de datos. Ejemplo: EMPLOYEES o SCHEMA.TABLE_NAME
help.outputFormat=Formato de salida: CSV para valores separados por comas, Excel para archivos .xlsx
help.matchMode=Auto: intenta coincidir por nombre primero, luego por posición. Name: coincide solo por nombres de columnas. Order: coincide por posición de columnas.
help.truncate=Marcar para eliminar todos los datos existentes de la tabla de destino antes de importar datos nuevos. PRECAUCIÓN: ¡Esto eliminará permanentemente todos los datos!
help.batchSize=Número de filas a procesar en cada lote. Lotes más grandes son más rápidos (1000+). Lotes más pequeños usan menos memoria (100-500).
help.worksheet=Para archivos Excel, qué hoja importar (1-basado: 1 = primera hoja, 2 = segunda hoja, etc.). Ignorado para archivos CSV.
help.startRow=Desde qué fila comenzar a leer (1-basado). Use 2 para omitir una fila de encabezado, use 5 para omitir las primeras 4 filas.
help.skipEmptyRows=Marcar para omitir filas sin datos en ninguna columna. Recomendado para mantener la calidad de los datos.
help.excelCacheMode=Cache: carga todo el archivo en memoria (más rápido para archivos pequeños). Emit: transmite el contenido del archivo (mejor para archivos grandes >100MB).
help.dryRun=Marcar para previsualizar la importación sin modificar la base de datos. Muestra lo que se importaría y los errores que ocurrirían.
help.maxFileSizeMB=Tamaño máximo del archivo a aceptar (en MB). Los archivos más grandes serán rechazados. El valor predeterminado 500MB protege contra el uso excesivo de recursos.
help.timeoutSeconds=Tiempo máximo permitido para el proceso de importación (en segundos). Si se excede, se terminará. Predeterminado 3600 = 1 hora.
help.nullValues=Lista separada por comas de valores a tratar como NULL. Ejemplo: "null,NULL,#N/A,,N/A" convierte estas cadenas en NULL en la base de datos.
help.skipWithErrors=Marcar para continuar la importación incluso si algunas filas tienen errores. Las filas omitidas se registrarán. Combine con Máximo de errores permitidos para establecer límites.
help.maxErrorsAllowed=Número máximo de errores permitidos antes de detener la importación (-1 = ilimitado). Establezca 0 para no tolerar errores. Establezca 10 para detener después de 10 errores.
error.processingMessage=Error al procesar el mensaje WebSocket
error.timeoutExceeded=Se excedió el tiempo de espera de importación
error.maxErrorsReached=Se alcanzó el máximo de errores
success.importComplete=Importación completada correctamente
success.dryRunComplete=Ejecución de prueba completada - no se importaron datos
