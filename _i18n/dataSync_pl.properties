title=Synchronizacja danych
dataSync=Synchronizuj dane między systemami lub tabelami
dataSyncSourceConnection=Profil połączenia źródłowego lub ciąg połączenia
dataSyncTargetConnection=Profil połączenia docelowego lub ciąg połączenia
dataSyncSchema=Nazwa schematu
dataSyncTable=Nazwa tabeli do synchronizacji
dataSyncMode=Tryb synchronizacji (full lub incremental)
dataSyncBatchSize=Rozmiar partii do przetwarzania
dataSyncConflictResolution=Strategia rozwiązywania konfliktów (source, target lub skip)
dataSyncKeyColumns=Kolumny kluczowe do dopasowania wierszy (oddzielone przecinkami)
dataSyncTimeout=Limit czasu operacji w sekundach
help.dataSyncSourceConnection=Profil połączenia źródłowej bazy danych lub ciąg połączenia. Przykład: DEV_DB
help.dataSyncTargetConnection=Profil połączenia docelowej bazy danych lub ciąg połączenia. Przykład: PROD_DB
help.dataSyncSchema=Schemat zawierający tabelę do synchronizacji. Domyślnie: bieżący schemat
help.dataSyncTable=Nazwa tabeli do synchronizacji. Przykład: CUSTOMERS
help.dataSyncMode=Tryb synchronizacji: 'full' (pełna synchronizacja) lub 'incremental' (tylko zmiany). Domyślnie: full
help.dataSyncBatchSize=Liczba wierszy do przetworzenia w każdej partii. Domyślnie: 1000
help.dataSyncConflictResolution=Jak rozwiązywać konflikty: 'source' (źródło wygrywa), 'target' (cel wygrywa), 'skip' (pomiń konflikt). Domyślnie: source
help.dataSyncKeyColumns=Lista kolumn kluczowych do dopasowania wierszy oddzielonych przecinkami. Przykład: ID lub CUSTOMER_ID, REGION
help.dataSyncTimeout=Maksymalny czas w sekundach dla synchronizacji. Domyślnie: 3600 (1 godzina)
info.startingSynchronization=Rozpoczynanie synchronizacji danych dla {0}.{1}
info.rowsRead=Odczytano {0} wierszy z tabeli źródłowej
info.fullSyncMode=Używanie trybu pełnej synchronizacji
info.incrementalSyncMode=Używanie trybu synchronizacji przyrostowej
success.syncComplete=Synchronizacja zakończona. {0} wierszy zsynchronizowanych do tabeli {1}
error.dataSync=Błąd synchronizacji danych: {0}
