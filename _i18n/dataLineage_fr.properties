title=Traçabilité des données
dataLineage=Tracer la lignée des données et les transformations entre tables
dataLineageTable=Nom de la table à tracer
dataLineageSchema=Schéma de la table
dataLineageDirection=Direction de la lignée (upstream, downstream, bidirectional)
dataLineageDepth=Profondeur maximale de la lignée
dataLineageIncludeTransformations=Inclure les transformations (vues, procédures)
dataLineageOutput=Chemin du fichier de rapport de sortie
dataLineageFormat=Format du rapport (json, csv, graphml, summary)
dataLineageTimeout=Délai d’expiration de l’opération en secondes
help.dataLineageTable=Nom de la table pour laquelle tracer la lignée. Exemple : SALES_ORDERS
help.dataLineageSchema=Schéma contenant la table. Si non fourni, utilise le schéma courant.
help.dataLineageDirection=Direction de la lignée : upstream (tables sources), downstream (tables dépendantes), bidirectional (les deux). Valeur par défaut : upstream
help.dataLineageDepth=Profondeur maximale de la lignée à tracer. Valeur par défaut : 5
help.dataLineageIncludeTransformations=Inclure les vues, procédures et transformations dans la lignée. Valeur par défaut : true
help.dataLineageOutput=Chemin du fichier pour le rapport de lignée. Si non fourni, les résultats s’affichent dans la console.
help.dataLineageFormat=Format du rapport : json (structuré), csv (tabulaire), graphml (XML de graphe), summary (aperçu). Valeur par défaut : summary
help.dataLineageTimeout=Temps maximal en secondes pour l’opération. Valeur par défaut : 3600 (1 heure)
info.startingLineageTrace=Démarrage du traçage de lignée pour la table {0} en direction {1}
success.lineageTraceComplete=Traçage de lignée terminé. Tables sources : {0}, Transformations : {1}, Tables cibles : {2}
error.dataLineage=Erreur de lignée de données : {0}
